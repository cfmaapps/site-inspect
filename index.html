<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e40af">
  <title>SiteInspect</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-size: 15px; color: #1e293b; background: #f1f5f9;
      height: 100%; overflow: hidden;
    }

    /* ── CSS VARS ── */
    :root {
      --primary: #1e40af; --primary-l: #3b82f6; --primary-d: #1e3a8a;
      --surface: #ffffff; --bg: #f1f5f9; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b;
      --green: #059669; --amber: #d97706; --red: #dc2626;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    }

    /* ── APP SHELL ── */
    #app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

    /* ── HEADER ── */
    #hdr {
      flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
      background: var(--primary); color: white;
      padding: 0 12px; height: 56px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 10; position: relative;
    }
    #hdr-title { flex: 1; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    #hdr-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    /* ── MAIN CONTENT ── */
    #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      flex: 0 0 auto; display: flex; background: white;
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; padding: 8px 4px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 11px; font-weight: 500;
      transition: color .15s;
    }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--primary); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer;
      padding: 9px 16px; transition: all .15s; line-height: 1.2;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-d); }
    .btn-ghost { background: transparent; color: var(--primary); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: #f1f5f9; }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger-ghost { background: transparent; color: var(--red); border: none; }
    .btn-danger-ghost:hover { background: #fee2e2; }
    .btn-sm { font-size: 12px; padding: 6px 12px; }
    .btn-xs { font-size: 11px; padding: 4px 8px; border-radius: 6px; }
    .btn-lg { font-size: 16px; padding: 14px 24px; }
    .btn-full { width: 100%; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.85); padding: 8px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background .15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.15); }
    .icon-btn-dark {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 6px; border-radius: 6px; font-size: 16px; transition: background .15s;
    }
    .icon-btn-dark:hover { background: var(--border); }

    /* ── SCREEN ── */
    .screen { padding: 16px; max-width: 680px; margin: 0 auto; }

    /* ── CARDS ── */
    .card {
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      overflow: hidden;
    }
    .card + .card { margin-top: 12px; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .form-input {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 15px; color: var(--text);
      background: white; appearance: none; -webkit-appearance: none;
      transition: border-color .15s;
    }
    .form-input:focus { outline: none; border-color: var(--primary-l); }
    .form-textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; color: var(--text);
      resize: vertical; min-height: 80px; font-family: inherit;
      transition: border-color .15s;
    }
    .form-textarea:focus { outline: none; border-color: var(--primary-l); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── SECTION ── */
    .editor-section {
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      padding: 16px; margin-bottom: 12px;
    }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .05em; }

    /* ── HOME ── */
    .home-hero { margin-bottom: 16px; }
    .reports-list { display: flex; flex-direction: column; gap: 10px; }
    /* ── Home filter bar ── */
    .home-filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .home-search-wrap { position: relative; }
    .home-search {
      width: 100%; padding: 9px 12px 9px 34px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); font-size: 14px; background: white;
      outline: none; transition: border-color .15s;
    }
    .home-search:focus { border-color: var(--primary); }
    .home-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: var(--muted); }
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-pill {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: white; color: var(--muted);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .filter-pill:hover { border-color: #94a3b8; color: #334155; }
    .filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-pill.active-green { background: #059669; color: white; border-color: #059669; }
    .filter-pill.active-amber { background: #d97706; color: white; border-color: #d97706; }
    .sort-select {
      margin-left: auto; padding: 5px 10px; border-radius: 20px; font-size: 12px;
      font-weight: 600; border: 1.5px solid var(--border); background: white;
      color: var(--muted); cursor: pointer; outline: none;
    }
    .month-picker-wrap { display: flex; align-items: center; gap: 4px; }
    .month-picker {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: white; color: var(--muted);
      cursor: pointer; outline: none; max-width: 145px;
    }
    .month-picker.active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .month-clear { background: none; border: none; font-size: 13px; color: var(--muted); cursor: pointer; padding: 0 2px; line-height: 1; }
    .home-results-count { font-size: 12px; color: var(--muted); padding: 2px 0 6px; }
    .actlog-section { margin:10px 0 4px; }
    .actlog-toggle { display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;padding:4px 0;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;text-align:left; }
    .actlog-toggle svg { width:14px;height:14px;transition:transform .2s;flex-shrink:0; }
    .actlog-toggle.open svg { transform:rotate(180deg); }
    .actlog-list { display:none;margin-top:6px;background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden; }
    .actlog-list.open { display:block; }
    .actlog-item { display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px;line-height:1.4; }
    .actlog-item:last-child { border-bottom:none; }
    .actlog-icon { font-size:14px;flex-shrink:0;margin-top:1px; }
    .actlog-text { flex:1;min-width:0; }
    .actlog-device { font-weight:600;color:var(--text); }
    .actlog-action { color:#475569; }
    .actlog-entity { color:var(--primary);font-weight:500;word-break:break-word; }
    .actlog-time { flex-shrink:0;color:var(--muted);font-size:11px;white-space:nowrap;margin-top:1px; }
    .actlog-empty { padding:14px 12px;text-align:center;font-size:12px;color:var(--muted); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { margin-bottom: 6px; }
    .empty-state p:first-of-type { font-size: 16px; font-weight: 600; color: var(--text); }

    /* ── REPORT CARD ── */
    .report-card {
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      padding: 14px 16px; cursor: pointer; transition: box-shadow .15s;
    }
    .report-card:hover { box-shadow: var(--shadow-lg); }
    .report-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .report-site { font-size: 16px; font-weight: 700; color: var(--text); }
    .report-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .report-badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      flex-shrink: 0; margin-left: 8px;
    }
    .badge-draft { background: #fef3c7; color: #92400e; }
    .badge-complete { background: #d1fae5; color: #065f46; }
    .report-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .report-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .insp-tag {
      font-size: 11px; background: #eff6ff; color: #1d4ed8;
      padding: 2px 8px; border-radius: 20px; border: 1px solid #bfdbfe;
    }
    .insp-tag-more { background: #f8fafc; color: var(--muted); border-color: var(--border); }
    .report-card-footer { display: flex; justify-content: flex-end; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }

    /* ── ATTENDEES ── */
    .attendees-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .attendee-chip {
      display: flex; align-items: center; gap: 6px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 5px 8px 5px 12px; max-width: 260px;
    }
    .attendee-chip-info { flex: 1; min-width: 0; }
    .attendee-name { font-size: 13px; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attendee-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 0 2px; }
    .chip-remove:hover { color: var(--red); }

    /* ── INSPECTION CARD ── */
    .insp-card {
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; margin-bottom: 10px;
      transition: border-color .15s;
    }
    .insp-card.open { border-color: var(--primary-l); }
    .insp-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer; background: white;
      transition: background .1s;
    }
    .insp-card-header:hover { background: #f8fafc; }
    .insp-card-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .insp-icon { font-size: 22px; flex-shrink: 0; }
    .insp-label { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .insp-stats-sm { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .insp-card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }
    .insp-body { background: #fafafa; border-top: 1px solid var(--border); }

    /* ── INSPECTION SECTIONS ── */
    .insp-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .insp-section:last-child { border-bottom: none; }
    .insp-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }

    /* ── INSPECTION TABS ── */
    .insp-tab-strip {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
      border-bottom: 2px solid var(--border); margin-bottom: 12px;
      scrollbar-width: none;
    }
    .insp-tab-strip::-webkit-scrollbar { display: none; }
    .insp-tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; border: 1.5px solid var(--border);
      background: white; color: var(--muted); cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .insp-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .insp-tab:hover:not(.active) { background: var(--bg); border-color: #cbd5e1; }
    .insp-l2-strip {
      display: flex; gap: 5px; overflow-x: auto; padding-bottom: 8px;
      margin-bottom: 10px; scrollbar-width: none;
    }
    .insp-l2-strip::-webkit-scrollbar { display: none; }
    .insp-tab-l2 {
      flex-shrink: 0; padding: 4px 12px; border-radius: 16px;
      font-size: 12px; font-weight: 600; border: 1.5px solid var(--border);
      background: var(--bg); color: var(--muted); cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .insp-tab-l2.active { background: var(--primary-l); color: white; border-color: var(--primary-l); }
    .insp-tab-l2:hover:not(.active) { background: #e2e8f0; }
    .insp-tab-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .insp-tab-actions-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .cat-btn-other { border-style: dashed; color: var(--muted); }

    /* ── CHECKLIST ── */
    .progress-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 12px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--green); border-radius: 99px; transition: width .3s; }
    .checklist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .check-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 10px; background: white; border-radius: 6px;
      border: 1px solid var(--border); cursor: pointer;
      transition: background .1s;
    }
    .check-item:hover { background: #f8fafc; }
    .check-item input[type=checkbox] { margin-top: 2px; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--green); }
    .check-item span { font-size: 13px; line-height: 1.4; }
    .check-item.done span { color: var(--muted); text-decoration: line-through; }

    /* ── PHOTOS ── */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    .photo-thumb {
      aspect-ratio: 1; border-radius: 6px; overflow: hidden;
      border: 1.5px solid var(--border); cursor: pointer;
      position: relative; background: var(--bg);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb:hover img { opacity: .9; }
    .photo-note-dot {
      position: absolute; bottom: 4px; right: 4px;
      background: rgba(0,0,0,.6); color: white; border-radius: 4px;
      font-size: 10px; padding: 1px 4px;
    }
    .photo-loc-dot {
      position: absolute; bottom: 4px; left: 4px;
      background: rgba(0,0,0,.6); color: white; border-radius: 4px;
      font-size: 10px; padding: 1px 4px;
    }

    /* ── INSPECTION TAGS ── */
    .insp-tag-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .insp-tag-badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
      cursor: pointer; transition: background .12s;
    }
    .insp-tag-badge:hover { background: #dbeafe; }
    .tag-input-wrap { display: flex; gap: 6px; margin-top: 8px; }
    .tag-input {
      flex: 1; padding: 6px 10px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; outline: none;
      background: white; transition: border-color .15s;
    }
    .tag-input:focus { border-color: var(--primary-l); }
    /* Quick-link tag pills */
    .tag-quicklinks { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .tag-ql {
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 10px; cursor: pointer;
      background: #f1f5f9; color: #475569; border: 1.5px solid #cbd5e1;
      transition: background .12s, border-color .12s;
    }
    .tag-ql:hover { background: #e2e8f0; border-color: #94a3b8; }
    .tag-ql.tag-ql-pinned { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag-ql.tag-ql-pinned:hover { background: #dbeafe; }
    .tag-ql-pin {
      font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 10px; cursor: pointer;
      background: #f8fafc; color: #94a3b8; border: 1.5px dashed #cbd5e1;
      transition: all .12s;
    }
    .tag-ql-pin:hover { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; border-style: solid; }
    .tag-ql-unpin { font-size: 10px; margin-left: 2px; opacity: .5; cursor: pointer; }
    .tag-ql-unpin:hover { opacity: 1; }
    .photo-loc-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: rgba(255,255,255,.08); border-radius: 6px;
      padding: 6px 10px; margin-top: 6px; font-size: 12px; color: rgba(255,255,255,.8);
    }
    .photo-loc-bar span { flex: 1; font-variant-numeric: tabular-nums; }
    .photo-thumb-delete {
      position: absolute; top: 4px; right: 4px;
      background: rgba(220,38,38,.85); border: none; color: white;
      border-radius: 50%; width: 24px; height: 24px; font-size: 14px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
      transition: background .15s, transform .1s;
    }
    .photo-thumb-delete:hover { background: rgba(185,28,28,.95); transform: scale(1.1); }
    .photo-thumb-replace {
      position: absolute; top: 4px; left: 4px;
      background: rgba(30,58,95,.8); border: none; color: white;
      border-radius: 50%; width: 24px; height: 24px; font-size: 12px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
      transition: background .15s, transform .1s;
    }
    .photo-thumb-replace:hover { background: rgba(14,36,64,.95); transform: scale(1.1); }
    /* Loading shimmer for photos fetching from cloud */
    @keyframes photo-shimmer { to { background-position: -200% 0; } }
    .photo-thumb-loading {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: photo-shimmer 1.4s ease-in-out infinite;
    }
    .photo-thumb-loading img { opacity: 0; }
    .photo-thumb-loading::after {
      content: 'Loading…';
      position: absolute; bottom: 7px; left: 0; right: 0;
      text-align: center; font-size: 10px; color: #94a3b8; pointer-events: none;
    }
    .photo-add-btn {
      aspect-ratio: 1; border-radius: 6px;
      border: 1.5px dashed var(--border); background: white;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--muted); font-size: 11px; transition: all .15s;
    }
    .photo-add-btn:hover { border-color: var(--primary-l); color: var(--primary); background: #eff6ff; }
    .photo-add-btn span:first-child { font-size: 22px; }
    /* Photo item wrapper (image + caption) */
    .photo-item { display: flex; flex-direction: column; }
    .photo-note-caption {
      font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.3;
      word-break: break-word; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── PHOTO MAP ── */
    .photo-map-wrap { margin: 0 16px 12px; }
    .photo-map-toggle { width:100%; background:#f0f9ff; border:1.5px solid #bae6fd; color:#0369a1;
      border-radius:var(--radius-sm); padding:8px 12px; font-size:13px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
    .photo-map-toggle:hover { background:#e0f2fe; }
    .photo-map-container { height:300px; border-radius:var(--radius-sm); overflow:hidden;
      border:1.5px solid #bae6fd; margin-top:8px; }
    /* ── EXAMINATION PANELS ── */
    .exam-panel {
      border: 1.5px solid #bfdbfe; border-radius: var(--radius-sm);
      margin: 10px 16px; background: #f8fbff; overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    .exam-panel.exam-highlight {
      border-color: #2563eb; box-shadow: 0 0 0 3px #bfdbfe;
    }
    .exam-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #dbeafe; border-bottom: 1.5px solid #bfdbfe;
    }
    .exam-title { font-size: 12px; font-weight: 700; color: #1e40af; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; flex-shrink: 0; }
    .exam-title-input {
      border: none; border-bottom: 1.5px solid #93c5fd;
      background: rgba(255,255,255,.4);
      font-size: 13px; font-weight: 600; color: #1e3a8a;
      outline: none; padding: 5px 8px; border-radius: 4px 4px 0 0;
    }
    .exam-title-input::placeholder { color: #60a5fa; font-weight: 400; font-style: italic; }
    .exam-title-input:focus { background: rgba(255,255,255,.8); border-bottom-color: #2563eb; }
    /* Examination status pill */
    .exam-status {
      flex-shrink: 0; cursor: pointer; border: none; border-radius: 20px;
      font-size: 11px; font-weight: 700; padding: 3px 10px; line-height: 1.4;
      transition: all .15s; white-space: nowrap;
    }
    .exam-status[data-status=""] { background: rgba(255,255,255,.4); color: #1e40af; border: 1.5px solid rgba(255,255,255,.6); }
    .exam-status[data-status="pass"] { background: #dcfce7; color: #166534; border: 1.5px solid #86efac; }
    .exam-status[data-status="action"] { background: #fef3c7; color: #92400e; border: 1.5px solid #fcd34d; }
    .exam-status[data-status="urgent"] { background: #fee2e2; color: #991b1b; border: 1.5px solid #fca5a5; }
    .exam-body { }
    .exam-section { padding: 10px 12px; border-bottom: 1px solid #e0eeff; }
    .exam-section:last-child { border-bottom: none; }
    .exam-section-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .exam-tag-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    /* Note lines */
    .note-lines { display: flex; flex-direction: column; gap: 5px; }
    .note-line-row { display: flex; align-items: flex-start; gap: 6px; }
    .note-line-num { font-size: 11px; font-weight: 700; color: var(--muted); padding-top: 8px; min-width: 18px; flex-shrink: 0; }
    .note-line-text {
      flex: 1; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; resize: none; min-height: 34px; line-height: 1.4;
      overflow: hidden; background: white; transition: border-color .15s;
    }
    .note-line-text:focus { outline: none; border-color: var(--primary-l); }
    .note-line-del {
      flex-shrink: 0; background: none; border: none; color: #94a3b8;
      cursor: pointer; font-size: 16px; padding: 4px; line-height: 1; margin-top: 4px;
    }
    .note-line-del:hover { color: var(--red); }
    .note-empty-hint {
      font-size: 13px; color: #94a3b8; padding: 8px 4px; cursor: pointer; font-style: italic;
    }
    .note-empty-hint:hover { color: var(--primary); }
    /* Action cards */
    .action-list { display: flex; flex-direction: column; gap: 6px; }
    .action-card {
      display: flex; align-items: flex-start; gap: 8px;
      background: white; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px 10px;
    }
    .action-card-body { flex: 1; min-width: 0; }
    .action-note-text { font-size: 13px; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .action-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .action-contact {
      font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
      background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
    }
    .action-tag {
      font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    }
    .action-del {
      background: none; border: none; color: #94a3b8; cursor: pointer;
      font-size: 16px; padding: 2px; line-height: 1; flex-shrink: 0;
    }
    .action-del:hover { color: var(--red); }
    /* Add examination button row */
    .add-exam-row { padding: 10px 16px; background: #f8fafc; border-top: 1px solid var(--border); }
    /* Construction category selector */
    .insp-cat-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .insp-cat-pill {
      padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid #cbd5e1; background: #f8fafc; color: #64748b;
      cursor: pointer; transition: all .15s; line-height: 1.4;
    }
    .insp-cat-pill:hover { border-color: #94a3b8; background: #e2e8f0; color: #334155; }
    .insp-cat-pill.active { background: #1e40af; color: white; border-color: #1e40af; }
    .insp-cat-pill.active:hover { background: #1e3a8a; border-color: #1e3a8a; }

    /* ── MODAL OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 100; display: none; backdrop-filter: blur(2px);
    }
    #overlay.active { display: block; }
    #modals { position: fixed; inset: 0; z-index: 101; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; }
    #modals.active { pointer-events: auto; }

    /* ── MODAL ── */
    .modal {
      background: white; width: 100%; max-width: 560px;
      border-radius: 20px 20px 0 0;
      max-height: 92dvh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0,0,0,.15);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-full { border-radius: 0; max-height: 100dvh; height: 100dvh; max-width: 100%; }
    .modal-header {
      display: flex; align-items: center; padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px;
    }
    .modal-header h3 { flex: 1; font-size: 16px; font-weight: 700; }
    .modal-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; flex: 1; }
    .modal-breadcrumb { display: flex; align-items: center; gap: 6px; flex: 1; flex-wrap: wrap; font-size: 13px; }
    .breadcrumb-item { color: var(--muted); cursor: pointer; }
    .breadcrumb-item:hover { color: var(--primary); }
    .breadcrumb-item.active { color: var(--text); font-weight: 600; }
    .modal-hint { font-size: 13px; color: var(--muted); margin-bottom: 14px; }

    /* ── CATEGORY GRID ── */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; text-align: left; transition: all .15s;
    }
    .cat-btn:hover { border-color: var(--primary-l); background: #eff6ff; }
    .cat-icon { font-size: 26px; flex-shrink: 0; }
    .cat-label { font-size: 13px; font-weight: 600; flex: 1; }
    .cat-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }

    /* ── CONTACT SELECT ── */
    .contact-select-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); margin-bottom: 6px; background: white;
      transition: background .1s;
    }
    .contact-select-item:hover { background: #f8fafc; }
    .contact-email-sm { font-size: 11px; color: var(--muted); }

    /* ── PREVIOUS ACTIONS SECTION ── */
    .prev-action-card { border-radius: 10px; padding: 12px 14px; transition: border-color .15s, background .15s; }
    .prev-action-card textarea { font-size: 13px; min-height: 52px; }
    .pac-status-btn { padding: 4px 10px; border-radius: 14px; font-size: 12px; cursor: pointer; transition: all .1s; white-space: nowrap; }

    /* ── CONTACTS SCREEN ── */
    .contacts-list { display: flex; flex-direction: column; gap: 8px; }
    .contact-card {
      display: flex; align-items: center; gap: 12px;
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border); padding: 12px 14px;
      box-shadow: var(--shadow); transition: background .1s;
    }
    .contact-card.selected { background: #eff6ff; border-color: #bfdbfe; }
    .sel-cb { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
    .sel-bar {
      position: sticky; bottom: 0; left: 0; right: 0;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,.15); gap: 8px;
      font-size: 13px; font-weight: 600;
    }
    .sel-bar-btns { display: flex; gap: 6px; }
    .contact-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 600; }
    .contact-email { font-size: 12px; color: var(--muted); }
    .contact-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── PHOTO ANNOTATOR ── */
    .annotator-wrap { display: flex; flex-direction: column; height: 100dvh; }
    .annotator-header {
      flex: 0 0 auto; display: flex; align-items: center;
      gap: 6px; padding: 8px 12px; background: #1e293b;
      flex-wrap: wrap;
    }
    .tool-group { display: flex; align-items: center; gap: 4px; }
    .tool-btn {
      width: 36px; height: 36px; border-radius: 6px; border: none;
      background: rgba(255,255,255,.1); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: background .1s;
    }
    .tool-btn:hover { background: rgba(255,255,255,.2); }
    .tool-btn.active { background: var(--primary-l); }
    .color-swatches { display: flex; gap: 4px; align-items: center; }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3);
      cursor: pointer; transition: transform .1s;
    }
    .color-swatch.active { border-color: white; transform: scale(1.2); }
    .brush-sel {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: white; border-radius: 6px; padding: 4px 6px;
      font-size: 12px; cursor: pointer; height: 34px;
    }
    .annotator-divider { width: 1px; height: 28px; background: rgba(255,255,255,.2); }
    .annotator-canvas-area {
      flex: 1; overflow: hidden; background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #annotation-canvas { touch-action: none; cursor: crosshair; display: block; }
    .annotator-footer {
      flex: 0 0 auto; padding: 10px 12px; background: #1e293b;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    .annotator-footer label { font-size: 11px; color: rgba(255,255,255,.5); display: block; margin-bottom: 4px; }
    .annotator-footer textarea {
      width: 100%; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: white; border-radius: 6px; padding: 8px; font-size: 13px;
      resize: none; height: 60px; font-family: inherit;
    }
    .annotator-footer textarea::placeholder { color: rgba(255,255,255,.3); }
    .annotator-footer textarea:focus { outline: none; border-color: var(--primary-l); }
    .annotator-btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; }

    /* ── PHOTO CHOICE ── */
    .photo-choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .photo-choice-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 24px 16px; border-radius: 10px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text);
      transition: all .15s;
    }
    .photo-choice-btn:hover { border-color: var(--primary-l); background: #eff6ff; color: var(--primary); }
    .photo-choice-btn span:first-child { font-size: 36px; }

    /* ── DIVIDER ── */
    .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; margin: 14px 0 10px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── EMPTY MINI ── */
    .empty-mini { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }

    /* ── SETUP SCREEN ── */
    .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; padding: 32px 24px; }
    .setup-logo { font-size: 56px; margin-bottom: 12px; }
    .setup-screen h1 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
    .setup-screen > p { color: var(--muted); font-size: 14px; margin-bottom: 28px; text-align: center; }
    .setup-card { background: white; border-radius: var(--radius); padding: 24px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); }
    .setup-field { margin-bottom: 16px; }
    .setup-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .setup-field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; outline: none; }
    .setup-field input:focus { border-color: var(--primary); }
    .setup-hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .setup-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .setup-user-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
    .setup-user-btn { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; text-align: left; font-size: 14px; cursor: pointer; }
    .setup-user-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── SYNC INDICATOR ── */
    .sync-btn { background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .sync-btn:hover { background: rgba(255,255,255,.25); }
    .sync-dot { font-size: 10px; }
    .sync-dot.ok { color: #4ade80; }
    .sync-dot.syncing { color: #93c5fd; animation: spin 1s linear infinite; }
    .sync-dot.error { color: #fbbf24; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(1.3); } }

    /* ── REPORT CARD CREATOR ── */
    .report-creator { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(70px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e293b; color: white; padding: 10px 20px;
      border-radius: 99px; font-size: 13px; font-weight: 500;
      z-index: 999; opacity: 0; transition: all .25s; white-space: nowrap;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-undo {
      position: fixed; bottom: calc(70px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e293b; color: white; padding: 10px 8px 10px 18px;
      border-radius: 99px; font-size: 13px; font-weight: 500;
      z-index: 999; opacity: 0; transition: all .25s; white-space: nowrap;
      box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px;
    }
    .toast-undo.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-undo-btn {
      background: #3b82f6; border: none; color: white; font-size: 12px; font-weight: 700;
      padding: 4px 12px; border-radius: 99px; cursor: pointer; letter-spacing: .02em;
    }
    .toast-undo-btn:hover { background: #2563eb; }

    /* ── BTN ROW ── */
    .btn-row { display: flex; justify-content: flex-end; gap: 8px; }

    /* ── REPORT PREVIEW ACTIONS ── */
    .preview-print-btn {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--primary); color: white;
      padding: 14px 22px; border-radius: 99px;
      border: none; cursor: pointer; font-size: 14px; font-weight: 600;
      box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px;
    }

    /* ── PROFILE ── */
    .insp-active-card {
      background: #eff6ff; border: 2px solid #3b82f6; border-radius: var(--radius);
      padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .insp-active-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
    }
    .insp-active-info { flex: 1; min-width: 0; }
    .insp-active-name { font-size: 16px; font-weight: 700; color: var(--primary); }
    .insp-active-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .insp-active-badge {
      font-size: 11px; font-weight: 600; background: #dbeafe; color: #1d4ed8;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap;
    }
    .insp-row {
      display: flex; align-items: center; gap: 10px;
      background: white; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 11px 12px; margin-bottom: 8px; transition: background .1s;
    }
    .insp-row-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: #cbd5e1; color: #475569;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700;
    }
    .insp-row-info { flex: 1; min-width: 0; }
    .insp-row-name { font-size: 14px; font-weight: 600; }
    .insp-row-sub { font-size: 12px; color: var(--muted); }
    .insp-row-actions { display: flex; gap: 4px; flex-shrink: 0; }
    /* Banner shown in editor when profile is set */
    .inspector-bar {
      background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 10px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; cursor: pointer; transition: background .12s;
    }
    .inspector-bar:hover { background: #dbeafe; }
    .inspector-initials {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .inspector-info { flex: 1; min-width: 0; }
    .inspector-name { font-size: 14px; font-weight: 600; color: var(--primary); }
    .inspector-sub { font-size: 12px; color: var(--muted); }
    /* Banner shown when no profile is set */
    .profile-prompt {
      background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 10px;
      padding: 11px 14px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; cursor: pointer; transition: background .12s;
    }
    .profile-prompt:hover { background: #fef3c7; }

    /* ── DESKTOP ── */
    @media (min-width: 640px) {
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
      .modal { border-radius: 16px; align-self: center; max-height: 90dvh; }
      .modal-full { border-radius: 0; align-self: stretch; max-height: 100dvh; }
    }
    @media (min-width: 1024px) {
      #hdr { padding: 0 24px; }
      .screen { padding: 20px 24px; }
      .form-row { grid-template-columns: 1fr 1fr 1fr; }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
    }
    /* ── Publish button ── */
    .btn-publish {
      background: linear-gradient(135deg, #059669, #047857);
      color: white; border: none; font-weight: 700;
    }
    .btn-publish:hover { background: linear-gradient(135deg, #047857, #065f46); }
    /* ── Share modal ── */
    .share-overlay {
      display: none; position: fixed; inset: 0; z-index: 10001;
      background: rgba(15,23,42,.55); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center;
    }
    .share-overlay.open { display: flex; }
    .share-sheet {
      background: white; border-radius: 20px 20px 0 0;

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// INSPECTION SUBJECTS & TAG POOL
// ═══════════════════════════════════════════════════════════════
const SUBJECTS = [
  { id:'construction',  label:'Construction',  icon:'🚧' },
  { id:'asbuilt',       label:'Asbuilt',        icon:'📐' },
  { id:'topographic',   label:'Topographic',    icon:'🗺️' },
  { id:'cadastral',     label:'Cadastral',      icon:'📏' },
];

// ── CBR / DCP ─────────────────────────────────────────────────
const CBR_PASS_THRESHOLD = 7;
const CBR_KEY_DEPTHS = [150, 300, 450];

function cbrCalc(blows, depthMm) {
  const n = depthMm / 50;
  let total = 0;
  for (let i = 0; i < n; i++) {
    const b = Number(blows[i]);
    if (!Number.isFinite(b) || b <= 0) return null;
    total += b;
  }
  const dcpi = depthMm / total;
  return 292 / Math.pow(dcpi, 1.12);
}

function cbrCumul(blows, depthMm) {
  const n = depthMm / 50;
  let total = 0;
  for (let i = 0; i < n; i++) {
    const b = Number(blows[i]);
    if (!Number.isFinite(b) || b <= 0) return null;
    total += b;
  }
  return total;
}

function cbrLocStatus(loc) {
  const c = CBR_KEY_DEPTHS.map(d => cbrCalc(loc.blows || [], d));
  if (c.some(v => v === null)) return (loc.blows || []).some(b => Number(b) > 0) ? 'incomplete' : 'empty';
  return c.every(v => v >= CBR_PASS_THRESHOLD) ? 'pass' : 'fail';
}

// Predefined tags — drawn from all previous category names
const TAGS_PRESET = [
  // Construction — general
  'Prestart','Earthworks','Routine Meeting',
  // Roading
  'Roading','Subgrade','Pavement Layers','Preseal','Post Seal',
  // Drainage
  'Drainage','Sewer','Stormwater','Combined',
  // Utilities
  'Utilities','Water','Power','Telecommunications','Gas','Irrigation',
  // Survey
  'Control','Boundary Pegs','As-Built Survey','Feature Survey','Setting Out',
  'Volume Calculation','Cross Sections','Levels Check',
];

// Default quick-link tags shown in every inspection (user can pin/unpin)
const TAGS_QUICK_DEFAULT = [
  'Prestart','Earthworks','Roading','Drainage','Sewer','Stormwater',
  'Water','Power','Telecommunications','Gas','Irrigation',
  'Control','Setting Out','As-Built Survey',
];

// Category pills shown at inspection level for Construction inspections
const CONSTRUCTION_CATEGORIES = [
  'Roading','Earthworks','Water','Stormwater','Drainage','Sewer',
  'Utilities','Gas','Power','Telecommunications','Irrigation',
];

// Per-subject default quick-link tags
const TAGS_QUICK_BY_SUBJECT = {
  construction: ['Prestart','Earthworks','Routine Meeting','Roading','Subgrade','Pavement Layers','Preseal','Post Seal','Drainage','Sewer','Stormwater','Water','Power','Telecommunications','Gas','Irrigation'],
  asbuilt:      ['As-Built Survey','Roading','Drainage','Sewer','Stormwater','Water','Power','Telecommunications','Gas','Irrigation','Control','Levels Check'],
  topographic:  ['Feature Survey','Control','Cross Sections','Levels Check','Volume Calculation','Setting Out','Boundary Pegs'],
  cadastral:    ['Boundary Pegs','Control','Setting Out','Feature Survey','As-Built Survey'],
  other:        ['Prestart','Earthworks','Roading','Drainage','Stormwater','Water','Power','Control'],
};

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  screen: 'home',
  report: null,
  photoTarget: null,
  annotTarget: null,
  contactSort: 'name',
  contactFilter: '',
  contactSel: new Set(),
  homeFilter: { search: '', period: 'all', status: 'all', sort: 'newest' },
  attModalSort: 'name',
  siteFilter: '',
  jobSel: new Set(),
};

// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
const DB = {
  reports() { return JSON.parse(localStorage.getItem('si_rep') || '[]'); },
  saveReport(r) {
    r.updatedAt = new Date().toISOString();
    const photosStripped = this.saveReportLocal(r);
    clearTimeout(_pushDebounceTimers[r.id]);
    if (photosStripped) {
      // localStorage quota hit — push immediately using in-memory r (which still has full photo data).
      // Don't debounce: we can't retry from localStorage as it has stripped photos.
      delete _pushDebounceTimers[r.id];
      Sync.push(r).catch(() => {});
    } else {
      // Debounce cloud push so rapid saves (every keystroke) only result in one cloud push,
      // 1.2s after the last save — so the server always gets the final value.
      _pushDebounceTimers[r.id] = setTimeout(() => {
        delete _pushDebounceTimers[r.id];
        Sync.push(r).catch(() => {});
      }, 1200);
    }
  },
  getReport(id) { return this.reports().find(r => r.id === id) || null; },
  deleteReport(id) {
    localStorage.setItem('si_rep', JSON.stringify(this.reports().filter(r => r.id !== id)));
    Sync.deleteRemote(id).catch(() => {});       // hard-delete from reports table
    Sync.markReportDeleted(id).catch(() => {});  // tombstone in team_items so other devices stop syncing it
  },
  contacts() { return JSON.parse(localStorage.getItem('si_con') || '[]'); },
  saveContacts(newArr) {
    if (_teamPullBusy) { localStorage.setItem('si_con', JSON.stringify(newArr)); return; }
    const old = this.contacts();
    localStorage.setItem('si_con', JSON.stringify(newArr));
    _diffAndPushTeam('contact', old, newArr);
  },
  jobs() { return JSON.parse(localStorage.getItem('si_jobs') || '[]'); },
  saveJobs(newArr) {
    if (_teamPullBusy) { localStorage.setItem('si_jobs', JSON.stringify(newArr)); return; }
    const old = this.jobs();
    localStorage.setItem('si_jobs', JSON.stringify(newArr));
    _diffAndPushTeam('job', old, newArr);
  },
  siteNames() { return [...new Set(this.jobs().filter(j => j.site).map(j => j.site))]; },
  getJobByNumber(num) { return this.jobs().find(j => j.number && j.number.toLowerCase() === num.toLowerCase()) || null; },
  getJobsBySite(site) { return this.jobs().filter(j => j.site && j.site.toLowerCase() === site.toLowerCase()); },
  saveJob(number, site) {
    if (!site) return;
    const jobs = this.jobs();
    const byNum = number ? jobs.findIndex(j => j.number && j.number.toLowerCase() === number.toLowerCase()) : -1;
    const bySite = jobs.findIndex(j => j.site && j.site.toLowerCase() === site.toLowerCase());
    if (byNum >= 0) {
      jobs[byNum].site = site; jobs[byNum].updatedAt = new Date().toISOString();
    } else if (bySite >= 0 && number) {
      jobs[bySite].number = number; jobs[bySite].updatedAt = new Date().toISOString();
    } else if (bySite < 0) {
      jobs.unshift({ id: uid(), number: number || null, site, updatedAt: new Date().toISOString() }); // new entry
    }
    this.saveJobs(jobs.slice(0, 50));
  },
  customTags() { return JSON.parse(localStorage.getItem('si_tags') || '[]'); },
  saveCustomTag(label) {
    if (!label) return;
    const tags = this.customTags().filter(t => t.toLowerCase() !== label.toLowerCase());
    tags.unshift(label);
    localStorage.setItem('si_tags', JSON.stringify(tags.slice(0, 200)));
  },
  // Per-subject pinned tag methods
  pinnedTagsFor(subject) {
    const key = `si_pinned_${subject || 'other'}`;
    const saved = localStorage.getItem(key);
    if (saved) return JSON.parse(saved);
    const def = TAGS_QUICK_BY_SUBJECT[subject || 'other'] || [...TAGS_QUICK_DEFAULT];
    return [...def];
  },
  savePinnedTagsFor(subject, arr) { localStorage.setItem(`si_pinned_${subject || 'other'}`, JSON.stringify(arr)); },
  pinTagFor(subject, label) {
    if (!label) return;
    const pins = this.pinnedTagsFor(subject).filter(t => t.toLowerCase() !== label.toLowerCase());
    pins.push(label);
    this.savePinnedTagsFor(subject, pins);
  },
  unpinTagFor(subject, label) {
    const pins = this.pinnedTagsFor(subject).filter(t => t.toLowerCase() !== label.toLowerCase());
    this.savePinnedTagsFor(subject, pins);
  },
  // Legacy aliases (kept for backward compat)
  pinnedTags() { return this.pinnedTagsFor('construction'); },
  savePinnedTags(arr) { this.savePinnedTagsFor('construction', arr); },
  pinTag(label) { this.pinTagFor('construction', label); },
  unpinTag(label) { this.unpinTagFor('construction', label); },
  profile() { return JSON.parse(localStorage.getItem('si_prof') || 'null'); },
  saveProfile(p) {
    if (_teamPullBusy) { localStorage.setItem('si_prof', JSON.stringify(p)); return; }
    const old = getInspData().inspectors;
    localStorage.setItem('si_prof', JSON.stringify(p));
    _diffAndPushTeam('inspector', old, p.inspectors || []);
  },
  getSetup() { return JSON.parse(localStorage.getItem('si_setup') || 'null'); },
  saveSetup(companyCode, userName, deviceName) { localStorage.setItem('si_setup', JSON.stringify({ companyCode, userName, deviceName: deviceName || '' })); },
  clearSetup() { localStorage.removeItem('si_setup'); },
  // Save report locally without triggering cloud sync (used by Sync.pull)
  saveReportLocal(r) {
    const list = this.reports();
    const i = list.findIndex(x => x.id === r.id);
    i >= 0 ? (list[i] = r) : list.unshift(r);
    try {
      localStorage.setItem('si_rep', JSON.stringify(list));
      return false; // photos intact
    } catch(e) {
      if (e.name === 'QuotaExceededError') {
        // Strip photos from local cache only — cloud still gets the full version via saveReport
        const stripped = list.map(rep => ({
          ...rep,
          inspections: (rep.inspections || []).map(insp => ({
            ...insp,
            examinations: (insp.examinations || []).map(ex => ({
              ...ex,
              photos: (ex.photos || []).map(p => ({ ...p, data: '[photo]', annotatedData: null }))
            }))
          }))

// Return a copy of report with base64 photo data stripped for photos that have cloud URLs.
// Re-encode all base64 photos in a report at a lower resolution / quality.
// Returns a Promise that resolves with the updated report (modifies in-place).
async function recompressReportPhotos(report, maxDim, quality) {
  const _canvas = document.createElement('canvas');
  const _ctx = _canvas.getContext('2d');
  const squeeze = (dataUrl) => new Promise(resolve => {
    if (!dataUrl || dataUrl === '[cloud]' || dataUrl === '[photo]') { resolve(dataUrl); return; }
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      _canvas.width  = Math.round(img.width  * scale);
      _canvas.height = Math.round(img.height * scale);
      _ctx.drawImage(img, 0, 0, _canvas.width, _canvas.height);
      resolve(_canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
  for (const insp of (report.inspections || [])) {
    for (const ex of (insp.examinations || [])) {
      for (const p of (ex.photos || [])) {
        if (p.data && p.data !== '[cloud]' && p.data !== '[photo]')
          p.data = await squeeze(p.data);
        if (p.annotatedData && p.annotatedData !== '[cloud]' && p.annotatedData !== '[photo]')
          p.annotatedData = await squeeze(p.annotatedData);
      }
    }
  }
  return report;
}

// Keeps payload tiny so Supabase upsert never hits size limits.
function stripPhotoDataForCloud(report) {
  return {
    ...report,
    inspections: (report.inspections || []).map(insp => ({
      ...insp,
      examinations: (insp.examinations || []).map(ex => ({
        ...ex,
        photos: (ex.photos || []).map(p => ({
          ...p,
          data:         p.url          ? '[cloud]' : p.data,
          annotatedData: p.annotatedUrl ? '[cloud]' : p.annotatedData,
        })),
      })),
    })),
  };
}

// Merge local photo data into a pulled remote report so this device never loses photos.
// Handles three cases:
//   1. Remote has '[cloud]' placeholder  → restore base64 from local
//   2. Remote has '[photo]' / empty data → restore base64 from local
//   3. Remote is missing photos entirely → append them from local (push failed previously)
function mergeLocalPhotos(remoteReport, localReport) {
  if (!localReport) return remoteReport;
  // Build maps: photo id → photo object, and exam id → local photos array
  const localPhotoMap = {};
  const localExamPhotos = {};
  (localReport.inspections || []).forEach(insp =>
    (insp.examinations || []).forEach(ex => {
      localExamPhotos[ex.id] = ex.photos || [];
      (ex.photos || []).forEach(p => { if (p.id) localPhotoMap[p.id] = p; });
    })
  );
  if (!Object.keys(localPhotoMap).length) return remoteReport;
  return {
    ...remoteReport,
    inspections: (remoteReport.inspections || []).map(insp => ({
      ...insp,
      examinations: (insp.examinations || []).map(ex => {
        const remotePhotoIds = new Set((ex.photos || []).map(p => p.id));
        // Photos that exist locally but are absent from the remote version (push failed)
        const localOnly = (localExamPhotos[ex.id] || []).filter(p =>
          p.id && !remotePhotoIds.has(p.id) &&
          p.data && p.data !== '[photo]' && p.data !== '[cloud]'
        );
        return {
          ...ex,
          photos: [
            ...(ex.photos || []).map(p => {
              const loc = localPhotoMap[p.id];
              if (!loc) return p;
              const missingData = !p.data || p.data === '[cloud]' || p.data === '[photo]';
              const hasLocal    = loc.data && loc.data !== '[cloud]' && loc.data !== '[photo]';
              const missingAnn  = !p.annotatedData || p.annotatedData === '[cloud]' || p.annotatedData === '[photo]';
              const hasLocalAnn = loc.annotatedData && loc.annotatedData !== '[cloud]' && loc.annotatedData !== '[photo]';
              return {
                ...p,
                data:          (missingData && hasLocal)    ? loc.data          : p.data,
                annotatedData: (missingAnn  && hasLocalAnn) ? loc.annotatedData : p.annotatedData,
              };
            }),
            ...localOnly,  // re-attach photos that never made it to the server
          ],
        };
      }),
    })),
  };
}

  if (useAnnotated) {
    if (p.annotatedData && p.annotatedData !== '[cloud]' && p.annotatedData !== '[photo]') return p.annotatedData;
    if (p.annotatedUrl) return p.annotatedUrl;
  }
  if (p.data && p.data !== '[cloud]' && p.data !== '[photo]') return p.data;
  if (p.url) return p.url;
  return '';
}

      const apply = (type, local) => {
        const byId = {};
        rows.filter(r => r.type === type).forEach(r => byId[r.id] = r);
        let result = local.filter(item => !byId[item.id]?.deleted);
        rows.filter(r => r.type === type && !r.deleted).forEach(r => {
          const localItem = result.find(x => x.id === r.id);
          const serverMs  = new Date(r.updated_at).getTime();
          const localMs   = new Date(localItem?.updatedAt || 0).getTime();
          if (!localItem)           result.push(r.data);
          else if (serverMs > localMs) { const i = result.findIndex(x => x.id === r.id); result[i] = r.data; }
        });
        return result;
      };
      const inspData = getInspData();
      DB.saveContacts(apply('contact',   DB.contacts()));
      DB.saveJobs    (apply('job',       DB.jobs()));
      DB.saveProfile ({ activeId: inspData.activeId, inspectors: apply('inspector', inspData.inspectors) });
    } finally {
      _teamPullBusy = false;
    }
    return JSON.stringify(DB.contacts()) !== beforeCon ||
           JSON.stringify(DB.jobs())     !== beforeJobs ||
           JSON.stringify(getInspData().inspectors) !== beforeInsp;
  },

  // One-time migration: copy data from old team_settings blob into team_items rows.
  // Safe to run on every startup — skips if already done (flag in localStorage or data exists).
  async migrateFromTeamSettings() {
    const setup = DB.getSetup();
    if (!setup || !_sb || !navigator.onLine) return;
    if (localStorage.getItem('si_team_v2')) return;
    try {
      // Probe table — bail out silently if it doesn't exist yet (user needs to create it)
      const { data: existing, error: probeErr } = await _sb.from('team_items')
        .select('id').eq('company_code', setup.companyCode).limit(1);
      if (probeErr) return; // table not ready — will retry next startup
      if (!existing || existing.length === 0) {
        // Table is empty — copy data from old team_settings blob
        const { data: old } = await _sb.from('team_settings')
          .select('*').eq('company_code', setup.companyCode).single();
        if (old) {
          const rows = [];
          (old.contacts   || []).forEach(c => { if (c?.id) rows.push({ id: c.id, company_code: setup.companyCode, type: 'contact',   data: c, deleted: false }); });
          (old.jobs       || []).forEach(j => { if (j?.id) rows.push({ id: j.id, company_code: setup.companyCode, type: 'job',       data: j, deleted: false }); });
          (old.inspectors || []).forEach(i => { if (i?.id) rows.push({ id: i.id, company_code: setup.companyCode, type: 'inspector', data: i, deleted: false }); });
          if (rows.length) {
            const { error: upsertErr } = await _sb.from('team_items').upsert(rows, { onConflict: 'id,company_code' });
            if (upsertErr) return; // failed — will retry
          }
        }
      }
      localStorage.setItem('si_team_v2', '1'); // only set on full success
    } catch(e) { /* will retry next startup */ }
  },
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'});
}
function today() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Pacific/Auckland' }).format(new Date());
}
function nowTime() {
  return new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Pacific/Auckland', hour: '2-digit', minute: '2-digit', hour12: false
  }).format(new Date());
}
// Migrate old inspection format to new subject/tags/examinations format
function normalizeInsp(insp) {
  // Step 1: migrate old path-based format to subject format
  if (insp.subject === undefined) {
    const parts = (insp.path || insp.label || '').split(' › ');
    const raw = (parts[0] || 'Inspection').toLowerCase();
    const sub = SUBJECTS.find(s => raw.includes(s.label.toLowerCase()));
    insp.subject = sub ? sub.id : 'other';
    insp.subjectLabel = sub ? sub.label : parts[0];
    insp.tags = parts.slice(1).filter(Boolean);
  }
  // Always sync icon from SUBJECTS so changes here apply to existing inspections
  const sub = SUBJECTS.find(s => s.id === insp.subject);
  insp.icon = sub ? sub.icon : (insp.icon || '📋');
  // Step 2: migrate flat photos/notes to examinations array
  if (!insp.examinations) {
    const exam = { id: uid(), tags: [], notesLines: [], actions: [], photos: insp.photos || [] };
    if (insp.notes && String(insp.notes).trim()) {
      exam.notesLines = String(insp.notes).split('\n')
        .filter(l => l.trim()).map(t => ({ id: uid(), text: t }));
    }
    insp.examinations = [exam];
    delete insp.photos;
    delete insp.notes;
  }
  return insp;
}
function getTagSuggestions(query, existing) {
  const q = (query || '').toLowerCase();
  const used = new Set((existing || []).map(t => t.toLowerCase()));
  const all = [...TAGS_PRESET, ...DB.customTags()].filter(t => !used.has(t.toLowerCase()));
  if (!q) return all;
  const sw = all.filter(t => t.toLowerCase().startsWith(q));
  const co = all.filter(t => !t.toLowerCase().startsWith(q) && t.toLowerCase().includes(q));
  return [...sw, ...co];
}
function newReport() {
  const setup = DB.getSetup();
  return { id:uid(), createdAt:new Date().toISOString(), updatedAt:new Date().toISOString(),
    createdBy: setup ? setup.userName : '',
    createdByDevice: setup?.deviceName || '',
    jobNumber:'', site:'', date:today(), time:nowTime(), weather:'',
    context:'', attendees:[], ccContacts:[], inspections:[], status:'draft' };
}

async function submitSetup() {
  const code       = (document.getElementById('setup-code')?.value   || '').trim().toUpperCase();
  const deviceName = (document.getElementById('setup-device')?.value || '').trim();
  const errEl      = document.getElementById('setup-code-error');
  if (!code) { if (errEl) errEl.textContent = 'Enter a team access code'; return; }
  if (!deviceName) { toast('Enter a device name'); document.getElementById('setup-device')?.focus(); return; }
  const btn = document.getElementById('setup-submit');
  // If Supabase SDK didn't load, work offline (can't validate)
  if (!_sb) {
    DB.saveSetup(code, '', deviceName);
    render();
    toast('Working offline — sync unavailable');
    return;
  }
  btn.textContent = 'Checking code…'; btn.disabled = true;
  if (errEl) errEl.textContent = '';
  try {
    // Validate: check the code exists in the companies table
    const { data: match, error: chkErr } = await _sb
      .from('companies').select('code').eq('code', code).maybeSingle();
    if (chkErr) throw chkErr;
    if (!match) {
      // Code not registered — deny access
      if (errEl) errEl.textContent = '✕ Access denied — code not recognised. Check with your team administrator.';
      btn.textContent = 'Get Started →'; btn.disabled = false;
      document.getElementById('setup-code')?.focus();
      return;
    }
    // Code validated — proceed
    DB.saveSetup(code, '', deviceName);
    await Sync.pull();
    render();
  } catch(e) {
    toast('Could not connect — check your internet connection');
    btn.textContent = 'Get Started →'; btn.disabled = false;
  }
}

function filterAndSortReports(reports) {
  const f = state.homeFilter;
  let list = [...reports];
  // Search
  if (f.search.trim()) {
    const q = f.search.trim().toLowerCase();
    list = list.filter(r =>
      (r.site || '').toLowerCase().includes(q) ||
      (r.jobNumber || '').toLowerCase().includes(q)
    );
  }
  // Period (YYYY-MM string from month picker)
  if (f.period && f.period !== 'all') {
    list = list.filter(r => (r.date || '').startsWith(f.period));
  }
  // Status
  if (f.status !== 'all') list = list.filter(r => (r.status || 'draft') === f.status);
  // Sort
  if (f.sort === 'newest') list.sort((a, b) => (b.date || '') > (a.date || '') ? 1 : -1);
  else if (f.sort === 'oldest') list.sort((a, b) => (a.date || '') > (b.date || '') ? 1 : -1);
  else if (f.sort === 'az') list.sort((a, b) => (a.site || '').localeCompare(b.site || ''));
  else if (f.sort === 'job-asc') list.sort((a, b) => (a.jobNumber || '').localeCompare(b.jobNumber || '', undefined, { numeric: true }));
  else if (f.sort === 'job-desc') list.sort((a, b) => (b.jobNumber || '').localeCompare(a.jobNumber || '', undefined, { numeric: true }));
  return list;
}

}

function confirmFollowUp(sourceReportId) {
  const source = DB.getReport(sourceReportId);
  if (!source) return;
  const prevActions = [];
  (source.inspections || []).forEach((insp, ii) => {
    const ni = normalizeInsp(insp);
    (ni.examinations || []).forEach((exam, ei) => {
      (exam.actions || []).forEach(a => {
        prevActions.push({
          id: uid(),
          sourceReportId: source.id,
          sourceReportLabel: `${source.site || 'Unnamed Site'} — ${fmtDate(source.date)}`,
          inspRef: `${ii + 1}.${ei + 1}`,
          examTitle: exam.title || `Examination ${ei + 1}`,
          originalNote: a.note,
          assignedTo: a.contactName || null,
          status: 'pending',
          reviewNote: ''
        });
      });
    });
  });
  const r = newReport();
  r.prevActions = prevActions;
  r.sourceReportId = sourceReportId;
  if (source.jobNumber) r.jobNumber = source.jobNumber;
  if (source.site) r.site = source.site;
  DB.saveReport(r);
  state.report = r;
  closeModal();
  navigate('editor');
}

function renderPrevActionsSection(r) {
  const items = r.prevActions || [];
  if (!items.length) return '';
  const completed = items.filter(a => a.status === 'complete').length;
  const inProg   = items.filter(a => a.status === 'in-progress').length;
  const pending  = items.filter(a => a.status === 'pending').length;
  const na       = items.filter(a => a.status === 'na').length;
  const srcLabel = items[0]?.sourceReportLabel || '';
  return `<div class="editor-section" id="prev-actions-section">
    <div class="section-header">
      <div class="section-title">📋 Previous Meeting Actions</div>
      <span style="font-size:12px;color:var(--muted);font-weight:600">${completed}/${items.length} complete</span>
    </div>
    ${srcLabel ? `<div style="font-size:12px;color:var(--muted);margin-bottom:10px">From: ${esc(srcLabel)}</div>` : ''}
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${completed > 0 ? `<span style="background:#dcfce7;color:#14532d;border:1px solid #86efac;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">✓ ${completed} Complete</span>` : ''}
      ${inProg > 0 ? `<span style="background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">⏳ ${inProg} In Progress</span>` : ''}
      ${pending > 0 ? `<span style="background:#fef3c7;color:#92400e;border:1px solid #fcd34d;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">⚡ ${pending} Pending</span>` : ''}
      ${na > 0 ? `<span style="background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">— ${na} N/A</span>` : ''}

}

function renderPrevActionCard(a) {
  const STATUS = [
    { val: 'pending',     label: 'Pending',     bg: '#fef3c7', color: '#92400e', border: '#fcd34d' },
    { val: 'in-progress', label: 'In Progress',  bg: '#dbeafe', color: '#1d4ed8', border: '#93c5fd' },
    { val: 'complete',    label: 'Complete',      bg: '#dcfce7', color: '#14532d', border: '#86efac' },
    { val: 'na',          label: 'N/A',           bg: '#f1f5f9', color: '#64748b', border: '#cbd5e1' },
  ];
  const cur = STATUS.find(s => s.val === a.status) || STATUS[0];
  return `<div class="prev-action-card" id="pac-${a.id}"
    style="border:1.5px solid ${cur.border};background:${cur.bg}20">
    <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
      <span style="font-size:11px;font-weight:700;color:#64748b;background:#f1f5f9;border-radius:4px;padding:1px 7px;white-space:nowrap;margin-top:2px;flex-shrink:0">${esc(a.inspRef)}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:#0f172a;line-height:1.4">${esc(a.originalNote)}</div>
        ${a.assignedTo ? `<div style="font-size:11px;color:#64748b;margin-top:2px">👤 ${esc(a.assignedTo)}</div>` : ''}

function setPrevActionStatus(actionId, status) {
  const r = state.report;
  if (!r?.prevActions) return;
  const a = r.prevActions.find(x => x.id === actionId);
  if (!a) return;
  a.status = status;
  DB.saveReport(r);
  const section = document.getElementById('prev-actions-section');
  if (section) section.outerHTML = renderPrevActionsSection(r);
}

function setPrevActionNote(actionId, note) {
  const r = state.report;
  if (!r?.prevActions) return;
  const a = r.prevActions.find(x => x.id === actionId);
  if (!a) return;
  a.reviewNote = note;
  DB.saveReport(r);
}

function editReport(id) {
  state.report = DB.getReport(id);
  if (!state.report) return;
  navigate('editor');
  // If any photos are stripped (quota aftermath), silently pull from cloud —
  // another device may have since pushed the real data back up.
  const hasStripped = (state.report.inspections || []).some(insp =>
    (insp.examinations || []).some(ex =>
      (ex.photos || []).some(p => (!p.data || p.data === '[photo]') && !p.url)));
  if (hasStripped && navigator.onLine) {
    Sync.pull(false).then(() => {
      // Sync.pull already patched state.report in-memory via Object.assign.
      // Only reload from localStorage if it now actually has the photos restored
      // (i.e. quota freed up enough to save them). Otherwise keep the in-memory version.
      const fresh = DB.getReport(id);
      const freshStillStripped = !fresh || (fresh.inspections || []).some(insp =>
        (insp.examinations || []).some(ex =>
          (ex.photos || []).some(p => (!p.data || p.data === '[photo]') && !p.url)));
      if (fresh && !freshStillStripped) state.report = fresh;
      render();
    }).catch(() => {});
  }
}
function delReport(id) {
  if (!confirm('Delete this report?')) return;
  const _delR = DB.getReport(id);
  ActivityLog.add('deleted report', 'report', (_delR && (_delR.site || _delR.jobNumber)) || 'Report');
  DB.deleteReport(id);
  render();
}

function getInspData() {
  const raw = DB.profile();
  // Migrate old single-object format → new multi-inspector format
  if (raw && !Array.isArray(raw.inspectors)) {
    if (raw.name) {
      const migrated = { id: uid(), name: raw.name, company: raw.company||'', email: raw.email||'' };
      const d = { activeId: migrated.id, inspectors: [migrated] };
      DB.saveProfile(d);
      return d;
    }
    return { activeId: null, inspectors: [] };
  }
  return raw || { activeId: null, inspectors: [] };
}
function activeInspector() {
  const d = getInspData();
  if (!d.inspectors.length || !d.activeId) return null;
  return d.inspectors.find(i => i.id === d.activeId) || null;
}
function initials(name) {
  if (!name) return '';
  return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

    </div>
    <div class="form-group">
      <label>New Team Access Code</label>
      <input id="change-code-input" type="text" class="form-input" placeholder="Enter team code"
        style="text-transform:uppercase;font-weight:700;letter-spacing:.05em"
        oninput="this.value=this.value.toUpperCase();document.getElementById('change-code-error').textContent=''">
      <p id="change-code-error" style="color:#dc2626;font-size:12px;margin-top:4px;font-weight:600;min-height:16px"></p>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button id="change-code-btn" class="btn btn-primary" onclick="submitChangeCompanyCode()">Switch Team</button>
    </div>
  </div>`);
  setTimeout(() => document.getElementById('change-code-input')?.focus(), 50);
}

async function submitChangeCompanyCode() {
  const code = (document.getElementById('change-code-input')?.value || '').trim().toUpperCase();
  const errEl = document.getElementById('change-code-error');
  const btn   = document.getElementById('change-code-btn');
  if (!code) { if (errEl) errEl.textContent = 'Enter a team access code'; return; }
  if (!_sb) {
    // Offline — just switch without validation
    const setup = DB.getSetup();
    if (setup) { setup.companyCode = code; localStorage.setItem('si_setup', JSON.stringify(setup)); }
    localStorage.removeItem('si_rep');
    closeModal();
    toast('Team code updated — working offline');
    render();
    return;
  }
  btn.textContent = 'Checking…'; btn.disabled = true;
  if (errEl) errEl.textContent = '';
  try {
    const { data: match, error: chkErr } = await _sb
      .from('companies').select('code').eq('code', code).maybeSingle();
    if (chkErr) throw chkErr;
    if (!match) {
      if (errEl) errEl.textContent = '✕ Code not recognised — check with your team administrator';
      btn.textContent = 'Switch Team'; btn.disabled = false;
      return;
    }
    // Valid — update code in setup first, then pull new team's data, then clear old local reports
    // (clear AFTER pull so that if pull fails, user still has their old reports)
    const setup = DB.getSetup();
    if (setup) { setup.companyCode = code; localStorage.setItem('si_setup', JSON.stringify(setup)); }
    closeModal();
    toast('Switched team — syncing…');
    localStorage.removeItem('si_rep');  // clear old team reports before pulling new team's
    await Sync.pull(false);
    render();
    toast('Synced to ' + code);
  } catch(e) {
    btn.textContent = 'Switch Team'; btn.disabled = false;
    toast('Could not connect — check your internet connection');
  }
}

    return false;
  }
  return true;
}

function updateInspector(id) {
  const name = document.getElementById('ei-name')?.value.trim();
  if (!name) { alert('Please enter a name'); return; }
  const role = document.getElementById('ei-role')?.value.trim();
  const company = document.getElementById('ei-company')?.value.trim();
  const email = document.getElementById('ei-email')?.value.trim();

  const d = getInspData();
  const i = d.inspectors.findIndex(x => x.id === id);
  if (i >= 0) d.inspectors[i] = { ...d.inspectors[i], name, role: role||'', company: company||'CFMA', email: email||'', updatedAt: new Date().toISOString() };
  DB.saveProfile(d);
  syncInspectorToContacts(d.inspectors[i >= 0 ? i : 0]);
  closeModal();
  renderProfile(document.getElementById('main'));

// Auto-sync an inspector profile into the contacts list
function syncInspectorToContacts(insp) {
  if (!insp || !insp.name) return;
  const cons = DB.contacts();
  const idx = insp.email
    ? cons.findIndex(c => c.email && c.email.toLowerCase() === insp.email.toLowerCase())
    : cons.findIndex(c => c.name.toLowerCase() === insp.name.toLowerCase());
  if (idx >= 0) {
    // Update existing entry to keep in sync
    cons[idx] = { ...cons[idx], name: insp.name, company: insp.company || cons[idx].company || '', email: insp.email || cons[idx].email || '' };
  } else {
    cons.push({ id: uid(), name: insp.name, company: insp.company || '', email: insp.email || '', phone: '' });
  }
  DB.saveContacts(cons);
}
function switchInspector(id) {
  const d = getInspData();
  d.activeId = id;
  DB.saveProfile(d);
  renderProfile(document.getElementById('main'));
  toast('Inspector switched');
}

function deleteInspector(id) {
  if (!confirm('Remove this inspector?')) return;
  const d = getInspData();
  d.inspectors = d.inspectors.filter(i => i.id !== id);
  if (d.activeId === id) d.activeId = d.inspectors[0]?.id || null;
  DB.saveProfile(d);
  renderProfile(document.getElementById('main'));
}

function profileInspectorBar() {
  const insp = activeInspector();
  const r = state.report;
  const createdBy = r && r.createdBy;

  if (!insp) {
    return `<div class="profile-prompt" onclick="navigate('profile')">

  }

  const isMismatch = createdBy && insp.name && insp.name.trim().toLowerCase() !== createdBy.trim().toLowerCase();

  const sub = [insp.company, insp.email].filter(Boolean).join(' · ');
  return `<div class="inspector-bar" onclick="navigate('profile')" title="Switch inspector">

    </div>
    <span style="color:var(--muted);font-size:12px">Switch ›</span>
  </div>
  ${isMismatch ? `
  <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:10px 12px;margin:6px 0 2px;display:flex;align-items:center;gap:10px">

  </div>` : ''}`;
}
