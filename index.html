// Render the quick-links bar for a given inspection (subject-aware)
function renderQuickLinks(inspId, subject, currentTags) {
  const used = new Set((currentTags || []).map(t => t.toLowerCase()));
  const pinned = DB.pinnedTagsFor(subject);
  const pills = pinned.map(t => {
    const applied = used.has(t.toLowerCase());
    const cls = applied ? 'tag-ql tag-ql-pinned' : 'tag-ql';
    const onclick = applied ? '' : `onclick="addInspTag('${inspId}','${esc(t)}')"`;
    return `<span class="${cls}" ${onclick} title="${applied?'Already added':'Add &quot;'+esc(t)+'&quot;'}" style="${applied?'opacity:.45;cursor:default;':''}">${esc(t)}</span>`;
  }).join('');
  const managePills = pinned.map(t =>
    `<span class="tag-ql tag-ql-pinned" style="padding-right:4px">${esc(t)}<span class="tag-ql-unpin" title="Remove from quick links" data-tag="${esc(t)}" onclick="unpinTagQL(this,'${inspId}')">×</span></span>`
  ).join('');
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Quick add</span>
      <button class="tag-ql-pin" id="qlbtn-${inspId}" onclick="toggleQLManage('${inspId}')" title="Manage quick links">✎ Manage</button>
    </div>
    <div class="tag-quicklinks" id="ql-${inspId}">${pills}</div>
    <div class="tag-quicklinks" id="qlm-${inspId}" style="display:none;border-top:1px dashed var(--border);padding-top:8px;margin-top:4px">${managePills}</div>`;
}

function renderInspCard(insp) {
  insp = normalizeInsp(insp);
  const tags = insp.tags || [];
  const exams = insp.examinations || [];
  const tagBadges = tags.length
    ? `<div class="insp-tag-strip" id="ts-${insp.id}">${tags.map(t => `<span class="insp-tag-badge" data-inspid="${insp.id}" data-tag="${esc(t)}" onclick="event.stopPropagation();removeInspTagBadge(this)">${esc(t)} ×</span>`).join('')}</div>`
    : `<div class="insp-tag-strip" id="ts-${insp.id}"></div>`;
  const totalPhotos = exams.reduce((sum, e) => sum + (e.photos || []).length, 0);
  const statParts = [];
  if (totalPhotos > 0) statParts.push(`📷 ${totalPhotos} photo${totalPhotos !== 1 ? 's' : ''}`);
  if (exams.length > 0) statParts.push(`📋 ${exams.length} exam${exams.length !== 1 ? 's' : ''}`);
  const suggestions = getTagSuggestions('', tags);
  if (insp.subject === 'cbr') return renderCbrCard(insp);
  if (insp.subject === 'audio_meeting') return renderAudioMeetingCard(insp);
  const isConstruction = insp.subject === 'construction';
  return `<div class="insp-card" id="ic-${insp.id}">
    <div class="insp-card-header" onclick="toggleInsp('${insp.id}')">
      <div class="insp-card-title">
        <span class="insp-icon">${insp.icon || '📋'}</span>
        <div style="min-width:0">
          <div class="insp-label">${esc(insp.subjectLabel)}</div>
          ${tagBadges}
          <div class="insp-stats-sm" id="sm-${insp.id}">${statParts.join(' · ')}</div>
        </div>
      </div>
      <div class="insp-card-actions">
        <button class="btn btn-xs btn-danger-ghost" onclick="event.stopPropagation();removeInsp('${insp.id}')">✕</button>
        <span class="chevron" id="chev-${insp.id}">▾</span>
      </div>
    </div>
    <div class="insp-body" id="ib-${insp.id}" style="display:none">
      ${isConstruction ? `
      <div class="insp-section">
        <div class="insp-section-title">Inspection Type</div>
        <div class="insp-cat-grid" id="catgrid-${insp.id}">
          ${CONSTRUCTION_CATEGORIES.map(cat => {
            const active = tags.some(t => t.toLowerCase() === cat.toLowerCase());
            return `<button class="insp-cat-pill${active ? ' active' : ''}" onclick="toggleConstructionCat('${insp.id}','${esc(cat)}')">${esc(cat)}</button>`;
          }).join('')}
        </div>
      </div>` : `
      <div class="insp-section">
        <div class="insp-section-title">Inspection Tags</div>
        ${renderQuickLinks(insp.id, insp.subject, tags)}
        <div class="tag-input-wrap">
          <input class="tag-input" id="ti-${insp.id}" placeholder="Add tag…" autocomplete="off"
            list="tdl-${insp.id}"
            onkeydown="handleTagKey(event,'${insp.id}')"
            oninput="updateTagDl('${insp.id}',this.value)">
          <datalist id="tdl-${insp.id}">${suggestions.map(t => `<option value="${esc(t)}">`).join('')}</datalist>
          <button class="btn btn-xs btn-primary" onclick="commitTag('${insp.id}')">＋</button>
        </div>
      </div>`}
      ${renderPhotoMapToggle(insp)}
      <div id="exams-${insp.id}">
        ${exams.map((e, i) => renderExamination(e, insp.id, i)).join('')}
      </div>
      <div class="add-exam-row">
        <button class="btn btn-sm btn-ghost" style="width:100%" onclick="addExamination('${insp.id}')">＋ Add Examination</button>
      </div>
      ${(() => {
        const allPx = (insp.examinations||[]).flatMap(e => e.photos||[]).filter(p => photoSrc(p));
        const geoPx = getGeoPhotos(insp);
        if (!allPx.length && !geoPx.length) return '';
        return `<div style="padding:10px 12px;border-top:1px solid #e0eeff;display:flex;flex-direction:column;gap:7px">
          ${geoPx.length > 0 ? `<button class="btn btn-sm" style="width:100%;background:#f0f9ff;border:1.5px solid #bae6fd;color:#0369a1;font-weight:600;gap:6px" onclick="openLocationReport('${insp.id}')">
            📍 View Location Report <span style="font-weight:400;font-size:11px">(${geoPx.length} photo${geoPx.length !== 1 ? 's' : ''} mapped)</span>
          </button>` : ''}
          ${allPx.length > 0 ? `<button class="btn btn-sm" id="backup-btn-${insp.id}" style="width:100%;background:#f0fdf4;border:1.5px solid #86efac;color:#166534;font-weight:600;gap:6px" onclick="backupInspectionPhotos('${insp.id}')">
            💾 Backup Photos <span style="font-weight:400;font-size:11px">(${allPx.length} photo${allPx.length !== 1 ? 's' : ''})</span>
          </button>` : ''}
        </div>`;
      })()}
    </div>
  </div>`;
}

// Tag interaction functions
function handleTagKey(e, inspId) { if (e.key === 'Enter') { e.preventDefault(); commitTag(inspId); } }
function commitTag(inspId) {
  const inp = document.getElementById(`ti-${inspId}`);
  if (!inp || !inp.value.trim()) return;
  const label = inp.value.trim();
  addInspTag(inspId, label);
  inp.value = '';
  updateTagDl(inspId, '');
}

function addInspTag(inspId, label) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.tags) insp.tags = [];
  if (insp.tags.some(t => t.toLowerCase() === label.toLowerCase())) return;
  insp.tags.push(label);
  if (!TAGS_PRESET.some(t => t.toLowerCase() === label.toLowerCase())) DB.saveCustomTag(label);
  DB.saveReport(state.report);
  const strip = document.getElementById(`ts-${inspId}`);
  if (strip) {
    strip.insertAdjacentHTML('beforeend',
      `<span class="insp-tag-badge" data-inspid="${inspId}" data-tag="${esc(label)}" onclick="event.stopPropagation();removeInspTagBadge(this)">${esc(label)} ×</span>`);
  }
  refreshQuickLinks(inspId, insp.tags);
  updateTagDl(inspId, '');
  const isPinned = DB.pinnedTagsFor(insp.subject).some(t => t.toLowerCase() === label.toLowerCase());
  if (!isPinned) showPinPrompt(inspId, label);
}

function removeInspTagBadge(badge) {
  const inspId = badge.dataset.inspid, tag = badge.dataset.tag;
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  insp.tags = (insp.tags || []).filter(t => t !== tag);
  DB.saveReport(state.report);
  badge.remove();
  if (insp.subject === 'construction') {
    refreshConstructionCatGrid(insp);
  } else {
    refreshQuickLinks(inspId, insp.tags);
    updateTagDl(inspId, '');
  }
}

function toggleConstructionCat(inspId, cat) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.tags) insp.tags = [];
  const idx = insp.tags.findIndex(t => t.toLowerCase() === cat.toLowerCase());

function refreshConstructionCatGrid(insp) {
  const grid = document.getElementById(`catgrid-${insp.id}`);

  grid.innerHTML = CONSTRUCTION_CATEGORIES.map(cat => {
    const active = (insp.tags || []).some(t => t.toLowerCase() === cat.toLowerCase());

function refreshQuickLinks(inspId, currentTags) {

    qlm.innerHTML = pinned.map(t =>
      `<span class="tag-ql tag-ql-pinned" style="padding-right:4px">${esc(t)}<span class="tag-ql-unpin" title="Remove from quick links" data-tag="${esc(t)}" onclick="unpinTagQL(this,'${inspId}')">×</span></span>`

// Show a subtle "📌 Save to quick links?" prompt after adding a custom tag

function pinTagAndRefresh(inspId, label) {
  const insp = state.report.inspections.find(i => i.id === inspId);

function toggleQLManage(inspId) {

function unpinTagQL(span, inspId) {

// EXAMINATION TAG FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function handleExamTagKey(e, inspId, examId) { if (e.key === 'Enter') { e.preventDefault(); commitExamTag(inspId, examId); } }
function commitExamTag(inspId, examId) {
  const inp = document.getElementById(`eti-${examId}`);
  if (!inp || !inp.value.trim()) return;
  addExamTag(inspId, examId, inp.value.trim());
  inp.value = '';
  updateExamTagDl(inspId, examId, '');
}
function addExamTag(inspId, examId, label) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  if (!exam.tags) exam.tags = [];
  if (exam.tags.some(t => t.toLowerCase() === label.toLowerCase())) return;
  exam.tags.push(label);
  if (!TAGS_PRESET.some(t => t.toLowerCase() === label.toLowerCase())) DB.saveCustomTag(label);
  DB.saveReport(state.report);
  // Add badge to strip
  const strip = document.querySelector(`#exam-${examId} .exam-tag-strip`);
  if (strip) {
    strip.insertAdjacentHTML('beforeend',
      `<span class="insp-tag-badge" data-examid="${examId}" data-tag="${esc(label)}" onclick="removeExamTagBadge(this)">${esc(label)} ×</span>`);
  }
  refreshExamQuickLinks(inspId, examId, exam.tags);
  updateExamTagDl(inspId, examId, '');
  const isPinned = DB.pinnedTagsFor(insp.subject).some(t => t.toLowerCase() === label.toLowerCase());
  if (!isPinned) showExamPinPrompt(inspId, examId, label);
}
function removeExamTagBadge(badge) {
  const examId = badge.dataset.examid, tag = badge.dataset.tag;
  const insp = state.report.inspections.find(i => (i.examinations || []).some(e => e.id === examId));
  if (!insp) return;
  const exam = insp.examinations.find(e => e.id === examId);
  if (!exam) return;
  exam.tags = (exam.tags || []).filter(t => t !== tag);
  DB.saveReport(state.report);
  badge.remove();
  refreshExamQuickLinks(insp.id, examId, exam.tags);
  updateExamTagDl(insp.id, examId, '');
}
function refreshExamQuickLinks(inspId, examId, currentTags) {
  const ql = document.getElementById(`eql-${examId}`);
  const qlm = document.getElementById(`eqlm-${examId}`);
  if (!ql) return;
  const insp = state.report.inspections.find(i => i.id === inspId);
  const subject = insp ? insp.subject : 'other';
  const used = new Set((currentTags || []).map(t => t.toLowerCase()));
  const pinned = DB.pinnedTagsFor(subject);
  ql.innerHTML = pinned.map(t => {
    const applied = used.has(t.toLowerCase());
    const cls = applied ? 'tag-ql tag-ql-pinned' : 'tag-ql';
    const onclick = applied ? '' : `onclick="addExamTag('${inspId}','${examId}','${esc(t)}')"`;
    return `<span class="${cls}" ${onclick} title="${applied?'Already added':'Add &quot;'+esc(t)+'&quot;'}" style="${applied?'opacity:.45;cursor:default;':''}">${esc(t)}</span>`;
  }).join('');
  if (qlm && qlm.style.display !== 'none') {
    qlm.innerHTML = pinned.map(t =>
      `<span class="tag-ql tag-ql-pinned" style="padding-right:4px">${esc(t)}<span class="tag-ql-unpin" title="Remove" data-tag="${esc(t)}" onclick="unpinExamTagQL(this,'${inspId}','${subject}')">×</span></span>`
    ).join('');
  }
}
function toggleExamQLManage(inspId, examId, subject) {
  const qlm = document.getElementById(`eqlm-${examId}`);
  const btn = document.getElementById(`eqlbtn-${examId}`);
  if (!qlm) return;
  const open = qlm.style.display !== 'none';
  qlm.style.display = open ? 'none' : 'flex';

}
function unpinExamTagQL(span, inspId, subject) {
  const tag = span.dataset.tag;

  const insp = state.report.inspections.find(i => i.id === inspId);

    (insp.examinations || []).forEach(exam => refreshExamQuickLinks(inspId, exam.id, exam.tags));
    refreshQuickLinks(inspId, insp.tags);
  }
  toast(`"${tag}" removed from quick links`);
}
function updateExamTagDl(inspId, examId, query) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const exam = insp && (insp.examinations || []).find(e => e.id === examId);

  if (!dl || !exam) return;
  dl.innerHTML = getTagSuggestions(query, exam.tags || []).map(t => `<option value="${esc(t)}">`).join('');
}
function showExamPinPrompt(inspId, examId, label) {
  const existing = document.getElementById(`expinprompt-${examId}`);
  if (existing) existing.remove();
  const wrap = document.getElementById(`eti-${examId}`)?.closest('.exam-section');

  setTimeout(() => { if (div.parentNode) div.remove(); }, 8000);
}
function pinExamTagAndRefresh(inspId, examId, label, subject) {

    (insp.examinations || []).forEach(exam => refreshExamQuickLinks(inspId, exam.id, exam.tags));

  toast(`"${label}" added to quick links`);
}

// EXAMINATION MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function updateInspStats(insp) {
  const sm = document.getElementById(`sm-${insp.id}`);
  if (!sm) return;
  const exams = insp.examinations || [];
  const totalPhotos = exams.reduce((sum, e) => sum + (e.photos || []).length, 0);
  const parts = [];
  if (totalPhotos > 0) parts.push(`📷 ${totalPhotos} photo${totalPhotos !== 1 ? 's' : ''}`);
  if (exams.length > 0) parts.push(`📋 ${exams.length} exam${exams.length !== 1 ? 's' : ''}`);
  sm.textContent = parts.join(' · ');
}
function addExamination(inspId) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.examinations) insp.examinations = [];
  const exam = { id: uid(), tags: [], notesLines: [], actions: [], photos: [] };
  insp.examinations.push(exam);
  DB.saveReport(state.report);
  const container = document.getElementById(`exams-${inspId}`);
  if (container) {
    const idx = insp.examinations.length - 1;
    container.insertAdjacentHTML('beforeend', renderExamination(exam, inspId, idx));
    document.getElementById(`exam-${exam.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  updateInspStats(insp);
}
function setExamTitle(inspId, examId, title) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const exam = (insp?.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  exam.title = title;
  DB.saveReport(state.report);
}

const EXAM_STATUSES = ['', 'pass', 'action', 'urgent'];
function examStatusLabel(status) {
  return { '': 'Set Status', pass: '✓ Pass', action: '⚠ Action Required', urgent: '🔴 Urgent' }[status || ''];
}
function cycleExamStatus(inspId, examId, btn) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const exam = (insp?.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  const next = EXAM_STATUSES[(EXAM_STATUSES.indexOf(exam.status || '') + 1) % EXAM_STATUSES.length];
  exam.status = next;
  DB.saveReport(state.report);
  btn.dataset.status = next;
  btn.textContent = examStatusLabel(next);
}

function deleteExamination(inspId, examId) {
  if (!confirm('Remove this examination?')) return;
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  insp.examinations = (insp.examinations || []).filter(e => e.id !== examId);
  DB.saveReport(state.report);
  const container = document.getElementById(`exams-${inspId}`);
  if (container) container.innerHTML = insp.examinations.map((e, i) => renderExamination(e, inspId, i)).join('');
  updateInspStats(insp);
}

// NOTE LINE FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function autoResizeNL(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
function addNoteLine(inspId, examId) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  const nl = { id: uid(), text: '' };
  if (!exam.notesLines) exam.notesLines = [];
  exam.notesLines.push(nl);
  DB.saveReport(state.report);
  const container = document.getElementById(`nl-${examId}`);
  if (container) {
    const hint = container.querySelector('.note-empty-hint');
    if (hint) hint.remove();
    const idx = exam.notesLines.length - 1;
    container.insertAdjacentHTML('beforeend', renderNoteLine(nl, inspId, examId, idx));
    const newTa = document.getElementById(`nline-${nl.id}`)?.querySelector('textarea');
    if (newTa) { newTa.focus(); autoResizeNL(newTa); }
  }
}
function deleteNoteLine(inspId, examId, nlId) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  exam.notesLines = (exam.notesLines || []).filter(n => n.id !== nlId);
  DB.saveReport(state.report);
  document.getElementById(`nline-${nlId}`)?.remove();
  const container = document.getElementById(`nl-${examId}`);
  if (container) {
    container.querySelectorAll('.note-line-num').forEach((span, i) => span.textContent = `${i + 1}.`);
    if (exam.notesLines.length === 0) {
      container.innerHTML = `<div class="note-empty-hint" onclick="addNoteLine('${inspId}','${examId}')">Tap to add a note line…</div>`;
    }
  }
}
function setNoteLine(inspId, examId, nlId, text) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  const nl = (exam.notesLines || []).find(n => n.id === nlId);
  if (nl) { nl.text = text; DB.saveReport(state.report); }
}

// ACTION FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function showAddActionModal(inspId, examId) {
  const contacts = DB.contacts();
  const setup = DB.getSetup();
  const selfName = activeInspector()?.name || setup?.userName || '';
  const attendees = (state.report?.attendees || []);

  // Build "present" chips — self first, then attendees, deduped by name
  const presentPeople = [];
  if (selfName) presentPeople.push({ id: '__self__', name: selfName, sub: 'Myself' });
  attendees.forEach(a => {
    if (!presentPeople.some(p => p.name.toLowerCase() === a.name.toLowerCase())) {
      // try to match to a contact for the id
      const matched = contacts.find(c => c.name.toLowerCase() === a.name.toLowerCase());
      presentPeople.push({ id: matched?.id || '__att__' + a.name, name: a.name, sub: a.company || a.email || '' });
    }
  });

  const presentHtml = presentPeople.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px">
        ${presentPeople.map(p => `
          <button type="button" class="action-assignee-chip" data-id="${esc(p.id)}" data-name="${esc(p.name)}"
            onclick="selectActionAssignee(this)"
            style="display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:20px;border:1.5px solid #bae6fd;background:#f0f9ff;cursor:pointer;font-size:13px;transition:all .15s">
            <span style="font-weight:600;color:var(--primary)">${esc(p.name)}</span>
            ${p.sub ? `<span style="color:var(--muted);font-size:11px">${esc(p.sub)}</span>` : ''}
          </button>`).join('')}
      </div>`
    : `<p style="font-size:12px;color:var(--muted);margin:0 0 4px">No attendees on this report yet.</p>`;

  showModal(`<div class="modal-header">
    <h3>Add Action</h3>
    <button class="icon-btn-dark" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body">
    <div class="form-group">
      <label>Note / Description *</label>
      <textarea id="act-note" class="form-textarea" placeholder="e.g. CBR test required, check drainage alignment…" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Assign To</label>
      <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Present at this inspection</div>
      ${presentHtml}
      <div style="margin-top:10px;position:relative">
        <input id="act-contact-search" type="text" class="form-input" placeholder="Search contacts…"
          style="padding-right:32px" oninput="filterActionContacts(this.value)" autocomplete="off">
        <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none">🔍</span>
      </div>
      <div id="act-contact-results" style="display:none;border:1px solid #e0eeff;border-top:none;border-radius:0 0 8px 8px;max-height:160px;overflow-y:auto;background:#fff"></div>
      <div id="act-assignee-display" style="display:none;margin-top:6px;padding:6px 10px;background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:8px;font-size:13px;display:flex;align-items:center;justify-content:space-between">
        <span id="act-assignee-label" style="font-weight:600;color:var(--primary)"></span>
        <button type="button" onclick="clearActionAssignee()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;line-height:1">×</button>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="commitAction('${inspId}','${examId}')">Add Action</button>
    </div>
  </div>`);

  // hidden state for selected assignee
  window._actionAssignee = null;
  setTimeout(() => document.getElementById('act-note')?.focus(), 100);
}

function selectActionAssignee(btn) {
  window._actionAssignee = { id: btn.dataset.id, name: btn.dataset.name };
  // highlight chip
  document.querySelectorAll('.action-assignee-chip').forEach(c => {
    c.style.background = '#f0f9ff';
    c.style.borderColor = '#bae6fd';
    c.style.fontWeight = '';
  });
  btn.style.background = '#0369a1';
  btn.style.borderColor = '#0369a1';
  btn.querySelectorAll('span').forEach(s => s.style.color = '#fff');
  showActionAssigneeDisplay(btn.dataset.name);
}

function filterActionContacts(q) {
  const contacts = DB.contacts();
  const results = document.getElementById('act-contact-results');
  if (!q.trim()) { results.style.display = 'none'; return; }
  const lower = q.toLowerCase();
  const matches = contacts.filter(c =>
    c.name.toLowerCase().includes(lower) ||
    (c.company || '').toLowerCase().includes(lower) ||
    (c.email || '').toLowerCase().includes(lower)
  ).slice(0, 8);
  if (!matches.length) {
    results.innerHTML = `<div style="padding:10px 12px;font-size:13px;color:var(--muted)">No contacts found —
      <button type="button" onclick="useManualActionAssignee()" style="background:none;border:none;color:var(--primary);cursor:pointer;font-weight:600;padding:0">use "${esc(q)}"</button>
    </div>`;
  } else {
    results.innerHTML = matches.map(c => `
      <div onclick="pickActionContact('${esc(c.id)}','${esc(c.name)}')"

  let contactId = null, contactName = null;
  if (assignee) {
    contactName = assignee.name;
    if (assignee.id && !assignee.id.startsWith('__')) contactId = assignee.id;
    else if (assignee.id === '__self__') contactName = assignee.name;
  }
  const action = { id: uid(), note, contactId: contactId || null, contactName: contactName || null };
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(e => e.id === examId);
  if (!exam) return;

  exam.actions.push(action);

  const list = document.getElementById(`al-${examId}`);
  if (list) list.insertAdjacentHTML('beforeend', renderAction(action, inspId, examId));

// ── WEATHER AUTO-DETECT ─────────────────────────────────────
function mapWeatherCode(code, windKmh) {
  if (windKmh > 45) return 'Windy';
  if (code === 0 || code === 1) return 'Fine';
  if (code === 2 || code === 3 || (code >= 45 && code <= 48)) return 'Overcast';
  if ((code >= 51 && code <= 55) || code === 61 || code === 62 || code === 80 || code === 81) return 'Light Rain';
  if (code === 63 || code === 65 || code === 66 || code === 67 || code === 82 || code >= 95) return 'Heavy Rain';
  return 'Overcast';
}

async function autoDetectWeather() {
  const btn = document.getElementById('wx-btn');
  const src = document.getElementById('wx-source');
  if (btn) btn.textContent = '⏳';
  try {
    // 1. Get location from device GPS only
    let latitude, longitude, city = '';
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000, maximumAge: 300000 })
    );
    latitude = pos.coords.latitude;
    longitude = pos.coords.longitude;
    // 2. Reverse geocode to get suburb/city name
    if (!city) {
      try {
        const rg = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
        const rgj = await rg.json();
        city = rgj.address?.suburb || rgj.address?.city || rgj.address?.town || rgj.address?.village || '';
      } catch(e) {}
    }
    // 3. Fetch weather from Open-Meteo
    const wxRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
      `&current=weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`
    );
    const wx = await wxRes.json();
    const weather = mapWeatherCode(wx.current.weather_code, wx.current.wind_speed_10m);
    setField('weather', weather);
    const sel = document.getElementById('inp-weather');
    if (sel) sel.value = weather;
    if (src) src.textContent = `📍 ${city || `${latitude.toFixed(3)}, ${longitude.toFixed(3)}`} · Open-Meteo`;
    if (btn) btn.textContent = '✓';
  } catch(e) {
    if (btn) btn.textContent = '🔄 Auto';
    if (src) src.textContent = 'Could not detect — please select manually';
  }
}

function renderCbrCard(insp) {
  const locs = insp.cbrLocations || [];
  let pass = 0, fail = 0, incomplete = 0;
  locs.forEach(l => {
    const s = cbrLocStatus(l);

    else if (s === 'incomplete' || s === 'empty') incomplete++;
  });

  const locRows = locs.map(loc => {
    const st = cbrLocStatus(loc);
    const barColor = st === 'pass' ? '#16a34a' : st === 'fail' ? '#dc2626' : st === 'incomplete' ? '#d97706' : '#cbd5e1';
    const chips = CBR_KEY_DEPTHS.map(d => {
      const val = cbrCalc(loc.blows || [], d);

      const ok = val >= CBR_PASS_THRESHOLD;

function editCbrLocation(inspId, locId) {

  _cbrEditGps = loc.gps ? { ...loc.gps } : null;

  const rowDepths = [50,100,150,200,250,300,350,400,450];
  const tableRows = rowDepths.map((d, i) => {
    const isKey = d === 150 || d === 300 || d === 450;
    const blowVal = (loc.blows && loc.blows[i] != null && loc.blows[i] !== '') ? loc.blows[i] : '';

      <button class="btn btn-primary" onclick="saveCbrLocation('${inspId}','${loc.id}',${isNew})">Save</button>
    </div>
  </div>`);

  window._cbrEditLocId = loc.id;
  setTimeout(refreshCbrCalc, 60);
}

function refreshCbrCalc() {
  const blows = Array.from({length:9}, (_, i) => {
    const el = document.getElementById(`cbr-blow-${i}`);
    return el ? el.value : '';
  });
  // Update cumulative cells
  let runTotal = 0;
  for (let i = 0; i < 9; i++) {
    const b = Number(blows[i]);
    const cell = document.getElementById(`cbr-cumul-${i}`);
    if (!cell) continue;
    if (Number.isFinite(b) && b > 0) {
      runTotal += b;
      cell.textContent = runTotal;
      cell.style.color = '#334155';
    } else {
      cell.textContent = '—';
      cell.style.color = '#cbd5e1';
    }
  }
  // CBR results
  const box = document.getElementById('cbr-results-box');
  if (!box) return;
  const parts = CBR_KEY_DEPTHS.map(d => {
    const val = cbrCalc(blows, d);
    if (val === null) return `<span style="font-size:12px;color:#94a3b8">${d}mm: —</span>`;
    const ok = val >= CBR_PASS_THRESHOLD;
    return `<span style="font-weight:700;padding:3px 10px;border-radius:6px;background:${ok?'#dcfce7':'#fee2e2'};color:${ok?'#15803d':'#dc2626'}">${d}mm: CBR ${val.toFixed(1)} ${ok?'✓':'✗'}</span>`;
  });
  box.innerHTML = parts.join('');
}

function captureCbrGps() {
  if (!navigator.geolocation) { toast('GPS not available'); return; }
  const disp = document.getElementById('cbr-gps-disp');
  if (disp) disp.textContent = 'Capturing…';
  navigator.geolocation.getCurrentPosition(
    pos => {
      _cbrEditGps = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (disp) disp.textContent = `${_cbrEditGps.lat.toFixed(5)}, ${_cbrEditGps.lng.toFixed(5)}`;
      toast('GPS captured');
    },
    () => { if (disp) disp.textContent = 'GPS failed'; toast('Could not get GPS'); },
    { timeout: 15000, enableHighAccuracy: true }
  );
}

function saveCbrLocation(inspId, locId, isNew) {
  const insp = state.report && state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const blows = Array.from({length:9}, (_, i) => {
    const el = document.getElementById(`cbr-blow-${i}`);
    const v = el ? el.value.trim() : '';
    return v === '' ? null : Number(v);
  });
  const loc = {
    id: locId,
    chainage:    (document.getElementById('cbr-chainage')?.value || '').trim(),
    description: (document.getElementById('cbr-desc')?.value || '').trim(),
    blows,
    gps:   _cbrEditGps || null,
    notes: (document.getElementById('cbr-notes')?.value || '').trim(),
  };
  if (!insp.cbrLocations) insp.cbrLocations = [];
  if (isNew) {
    insp.cbrLocations.push(loc);
  } else {
    const idx = insp.cbrLocations.findIndex(l => l.id === locId);
    if (idx >= 0) insp.cbrLocations[idx] = loc; else insp.cbrLocations.push(loc);
  }
  DB.saveReport(state.report);
  closeModal();
  rerenderInspSection();
  toast(isNew ? 'Location added' : 'Location updated');
}

function deleteCbrLocation(inspId, locId) {
  const insp = state.report && state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  insp.cbrLocations = (insp.cbrLocations || []).filter(l => l.id !== locId);
  DB.saveReport(state.report);
  closeModal();
  rerenderInspSection();
  toast('Location removed');
}

let _meetingRecog = null;
let _meetingInspId = null;
let _meetingActive = false;

function renderAudioMeetingCard(insp) {
  const entries = insp.transcript || [];
  const wordCount = entries.reduce((n, e) => n + (e.text||'').split(/\s+/).filter(Boolean).length, 0);
  const isRec = _meetingInspId === insp.id && _meetingActive;

  const transcriptHtml = entries.length === 0
    ? `<p style="text-align:center;color:#94a3b8;font-size:13px;padding:20px 0">No transcript yet — tap Start Recording to begin</p>`
    : entries.map(e => {
        if (e.isSpeaker) return `<div style="text-align:center;margin:10px 0 6px;color:#7c3aed;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-top:1px dashed #e9d5ff;padding-top:8px">▶ ${esc(e.text)}</div>`;

          <span style="font-size:10px;color:#94a3b8;flex-shrink:0;font-family:monospace">${ts}</span>

      }).join('');

  return `<div class="insp-card" id="ic-${insp.id}">
    <div class="insp-card-header" onclick="toggleInsp('${insp.id}')">
      <div class="insp-card-title">
        <span class="insp-icon" style="position:relative">🎙️${isRec?`<span style="position:absolute;top:-2px;right:-2px;width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite"></span>`:''}
        </span>
        <div style="min-width:0">

          <div class="insp-stats-sm" id="sm-${insp.id}">${isRec?'<span style="color:#ef4444;font-weight:700">● Recording…</span>':entries.length>0?`${entries.length} segment${entries.length!==1?'s':''} · ${wordCount} words`:'No transcript yet'}</div>
        </div>
      </div>
      <div class="insp-card-actions">
        <button class="btn btn-xs btn-danger-ghost" onclick="event.stopPropagation();removeInsp('${insp.id}')">✕</button>

      </div>
    </div>

      <div style="padding:12px">
        <div class="form-group" style="margin-bottom:12px">
          <label>Meeting Context / Agenda <span style="font-weight:400;color:var(--muted);font-size:11px">(optional)</span></label>

        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
          <button id="mtg-rec-btn-${insp.id}"
            class="btn ${isRec?'btn-danger':'btn-primary'}"
            style="flex:1;font-weight:700"
            onclick="toggleMeetingRecording('${insp.id}')">
            ${isRec?'⏹ Stop Recording':'⏺ Start Recording'}
          </button>
          <button class="btn btn-xs btn-ghost" title="Mark speaker change" onclick="addSpeakerLabel('${insp.id}')">🗣 Speaker</button>
          ${entries.length>0?`<button class="btn btn-xs btn-danger-ghost" title="Clear transcript" onclick="clearMeetingTranscript('${insp.id}')">🗑</button>`:''}
        </div>
        ${isRec?`<div id="mtg-interim-${insp.id}" style="padding:8px 12px;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;font-size:13px;color:#9ca3af;font-style:italic;margin-bottom:10px">Listening…</div>`:''}
        <div id="mtg-transcript-${insp.id}" style="max-height:340px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:8px;padding:12px;background:#fafafa">
          ${transcriptHtml}
        </div>
        ${entries.length>0?`<div style="text-align:right;font-size:11px;color:#94a3b8;margin-top:5px">${wordCount} words · ${entries.length} segments</div>`:''}
      </div>

function toggleMeetingRecording(inspId) {
  if (_meetingInspId === inspId && _meetingActive) {
    stopMeetingRecording(inspId);
  } else {
    if (_meetingActive) stopMeetingRecording(_meetingInspId);
    startMeetingRecording(inspId);
  }
}

function startMeetingRecording(inspId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Speech recognition requires Chrome or Edge'); return; }
  const insp = state.report?.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.startedAt) insp.startedAt = new Date().toISOString();
  _meetingRecog = new SR();
  _meetingRecog.continuous = true;
  _meetingRecog.interimResults = true;
  _meetingRecog.lang = 'en-NZ';
  _meetingInspId = inspId;
  _meetingActive = true;
  _meetingRecog.onresult = evt => {
    const insp = state.report?.inspections.find(i => i.id === inspId);
    if (!insp) return;
    let interim = '';
    for (let i = evt.resultIndex; i < evt.results.length; i++) {
      const r = evt.results[i];
      if (r.isFinal) {
        const text = r[0].transcript.trim();
        if (text) {
          if (!insp.transcript) insp.transcript = [];
          insp.transcript.push({ id: uid(), text, timestamp: new Date().toISOString() });
          DB.saveReport(state.report);
          appendMeetingEntry(inspId, insp.transcript[insp.transcript.length-1]);
          updateMeetingStats(inspId);
        }
      } else { interim += r[0].transcript; }
    }
    const el = document.getElementById(`mtg-interim-${inspId}`);
    if (el) el.textContent = interim || 'Listening…';
  };
  _meetingRecog.onerror = e => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    toast(`Microphone: ${e.error}`);
    stopMeetingRecording(inspId);
  };
  _meetingRecog.onend = () => {
    if (_meetingInspId === inspId && _meetingActive) {
      try { _meetingRecog.start(); } catch(e) {}
    }
  };
  try { _meetingRecog.start(); } catch(e) { toast('Could not access microphone'); _meetingActive = false; return; }
  setMeetingBtn(inspId, true);
  toast('🎙️ Recording started');
}

function stopMeetingRecording(inspId) {
  _meetingActive = false;
  _meetingInspId = null;
  if (_meetingRecog) { try { _meetingRecog.stop(); } catch(e) {} _meetingRecog = null; }
  setMeetingBtn(inspId, false);
  const interim = document.getElementById(`mtg-interim-${inspId}`);
  if (interim) interim.remove();
  toast('Recording stopped');
}

function setMeetingBtn(inspId, isRec) {
  const btn = document.getElementById(`mtg-rec-btn-${inspId}`);
  if (!btn) return;
  btn.className = `btn ${isRec?'btn-danger':'btn-primary'}`;
  btn.style.fontWeight = '700';
  btn.textContent = isRec ? '⏹ Stop Recording' : '⏺ Start Recording';
  updateMeetingStats(inspId);
}

function updateMeetingStats(inspId) {
  const sm = document.getElementById(`sm-${inspId}`);
  if (!sm) return;
  const insp = state.report?.inspections.find(i => i.id === inspId);
  const entries = insp?.transcript || [];
  const wc = entries.reduce((n,e)=>n+(e.text||'').split(/\s+/).filter(Boolean).length,0);
  const isRec = _meetingInspId === inspId && _meetingActive;
  sm.innerHTML = isRec ? '<span style="color:#ef4444;font-weight:700">● Recording…</span>'
    : entries.length > 0 ? `${entries.length} segment${entries.length!==1?'s':''} · ${wc} words` : 'No transcript yet';
}

function appendMeetingEntry(inspId, entry) {
  const el = document.getElementById(`mtg-transcript-${inspId}`);
  if (!el) return;
  // Remove empty state placeholder if present
  const empty = el.querySelector('p');
  if (empty) empty.remove();
  if (entry.isSpeaker) {
    const d = document.createElement('div');
    d.style.cssText = 'text-align:center;margin:10px 0 6px;color:#7c3aed;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-top:1px dashed #e9d5ff;padding-top:8px';
    d.textContent = `▶ ${entry.text}`;
    el.appendChild(d);
  } else {
    const t = new Date(entry.timestamp);
    const ts = t.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const d = document.createElement('div');
    d.style.cssText = 'display:flex;gap:8px;margin-bottom:7px;align-items:baseline';
    d.innerHTML = `<span style="font-size:10px;color:#94a3b8;flex-shrink:0;font-family:monospace">${ts}</span><span style="font-size:13px;color:#1e293b;line-height:1.65">${esc(entry.text)}</span>`;
    el.appendChild(d);
  }
  el.scrollTop = el.scrollHeight;
}

function addSpeakerLabel(inspId) {
  const name = prompt('Enter speaker name or label (e.g. "Sam Lee", "Contractor"):');
  if (!name || !name.trim()) return;
  const insp = state.report?.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.transcript) insp.transcript = [];
  const entry = { id: uid(), text: name.trim(), timestamp: new Date().toISOString(), isSpeaker: true };
  insp.transcript.push(entry);
  DB.saveReport(state.report);
  appendMeetingEntry(inspId, entry);
  updateMeetingStats(inspId);
}

function saveMeetingContext(inspId, val) {
  const insp = state.report?.inspections.find(i => i.id === inspId);
  if (insp) { insp.meetingContext = val; DB.saveReport(state.report); }
}

function clearMeetingTranscript(inspId) {
  if (!confirm('Clear all transcript? This cannot be undone.')) return;
  const insp = state.report?.inspections.find(i => i.id === inspId);
  if (!insp) return;
  insp.transcript = []; insp.startedAt = null;
  DB.saveReport(state.report);
  rerenderInspSection();
}
function _commitNewInsp(insp) {
  state.report.inspections.push(insp);
  DB.saveReport(state.report);
  ActivityLog.add('added inspection', 'inspection', insp.subjectLabel || 'Inspection');
  closeModal();
  rerenderInspSection();
  setTimeout(() => {
    const card = document.getElementById(`ic-${insp.id}`);
    if (card) { toggleInsp(insp.id); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  }, 80);
}

// Rank search results: starts-with first, then contains
function searchRank(str, q) {
  const s = (str||'').toLowerCase();
  if (s.startsWith(q)) return 0;
  return 1;
}
function filterAndRank(items, q, getFields) {
  if (!q) return items;
  const ql = q.toLowerCase();
  return items
    .filter(item => getFields(item).some(f => (f||'').toLowerCase().includes(ql)))
    .sort((a,b) => {
      const aStart = getFields(a).some(f => (f||'').toLowerCase().startsWith(ql)) ? 0 : 1;
      const bStart = getFields(b).some(f => (f||'').toLowerCase().startsWith(ql)) ? 0 : 1;
      return aStart - bStart;
    });
}

function sortedCons(contacts, sortBy) {
  const s = sortBy || state.attModalSort || 'name';
  return [...contacts].sort((a,b) =>
    s === 'company'
      ? (a.company||'').localeCompare(b.company||'') || a.name.localeCompare(b.name)
      : a.name.localeCompare(b.name)
  );
}
function conListHtml(contacts) {
  return sortedCons(contacts).map(c=>`<div class="contact-select-item" onclick="addConAsAtt('${c.id}')">
    <div>
      <div style="font-size:14px;font-weight:600">${esc(c.name)}</div>
      ${c.company?`<div class="contact-email-sm">${esc(c.company)}</div>`:''}
      ${c.email?`<div class="contact-email-sm">${esc(c.email)}</div>`:''}
    </div>
    <button class="btn btn-sm btn-ghost">＋</button>
  </div>`).join('');
}
function filterCon(q) {
  const el = document.getElementById('con-list');
  if (!el) return;
  const filtered = q.trim()
    ? filterAndRank(DB.contacts(), q, c => [c.name, c.company, c.email])
    : DB.contacts();
  el.innerHTML = filtered.length
    ? conListHtml(filtered)
    : `<p style="font-size:13px;color:var(--muted);padding:8px 4px">No contacts match "${esc(q)}"</p>`;
}
function setAttModalSort(s) {
  state.attModalSort = s;
  const el = document.getElementById('con-list');
  if (!el) return;
  const q = document.getElementById('an')?.value || '';
  const filtered = DB.contacts().filter(c =>
    !q || c.name.toLowerCase().includes(q.toLowerCase()) ||
    (c.company||'').toLowerCase().includes(q.toLowerCase()) ||
    (c.email||'').toLowerCase().includes(q.toLowerCase())
  );
  el.innerHTML = conListHtml(filtered);
  // Update sort button states
  ['name','company'].forEach(k => {
    const btn = document.getElementById(`att-sort-${k}`);
    if (btn) { btn.className = `btn btn-xs ${s===k?'btn-primary':'btn-ghost'}`; }
  });
}
function addAtt() {
  const name = document.getElementById('an')?.value.trim();
  const company = document.getElementById('ac')?.value.trim();
  const email = document.getElementById('ae')?.value.trim();
  if (!name) { alert('Please enter a name'); return; }
  const att = { id:uid(), name, company:company||'', email:email||'' };
  state.report.attendees.push(att);
  DB.saveReport(state.report);
  // Auto-save to contacts if not already there (match by email, or by name if no email)
  const cons = DB.contacts();
  if (email) {
    if (!cons.find(c=>c.email===email)) { cons.push({id:uid(),name,company:company||'',email}); DB.saveContacts(cons); }
  } else if (name && !cons.find(c=>c.name.toLowerCase()===name.toLowerCase())) {
    cons.push({id:uid(),name,company:company||'',email:''}); DB.saveContacts(cons);
  }
  closeModal();
  document.getElementById('att-list').innerHTML = renderAttendees(state.report.attendees);
}
function addConAsAtt(cid) {
  const con = DB.contacts().find(c=>c.id===cid);
  if (!con) return;
  if (state.report.attendees.find(a=>a.email===con.email && con.email)) {
    toast('Already added'); return;
  }
  state.report.attendees.push({...con});
  DB.saveReport(state.report);
  closeModal();
  document.getElementById('att-list').innerHTML = renderAttendees(state.report.attendees);
}

function renderSites(el) {
  state.jobSel = new Set();
  el.innerHTML = `<div class="screen">
    <div class="form-group" style="margin-bottom:12px">
      <input id="site-filter" type="search" class="form-input" placeholder="Filter sites or job numbers…"
        value="${esc(state.siteFilter||'')}" oninput="updateSiteLists(this.value)">
    </div>
    <div id="site-lists"></div>
    <div style="height:16px"></div>
  </div>`;
  updateSiteLists(state.siteFilter || '');
}
function updateSiteLists(filter) {
  filter = (filter || '').toLowerCase();
  state.siteFilter = filter;
  const jobs = filterAndRank(DB.jobs(), filter, j => [j.number, j.site]);
  const el = document.getElementById('site-lists');
  if (!el) return;

  const nSel = state.jobSel.size;
  const allSel = jobs.length > 0 && jobs.every(j => state.jobSel.has(j.id));

  el.innerHTML = `
    <div class="section-title" style="margin-bottom:8px">Saved Sites &amp; Jobs (${jobs.length})</div>
    ${jobs.length === 0
      ? `<p style="font-size:13px;color:var(--muted)">
          ${filter ? 'No matches' : 'Nothing saved yet — site names and job numbers are saved from reports automatically'}</p>`
      : `<div class="contacts-list" style="margin-bottom:${nSel?'0':'16px'}">${jobs.map(j => `
          <div class="contact-card${state.jobSel.has(j.id)?' selected':''}">
            <input type="checkbox" class="sel-cb" ${state.jobSel.has(j.id)?'checked':''} onchange="toggleJobSel('${j.id}')">
            <div class="contact-avatar" style="background:${j.number?'#eff6ff':'#f0fdf4'};color:${j.number?'#1d4ed8':'#16a34a'};font-size:${j.number?'11px':'18px'};font-weight:700">
              ${j.number?'JOB':'📍'}
            </div>
            <div class="contact-info" style="cursor:pointer" onclick="showJobInspections('${j.id}')">
              <div class="contact-name">${j.number ? esc(j.number) : esc(j.site)}</div>
              ${j.number && j.site ? `<div class="contact-email">${esc(j.site)}</div>` : ''}
            </div>
            <div class="contact-actions">
              <button class="btn btn-sm btn-ghost" onclick="showJobInspections('${j.id}')" style="font-size:11px">History</button>
              <button class="btn btn-sm btn-danger-ghost" onclick="delJob('${j.id}')">Delete</button>
            </div>
          </div>`).join('')}
        </div>
        ${nSel > 0 ? `<div class="sel-bar" style="border-radius:var(--radius-sm)">
          <span>${nSel} selected</span>
          <div class="sel-bar-btns">
            <button class="btn btn-sm btn-ghost" style="color:white;border-color:rgba(255,255,255,.4)" onclick="selectAllJobs(${allSel})">${allSel?'Deselect All':'Select All'}</button>
            <button class="btn btn-sm btn-danger" onclick="deleteSelectedJobs()">🗑 Delete Selected</button>
          </div>
        </div>` : '<div style="height:16px"></div>'}`}`;
}

function toggleJobSel(id) {
  state.jobSel.has(id) ? state.jobSel.delete(id) : state.jobSel.add(id);
  updateSiteLists(state.siteFilter || '');
}
function selectAllJobs(deselect) {
  const jobs = filterAndRank(DB.jobs(), state.siteFilter, j => [j.number, j.site]);
  if (deselect) state.jobSel = new Set();
  else jobs.forEach(j => state.jobSel.add(j.id));
  updateSiteLists(state.siteFilter || '');
}
function deleteSelectedJobs() {
  const n = state.jobSel.size;
  if (!n || !confirm(`Delete ${n} job${n!==1?'s':''}?`)) return;
  DB.saveJobs(DB.jobs().filter(j => !state.jobSel.has(j.id)));
  state.jobSel = new Set();
  updateSiteLists(state.siteFilter || '');
  toast(`Deleted ${n} job${n!==1?'s':''}`);
}
function delJob(id) {
  if (!confirm('Remove this saved job?')) return;
  DB.saveJobs(DB.jobs().filter(j => j.id !== id));
  state.jobSel.delete(id);
  updateSiteLists(state.siteFilter || '');
}

function showJobInspections(jobId) {
  const job = DB.jobs().find(j => j.id === jobId);
  if (!job) return;

  // Match reports by job number (primary) or site name (fallback)
  const reports = DB.reports().filter(r => {
    if (job.number && r.jobNumber && r.jobNumber.toLowerCase() === job.number.toLowerCase()) return true;
    if (job.site && r.site && r.site.toLowerCase() === job.site.toLowerCase()) return true;
    return false;
  }).sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

  const statusBadge = s => {
    if (s === 'complete') return `<span style="background:#dcfce7;color:#15803d;font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px">Complete</span>`;
    return `<span style="background:#fef9c3;color:#a16207;font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px">Draft</span>`;
  };

  const reportRows = reports.length === 0
    ? `<p style="color:var(--muted);font-size:13px;text-align:center;padding:24px 0">No inspection reports found for this job.</p>`
    : reports.map(r => {
        const inspCount = (r.inspections || []).length;
        const photoCount = (r.inspections || []).reduce((s, i) =>
          s + (i.examinations || []).reduce((es, e) => es + (e.photos || []).length, 0), 0);
        const allActions = (r.inspections || []).flatMap(i =>
          (i.examinations || []).flatMap(e => e.actions || []));
        const urgentCount = allActions.filter(a => a.priority === 'urgent').length;
        return `<div onclick="closeModal();editReport('${r.id}')" style="
          padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);
          background:white;margin-bottom:8px;cursor:pointer;transition:border-color .15s"
          onmouseover="this.style.borderColor='#93c5fd'" onmouseout="this.style.borderColor='var(--border)'">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">
            <span style="font-size:14px;font-weight:700">${esc(r.site || 'Untitled')}</span>
            ${statusBadge(r.status)}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px">
            📅 ${esc(r.date || '—')}
            ${r.createdBy ? ` · 👤 ${esc(r.createdBy)}` : ''}
            ${r.createdByDevice ? ` · 📱 ${esc(r.createdByDevice)}` : ''}
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${inspCount ? `<span style="font-size:11px;background:#f0f9ff;color:#0369a1;padding:2px 7px;border-radius:3px;font-weight:600">📋 ${inspCount} inspection${inspCount!==1?'s':''}</span>` : ''}
            ${photoCount ? `<span style="font-size:11px;background:#f0fdf4;color:#15803d;padding:2px 7px;border-radius:3px;font-weight:600">📷 ${photoCount} photo${photoCount!==1?'s':''}</span>` : ''}
            ${urgentCount ? `<span style="font-size:11px;background:#fee2e2;color:#b91c1c;padding:2px 7px;border-radius:3px;font-weight:600">🚨 ${urgentCount} urgent</span>` : ''}
            ${(r.publications||[]).length ? `<span style="font-size:11px;background:#f5f3ff;color:#6d28d9;padding:2px 7px;border-radius:3px;font-weight:600">📄 ${r.publications.length} PDF${r.publications.length!==1?'s':''}</span>` : ''}
          </div>
          ${(r.publications||[]).length ? `
          <div style="margin-top:8px;padding:8px 10px;background:#f5f3ff;border-radius:6px;border:1px solid #ddd6fe">
            <div style="font-size:10.5px;font-weight:700;color:#6d28d9;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">PDF History</div>
            ${r.publications.slice(0,5).map(pub => {
              const dt = new Date(pub.at);
              const label = `${dt.toLocaleDateString()} ${dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
              const typeIcon = pub.type === 'publish' ? '📤' : '🖨️';
              return `<div style="display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid #ede9fe;font-size:12px" onclick="event.stopPropagation()">
                <span style="flex:1;color:#4c1d95">${typeIcon} ${label}${pub.by ? ' · '+esc(pub.by) : ''}</span>
                <button class="btn btn-xs" style="background:#7c3aed;color:white;border:none;padding:2px 8px;border-radius:3px;font-size:11px;cursor:pointer"
                  onclick="event.stopPropagation();reopenReport('${r.id}')">Reopen PDF</button>
              </div>`;
            }).join('')}
            ${r.publications.length > 5 ? `<div style="font-size:11px;color:#7c3aed;margin-top:4px">+${r.publications.length-5} older</div>` : ''}
          </div>` : ''}
        </div>`;
      }).join('');

  const title = job.number
    ? `Job ${esc(job.number)}${job.site ? ` — ${esc(job.site)}` : ''}`
    : esc(job.site);

  const totalPhotos = reports.reduce((s, r) =>
    s + (r.inspections||[]).reduce((si, i) =>
      si + (i.examinations||[]).reduce((se, e) => se + (e.photos||[]).filter(p => photoSrc(p)).length, 0), 0), 0);

  showModal(`
    <div class="modal-header">
      <h3>${title}</h3>
      <button class="icon-btn-dark" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--muted)">${reports.length} report${reports.length!==1?'s':''} found</span>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          ${totalPhotos > 0 ? `<button class="btn btn-sm" style="background:#f0fdf4;border:1.5px solid #86efac;color:#166534;font-weight:600" onclick="closeModal();showJobPhotos('${job.id}')">📷 All Photos (${totalPhotos})</button>` : ''}
          <button class="btn btn-sm btn-primary" onclick="closeModal();newReportForJob('${job.id}')">＋ New Inspection</button>
        </div>
      </div>
      ${reportRows}
    </div>
  `);
}

function newReportForJob(jobId) {
  const job = DB.jobs().find(j => j.id === jobId);
  const r = newReport();
  if (job) {
    if (job.site)   r.site      = job.site;
    if (job.number) r.jobNumber = job.number;
  }
  DB.saveReportLocal(r);
  ActivityLog.add('created report from job', 'report', job?.site || job?.number || 'Report');
  editReport(r.id);
}

function showJobPhotos(jobId) {
  const job = DB.jobs().find(j => j.id === jobId);
  if (!job) return;

  const reports = DB.reports().filter(r => {
    if (job.number && r.jobNumber && r.jobNumber.toLowerCase() === job.number.toLowerCase()) return true;
    if (job.site && r.site && r.site.toLowerCase() === job.site.toLowerCase()) return true;
    return false;
  }).sort((a, b) => new Date(a.date || a.createdAt || 0) - new Date(b.date || b.createdAt || 0));

  // Collect every photo with full context, sorted by capturedAt then report date
  const allPhotos = [];
  reports.forEach(r => {
    (r.inspections || []).forEach(insp => {
      (insp.examinations || []).forEach((exam, ei) => {
        const inspIdx = r.inspections.indexOf(insp) + 1;
        (exam.photos || []).forEach((photo, pi) => {
          const src = photoSrc(photo);
          if (!src) return;
          allPhotos.push({
            src,
            note:        photo.note || '',
            capturedAt:  photo.capturedAt || null,
            location:    photo.location || null,
            examTitle:   exam.title || `Examination ${ei+1}`,
            examStatus:  exam.status || '',
            reportDate:  r.date || '',
            reportSite:  r.site || '',
            ref:         `${inspIdx}.${ei+1}.${pi+1}`,
          });
        });
      });
    });
  });

  // Sort: capturedAt first (ISO string sort), fall back to reportDate
  allPhotos.sort((a, b) => {
    const ta = a.capturedAt || a.reportDate || '';
    const tb = b.capturedAt || b.reportDate || '';
    return ta < tb ? -1 : ta > tb ? 1 : 0;
  });

  const statusColour = { pass: '#15803d', action: '#b45309', urgent: '#dc2626' };

  const title = job.number
    ? `Job ${esc(job.number)}${job.site ? ` — ${esc(job.site)}` : ''}`
    : esc(job.site);

  const cards = allPhotos.map((p, i) => {
    const capTime = p.capturedAt ? new Date(p.capturedAt).toLocaleString('en-NZ', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : (p.reportDate || '');
    const gpsLink = p.location ? `<a href="https://maps.google.com/?q=${p.location.lat},${p.location.lng}" target="_blank"
        style="font-size:10px;color:#0369a1;text-decoration:none;display:inline-flex;align-items:center;gap:2px;margin-top:3px">📍 ${p.location.lat.toFixed(5)}, ${p.location.lng.toFixed(5)}</a>` : '';
    const statusDot = p.examStatus ? `<span style="font-size:10px;font-weight:700;color:${statusColour[p.examStatus]||'#64748b'};margin-left:4px">${p.examStatus.toUpperCase()}</span>` : '';
    return `<div style="break-inside:avoid;background:white;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
      <img src="${p.src}" style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block;cursor:pointer"
        onclick="showFullPhoto(${i}, jobPhotosArr)" loading="lazy">
      <div style="padding:7px 9px">
        <div style="font-size:11px;font-weight:700;color:#334155">${esc(p.examTitle)}${statusDot}</div>
        ${p.note ? `<div style="font-size:11px;color:#64748b;margin-top:2px;font-style:italic">${esc(p.note)}</div>` : ''}
        <div style="font-size:10px;color:#94a3b8;margin-top:3px">${esc(capTime)}</div>
        ${gpsLink}
      </div>
    </div>`;
  }).join('');

  // Store array globally so the fullscreen viewer can access it
  window.jobPhotosArr = allPhotos.map(p => p.src);

  showModal(`
    <div class="modal-header">
      <h3>📷 ${title}</h3>
      <button class="icon-btn-dark" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" style="padding-bottom:16px">
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">${allPhotos.length} photo${allPhotos.length!==1?'s':''} · sorted by time</p>
      ${allPhotos.length === 0
        ? `<p style="text-align:center;color:var(--muted);padding:32px 0">No photos found for this job.</p>`
        : `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${cards}</div>`}
    </div>
  `);
}

function showFullPhoto(idx, arr) {
  if (!arr || !arr[idx]) return;
  const total = arr.length;
  const render = (i) => {
    const clamped = Math.max(0, Math.min(total - 1, i));
    const overlay = document.getElementById('full-photo-overlay');
    if (overlay) {
      overlay.querySelector('img').src = arr[clamped];
      overlay.querySelector('.fp-counter').textContent = `${clamped + 1} / ${total}`;
      overlay._idx = clamped;
    }
  };
  const html = `<div id="full-photo-overlay" style="
      position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px"
      onclick="if(event.target===this)this.remove()">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:700px;padding:0 12px;box-sizing:border-box">
      <button onclick="this.closest('#full-photo-overlay')._idx>0&&(render2(this.closest('#full-photo-overlay')._idx-1))"
        style="background:rgba(255,255,255,.15);border:none;color:white;font-size:22px;padding:6px 14px;border-radius:8px;cursor:pointer">‹</button>
      <span class="fp-counter" style="color:white;font-size:13px;font-weight:600">${idx+1} / ${total}</span>
      <button onclick="this.closest('#full-photo-overlay')._idx<${total-1}&&(render2(this.closest('#full-photo-overlay')._idx+1))"
        style="background:rgba(255,255,255,.15);border:none;color:white;font-size:22px;padding:6px 14px;border-radius:8px;cursor:pointer">›</button>
    </div>
    <img src="${arr[idx]}" style="max-width:96vw;max-height:80vh;object-fit:contain;border-radius:6px">
    <button onclick="this.closest('#full-photo-overlay').remove()"
      style="position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);border:none;color:white;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer">✕</button>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  const overlay = document.getElementById('full-photo-overlay');
  overlay._idx = idx;
  window.render2 = (i) => render(i);
}

function renderContacts(el, sortBy) {
  sortBy = sortBy || state.contactSort || 'name';
  state.contactSort = sortBy;
  state.contactSel = new Set();
  el.innerHTML = `<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:6px">
        <button id="csort-name" class="btn btn-sm ${sortBy==='name'?'btn-primary':'btn-ghost'}" onclick="setContactSort('name')">Sort: Name</button>
        <button id="csort-company" class="btn btn-sm ${sortBy==='company'?'btn-primary':'btn-ghost'}" onclick="setContactSort('company')">Sort: Company</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-ghost" onclick="showCleanupContacts()">🗑 Clean Up</button>
        <button class="btn btn-sm btn-primary" onclick="showAddContact()">＋ Add</button>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <input id="con-filter" type="search" class="home-search" placeholder="🔍  Search by name, company or email…"
        value="${esc(state.contactFilter||'')}" oninput="updateContactsList(this.value)">
    </div>
    <div id="con-cards"></div>
  </div>`;
  updateContactsList(state.contactFilter || '');
}
function setContactSort(s) {
  state.contactSort = s;
  document.querySelectorAll('#csort-name,#csort-company').forEach(b => {
    b.className = `btn btn-sm ${b.id === 'csort-'+s ? 'btn-primary' : 'btn-ghost'}`;
  });
  updateContactsList(state.contactFilter || '');
}
function updateContactsList(filter) {
  filter = filter || '';
  state.contactFilter = filter;
  let cons = filterAndRank(DB.contacts(), filter, c => [c.name, c.company, c.email]);
  // Alpha sort only when not actively searching (search uses starts-with ranking)
  if (!filter) {
    if (state.contactSort === 'company') {
      cons = [...cons].sort((a,b) => (a.company||'').localeCompare(b.company||'') || a.name.localeCompare(b.name));
    } else {
      cons = [...cons].sort((a,b) => a.name.localeCompare(b.name));
    }
  }
  const el = document.getElementById('con-cards');
  if (!el) return;
  const nSel = state.contactSel.size;
  const allVisibleIds = cons.map(c => c.id);
  const allSelected = allVisibleIds.length > 0 && allVisibleIds.every(id => state.contactSel.has(id));
  el.innerHTML = cons.length === 0

// Returns ISO date string of last time a contact appeared in a report, or null
function contactLastUsed(c) {
  const reports = DB.reports();
  let latest = null;
  for (const r of reports) {
    const used = r.attendees.some(a =>
      (c.email && a.email && a.email.toLowerCase() === c.email.toLowerCase()) ||
      a.name.toLowerCase() === c.name.toLowerCase()
    );
    if (used) {
      const d = r.updatedAt || r.createdAt;
      if (!latest || d > latest) latest = d;
    }
  }
  return latest;
}

function showCleanupContacts() {
  showModal(`<div class="modal-header"><h3>Clean Up Contacts</h3><button class="icon-btn-dark" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Remove contacts not used in any report within the selected period. This cannot be undone.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="cleanupContacts(3)">Delete unused in last <strong>3 months</strong></button>
      <button class="btn btn-ghost btn-full" onclick="cleanupContacts(6)">Delete unused in last <strong>6 months</strong></button>
      <button class="btn btn-ghost btn-full" onclick="cleanupContacts(12)">Delete unused in last <strong>1 year</strong></button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

function cleanupContacts(months) {
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - months);
  const cutoffISO = cutoff.toISOString();
  const cons = DB.contacts();
  const toDelete = cons.filter(c => {
    const last = contactLastUsed(c);
    return !last || last < cutoffISO;
  });
  if (toDelete.length === 0) {
    closeModal();
    toast(`No contacts to remove for that period`);
    return;
  }
  if (!confirm(`Remove ${toDelete.length} contact${toDelete.length!==1?'s':''} not used in the last ${months < 12 ? months + ' months' : '1 year'}?`)) return;
  const keep = cons.filter(c => {
    const last = contactLastUsed(c);
    return last && last >= cutoffISO;
  });
  DB.saveContacts(keep);
  closeModal();
  toast(`Removed ${toDelete.length} contact${toDelete.length!==1?'s':''}`);
  if (state.screen==='contacts') updateContactsList(state.contactFilter||'');
}

// Minimal EXIF GPS extractor (no external library needed)
function extractPhotoGPS(file, cb) {
  const fr = new FileReader();
  fr.onload = e => {
    try {
      const buf = e.target.result;
      const view = new DataView(buf);
      if (view.getUint16(0, false) !== 0xFFD8) { cb(null); return; } // not JPEG
      let off = 2;
      while (off < buf.byteLength - 4) {
        const marker = view.getUint16(off, false);
        const segLen = view.getUint16(off + 2, false);
        if (marker === 0xFFE1) { // APP1
          // Check for "Exif\0\0"
          if (view.getUint32(off + 4, false) === 0x45786966 && view.getUint16(off + 8, false) === 0) {
            const tiffBase = off + 10;
            const le = view.getUint16(tiffBase, false) === 0x4949;
            const ifd0 = view.getUint32(tiffBase + 4, le);
            const gpsIFDOff = findGPSIFDOffset(view, tiffBase, ifd0, le);
            if (gpsIFDOff !== null) {
              cb(readGPSFromIFD(view, tiffBase, gpsIFDOff, le));
              return;
            }
          }
        }
        if ((marker & 0xFF00) !== 0xFF00 || marker === 0xFFDA) break;
        off += 2 + segLen;
      }
    } catch(_) {}
    cb(null);
  };
  fr.readAsArrayBuffer(file);
}
function findGPSIFDOffset(view, base, ifdOff, le) {
  const n = view.getUint16(base + ifdOff, le);
  for (let i = 0; i < n; i++) {
    const e = base + ifdOff + 2 + i * 12;
    if (view.getUint16(e, le) === 0x8825) return view.getUint32(e + 8, le);
  }
  return null;
}
function readGPSFromIFD(view, base, gpsOff, le) {
  const n = view.getUint16(base + gpsOff, le);
  const tags = {};
  for (let i = 0; i < n; i++) {
    const e = base + gpsOff + 2 + i * 12;
    tags[view.getUint16(e, le)] = e;
  }
  if (!tags[1] || !tags[2] || !tags[3] || !tags[4]) return null;
  const latRef = String.fromCharCode(view.getUint8(tags[1] + 8));
  const lonRef = String.fromCharCode(view.getUint8(tags[3] + 8));
  const lat = readRationals(view, base + view.getUint32(tags[2] + 8, le), 3, le);
  const lon = readRationals(view, base + view.getUint32(tags[4] + 8, le), 3, le);
  const latDD = (lat[0] + lat[1] / 60 + lat[2] / 3600) * (latRef === 'S' ? -1 : 1);
  const lonDD = (lon[0] + lon[1] / 60 + lon[2] / 3600) * (lonRef === 'W' ? -1 : 1);
  if (!isFinite(latDD) || !isFinite(lonDD) || (latDD === 0 && lonDD === 0)) return null;
  return { lat: +latDD.toFixed(6), lng: +lonDD.toFixed(6) };
}
function readRationals(view, off, count, le) {
  return Array.from({length: count}, (_, i) => {
    const num = view.getUint32(off + i * 8, le);
    const den = view.getUint32(off + i * 8 + 4, le);
    return den ? num / den : 0;
  });
}

// PHOTO MAP
// ═══════════════════════════════════════════════════════════════
function getGeoPhotos(insp) {
  const out = [];
  (insp.examinations || []).forEach(exam => {
    (exam.photos || []).forEach(photo => {
      if (photo.location?.lat && photo.location?.lng) out.push({ photo, exam });
    });
  });
  return out;
}

function renderPhotoMapToggle(insp) {
  if (getGeoPhotos(insp).length === 0) return '';
  return `<div class="photo-map-wrap">
    <button class="photo-map-toggle" onclick="togglePhotoMap('${insp.id}')">
      📍 Photo Map <span id="pmap-count-${insp.id}">(${getGeoPhotos(insp).length} pinned)</span>
    </button>
    <div id="pmap-wrap-${insp.id}" style="display:none">
      <div class="photo-map-container" id="pmap-${insp.id}"></div>
    </div>
  </div>`;
}

function togglePhotoMap(inspId) {
  const wrap = document.getElementById(`pmap-wrap-${inspId}`);
  if (!wrap) return;
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    initPhotoMap(inspId);
  } else {
    wrap.style.display = 'none';
  }
}

function initPhotoMap(inspId) {
  if (typeof L === 'undefined') { toast('Map tiles need internet connection'); return; }
  const mapEl = document.getElementById(`pmap-${inspId}`);
  if (!mapEl || mapEl._leaflet_id) return; // already initialised
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const geoPhotos = getGeoPhotos(insp);
  if (!geoPhotos.length) return;

  const map = L.map(mapEl);
  const _street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19 });
  const _satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 });
  _street.addTo(map);
  L.control.layers({ '🗺 Street': _street, '🛰 Satellite': _satellite }, {}, { position: 'topright' }).addTo(map);

  const bounds = L.latLngBounds();
  geoPhotos.forEach(({ photo, exam }) => {
    const ll = [photo.location.lat, photo.location.lng];
    bounds.extend(ll);
    const marker = L.marker(ll).addTo(map);
    const thumb = photoSrc(photo);
    marker.bindPopup(`
      <div style="text-align:center;min-width:130px">
        <img src="${thumb}" style="width:130px;height:90px;object-fit:cover;border-radius:6px;margin-bottom:6px;display:block">
        <div style="font-weight:700;font-size:13px">${esc(exam.title || 'Examination')}</div>
        ${exam.status ? `<div style="font-size:12px;margin-top:3px">${examStatusLabel(exam.status)}</div>` : ''}
      </div>`);
    marker.on('click', () => {
      document.querySelectorAll('.exam-panel.exam-highlight').forEach(el => el.classList.remove('exam-highlight'));
      const examEl = document.getElementById(`exam-${exam.id}`);
      if (examEl) {
        examEl.classList.add('exam-highlight');
        examEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        // Auto-remove highlight after 3s
        setTimeout(() => examEl.classList.remove('exam-highlight'), 3000);
      }
    });
  });

  map.fitBounds(bounds, { padding: [30, 30], maxZoom: 18 });
}

// ═══════════════════════════════════════════════════════════════
// PHOTO BACKUP
// ═══════════════════════════════════════════════════════════════
async function backupInspectionPhotos(inspId) {
  const insp = state.report && state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const r = state.report;
  const setup = DB.getSetup();

  // Gather all photos with context
  const items = [];
  (insp.examinations || []).forEach((exam, ei) => {
    (exam.photos || []).forEach((photo, pi) => {
      const src = photoSrc(photo);
      if (!src) return;
      const ref = `${(state.report.inspections.indexOf(insp)+1)}.${ei+1}`;
      const safeTitle = (exam.title || 'Exam').replace(/[^a-z0-9]/gi, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
      items.push({ photo, exam, src, ref, safeTitle, idx: pi + 1 });
    });
  });

  if (!items.length) { toast('No photos to back up'); return; }

  ActivityLog.add(`backed up ${items.length} photo${items.length!==1?'s':''}`, 'backup', state.report?.site || 'Report');

  const btn = document.getElementById(`backup-btn-${inspId}`);
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Backing up…'; }

  try {
    // ── 1. Build ZIP ──────────────────────────────────────────
    const zip = new JSZip();
    const photoFolder = zip.folder('photos');
    const metaRows = [];

    const _rd = r.date ? new Date(r.date) : new Date();
    const _yymmdd = `${String(_rd.getFullYear()).slice(2)}${String(_rd.getMonth()+1).padStart(2,'0')}${String(_rd.getDate()).padStart(2,'0')}`;
    const _job = (r.jobNumber || 'nojob').toString().replace(/[^a-z0-9]/gi, '_');
    const _site = (r.site || 'site').replace(/[^a-z0-9]/gi, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');

    items.forEach(({ photo, exam, src, ref, safeTitle, idx }) => {
      const base64 = src.includes(',') ? src.split(',')[1] : src;
      const fname = `${ref}_${safeTitle}_${idx}.jpg`;
      photoFolder.file(fname, base64, { base64: true });

      const row = {
        filename:    fname,
        ref,
        examTitle:   exam.title || '',
        examStatus:  exam.status || '',
        note:        photo.note || '',
        capturedAt:  photo.capturedAt || null,
      };
      if (photo.location) {
        row.lat = photo.location.lat;
        row.lng = photo.location.lng;
        row.locationLink = `https://maps.google.com/?q=${photo.location.lat},${photo.location.lng}`;
      }
      metaRows.push(row);
    });

    // Sort metadata by capturedAt so CSV/JSON is time-ordered
    metaRows.sort((a, b) => (a.capturedAt || '') < (b.capturedAt || '') ? -1 : 1);

    const meta = {
      exportedAt: new Date().toISOString(),
      report:     { site: r.site || '', jobNumber: r.jobNumber || '', date: r.date || '', inspector: r.createdBy || '' },
      inspection: { id: insp.id, type: insp.type || '', date: insp.date || '' },
      photos:     metaRows,
    };
    zip.file('metadata.json', JSON.stringify(meta, null, 2));

    // ── 2. Download ZIP to device ─────────────────────────────
    const blob = await zip.generateAsync({ type: 'blob' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${_job}_${_yymmdd}_${_site}_photos.zip`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);

    // ── 3. Upload to Supabase Storage ────────────────────────
    let cloudCount = 0;
    if (_sb && setup && navigator.onLine) {
      const basePath = `${setup.companyCode}/backups/${_job}/${_yymmdd}`;
      const uploads  = items.map(({ photo, src, ref, safeTitle, idx }) => async () => {
        try {
          const res  = await fetch(src);
          const blob = await res.blob();
          const fname = `${ref}_${safeTitle}_${idx}.jpg`;
          const { error } = await _sb.storage.from('siteinspect-photos')
            .upload(`${basePath}/${fname}`, blob, { contentType: 'image/jpeg', upsert: true });
          if (!error) cloudCount++;
        } catch(e) { /* individual upload failure — continue */ }
      });
      // Upload in parallel batches of 3 to avoid overwhelming the connection
      for (let i = 0; i < uploads.length; i += 3) {
        await Promise.all(uploads.slice(i, i + 3).map(fn => fn()));
      }
      // Upload metadata JSON
      try {
        const metaBlob = new Blob([JSON.stringify(meta, null, 2)], { type: 'application/json' });
        await _sb.storage.from('siteinspect-photos')
          .upload(`${basePath}/_metadata.json`, metaBlob, { contentType: 'application/json', upsert: true });
      } catch(e) { /* non-fatal */ }
    }

    // ── 4. Done ───────────────────────────────────────────────
    if (btn) { btn.disabled = false; btn.innerHTML = `✅ Backed up (${items.length} photos)`; }
    const cloudMsg = cloudCount > 0 ? ` · ${cloudCount} uploaded to cloud` : (navigator.onLine ? ' · cloud upload failed' : ' · offline, cloud skipped');
    toast(`Downloaded ${items.length} photos${cloudMsg}`);

  } catch(e) {
    console.error('Backup failed:', e);
    if (btn) { btn.disabled = false; btn.innerHTML = `💾 Backup Photos`; }
    toast('Backup failed — ' + (e.message || 'unknown error'));
  }
}
