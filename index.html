<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e40af">
  <title>SiteInspect</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-size: 15px; color: #1e293b; background: #f1f5f9;
      height: 100%; overflow: hidden;
    }

    /* ── CSS VARS ── */
    :root {
      --primary: #1e40af; --primary-l: #3b82f6; --primary-d: #1e3a8a;
      --surface: #ffffff; --bg: #f1f5f9; --border: #e2e8f0;
      --text: #1e293b; --muted: #64748b;
      --green: #059669; --amber: #d97706; --red: #dc2626;
      --radius: 12px; --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    }

    /* ── APP SHELL ── */
    #app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

    /* ── HEADER ── */
    #hdr {
      flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
      background: var(--primary); color: white;
      padding: 0 12px; height: 56px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      z-index: 10; position: relative;
    }
    #hdr-title { flex: 1; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    #hdr-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    /* ── MAIN CONTENT ── */
    #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      flex: 0 0 auto; display: flex; background: white;
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 2px; padding: 8px 4px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 11px; font-weight: 500;
      transition: color .15s;
    }
    .nav-btn .nav-icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--primary); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 6px; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer;
      padding: 9px 16px; transition: all .15s; line-height: 1.2;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-d); }
    .btn-ghost { background: transparent; color: var(--primary); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: #f1f5f9; }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger-ghost { background: transparent; color: var(--red); border: none; }
    .btn-danger-ghost:hover { background: #fee2e2; }
    .btn-sm { font-size: 12px; padding: 6px 12px; }
    .btn-xs { font-size: 11px; padding: 4px 8px; border-radius: 6px; }
    .btn-lg { font-size: 16px; padding: 14px 24px; }
    .btn-full { width: 100%; }
    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.85); padding: 8px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background .15s;
    }
    .icon-btn:hover { background: rgba(255,255,255,.15); }
    .icon-btn-dark {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 6px; border-radius: 6px; font-size: 16px; transition: background .15s;
    }
    .icon-btn-dark:hover { background: var(--border); }

    /* ── SCREEN ── */
    .screen { padding: 16px; max-width: 680px; margin: 0 auto; }

    /* ── CARDS ── */
    .card {
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      overflow: hidden;
    }
    .card + .card { margin-top: 12px; }

    /* ── FORMS ── */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
    .form-input {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 15px; color: var(--text);
      background: white; appearance: none; -webkit-appearance: none;
      transition: border-color .15s;
    }
    .form-input:focus { outline: none; border-color: var(--primary-l); }
    .form-textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; color: var(--text);
      resize: vertical; min-height: 80px; font-family: inherit;
      transition: border-color .15s;
    }
    .form-textarea:focus { outline: none; border-color: var(--primary-l); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── SECTION ── */
    .editor-section {
      background: white; border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid var(--border);
      padding: 16px; margin-bottom: 12px;
    }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .05em; }

    /* ── HOME ── */
    .home-hero { margin-bottom: 16px; }
    .reports-list { display: flex; flex-direction: column; gap: 10px; }
    /* ── Home filter bar ── */
    .home-filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .home-search-wrap { position: relative; }
    .home-search {
      width: 100%; padding: 9px 12px 9px 34px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); font-size: 14px; background: white;
      outline: none; transition: border-color .15s;
    }
    .home-search:focus { border-color: var(--primary); }
    .home-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: var(--muted); }
    .filter-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .filter-pill {
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: white; color: var(--muted);
      cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .filter-pill:hover { border-color: #94a3b8; color: #334155; }
    .filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-pill.active-green { background: #059669; color: white; border-color: #059669; }
    .filter-pill.active-amber { background: #d97706; color: white; border-color: #d97706; }
    .sort-select {
      margin-left: auto; padding: 5px 10px; border-radius: 20px; font-size: 12px;
      font-weight: 600; border: 1.5px solid var(--border); background: white;
      color: var(--muted); cursor: pointer; outline: none;
    }
    .month-picker-wrap { display: flex; align-items: center; gap: 4px; }
    .month-picker {
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid var(--border); background: white; color: var(--muted);
      cursor: pointer; outline: none; max-width: 145px;
    }
    .month-picker.active { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .month-clear { background: none; border: none; font-size: 13px; color: var(--muted); cursor: pointer; padding: 0 2px; line-height: 1; }
    .home-results-count { font-size: 12px; color: var(--muted); padding: 2px 0 6px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-state p { margin-bottom: 6px; }
    .empty-state p:first-of-type { font-size: 16px; font-weight: 600; color: var(--text); }

    /* ── REPORT CARD ── */
    .report-card {
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow);
      padding: 14px 16px; cursor: pointer; transition: box-shadow .15s;
    }
    .report-card:hover { box-shadow: var(--shadow-lg); }
    .report-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
    .report-site { font-size: 16px; font-weight: 700; color: var(--text); }
    .report-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .report-badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
      flex-shrink: 0; margin-left: 8px;
    }
    .badge-draft { background: #fef3c7; color: #92400e; }
    .badge-complete { background: #d1fae5; color: #065f46; }
    .report-stats { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .report-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .insp-tag {
      font-size: 11px; background: #eff6ff; color: #1d4ed8;
      padding: 2px 8px; border-radius: 20px; border: 1px solid #bfdbfe;
    }
    .insp-tag-more { background: #f8fafc; color: var(--muted); border-color: var(--border); }
    .report-card-footer { display: flex; justify-content: flex-end; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }

    /* ── ATTENDEES ── */
    .attendees-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .attendee-chip {
      display: flex; align-items: center; gap: 6px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 5px 8px 5px 12px; max-width: 260px;
    }
    .attendee-chip-info { flex: 1; min-width: 0; }
    .attendee-name { font-size: 13px; font-weight: 600; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attendee-email { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chip-remove { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; padding: 0 2px; }
    .chip-remove:hover { color: var(--red); }

    /* ── INSPECTION CARD ── */
    .insp-card {
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; margin-bottom: 10px;
      transition: border-color .15s;
    }
    .insp-card.open { border-color: var(--primary-l); }
    .insp-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; cursor: pointer; background: white;
      transition: background .1s;
    }
    .insp-card-header:hover { background: #f8fafc; }
    .insp-card-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .insp-icon { font-size: 22px; flex-shrink: 0; }
    .insp-label { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .insp-stats-sm { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .insp-card-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
    .chevron.open { transform: rotate(180deg); }
    .insp-body { background: #fafafa; border-top: 1px solid var(--border); }

    /* ── INSPECTION SECTIONS ── */
    .insp-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .insp-section:last-child { border-bottom: none; }
    .insp-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }

    /* ── INSPECTION TABS ── */
    .insp-tab-strip {
      display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px;
      border-bottom: 2px solid var(--border); margin-bottom: 12px;
      scrollbar-width: none;
    }
    .insp-tab-strip::-webkit-scrollbar { display: none; }
    .insp-tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 600; border: 1.5px solid var(--border);
      background: white; color: var(--muted); cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .insp-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .insp-tab:hover:not(.active) { background: var(--bg); border-color: #cbd5e1; }
    .insp-l2-strip {
      display: flex; gap: 5px; overflow-x: auto; padding-bottom: 8px;
      margin-bottom: 10px; scrollbar-width: none;
    }
    .insp-l2-strip::-webkit-scrollbar { display: none; }
    .insp-tab-l2 {
      flex-shrink: 0; padding: 4px 12px; border-radius: 16px;
      font-size: 12px; font-weight: 600; border: 1.5px solid var(--border);
      background: var(--bg); color: var(--muted); cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .insp-tab-l2.active { background: var(--primary-l); color: white; border-color: var(--primary-l); }
    .insp-tab-l2:hover:not(.active) { background: #e2e8f0; }
    .insp-tab-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .insp-tab-actions-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .cat-btn-other { border-style: dashed; color: var(--muted); }

    /* ── CHECKLIST ── */
    .progress-wrap { background: var(--border); border-radius: 99px; height: 6px; margin-bottom: 12px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--green); border-radius: 99px; transition: width .3s; }
    .checklist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .check-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 10px; background: white; border-radius: 6px;
      border: 1px solid var(--border); cursor: pointer;
      transition: background .1s;
    }
    .check-item:hover { background: #f8fafc; }
    .check-item input[type=checkbox] { margin-top: 2px; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; accent-color: var(--green); }
    .check-item span { font-size: 13px; line-height: 1.4; }
    .check-item.done span { color: var(--muted); text-decoration: line-through; }

    /* ── PHOTOS ── */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
    .photo-thumb {
      aspect-ratio: 1; border-radius: 6px; overflow: hidden;
      border: 1.5px solid var(--border); cursor: pointer;
      position: relative; background: var(--bg);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb:hover img { opacity: .9; }
    .photo-note-dot {
      position: absolute; bottom: 4px; right: 4px;
      background: rgba(0,0,0,.6); color: white; border-radius: 4px;
      font-size: 10px; padding: 1px 4px;
    }
    .photo-loc-dot {
      position: absolute; bottom: 4px; left: 4px;
      background: rgba(0,0,0,.6); color: white; border-radius: 4px;
      font-size: 10px; padding: 1px 4px;
    }

    /* ── INSPECTION TAGS ── */
    .insp-tag-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .insp-tag-badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
      cursor: pointer; transition: background .12s;
    }
    .insp-tag-badge:hover { background: #dbeafe; }
    .tag-input-wrap { display: flex; gap: 6px; margin-top: 8px; }
    .tag-input {
      flex: 1; padding: 6px 10px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; outline: none;
      background: white; transition: border-color .15s;
    }
    .tag-input:focus { border-color: var(--primary-l); }
    /* Quick-link tag pills */
    .tag-quicklinks { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .tag-ql {
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 10px; cursor: pointer;
      background: #f1f5f9; color: #475569; border: 1.5px solid #cbd5e1;
      transition: background .12s, border-color .12s;
    }
    .tag-ql:hover { background: #e2e8f0; border-color: #94a3b8; }
    .tag-ql.tag-ql-pinned { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .tag-ql.tag-ql-pinned:hover { background: #dbeafe; }
    .tag-ql-pin {
      font-size: 10px; font-weight: 600; padding: 3px 7px; border-radius: 10px; cursor: pointer;
      background: #f8fafc; color: #94a3b8; border: 1.5px dashed #cbd5e1;
      transition: all .12s;
    }
    .tag-ql-pin:hover { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; border-style: solid; }
    .tag-ql-unpin { font-size: 10px; margin-left: 2px; opacity: .5; cursor: pointer; }
    .tag-ql-unpin:hover { opacity: 1; }
    .photo-loc-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      background: rgba(255,255,255,.08); border-radius: 6px;
      padding: 6px 10px; margin-top: 6px; font-size: 12px; color: rgba(255,255,255,.8);
    }
    .photo-loc-bar span { flex: 1; font-variant-numeric: tabular-nums; }
    .photo-thumb-delete {
      position: absolute; top: 3px; right: 3px;
      background: rgba(0,0,0,.55); border: none; color: white;
      border-radius: 50%; width: 20px; height: 20px; font-size: 12px;
      cursor: pointer; display: none; align-items: center; justify-content: center;
    }
    .photo-thumb:hover .photo-thumb-delete { display: flex; }
    .photo-add-btn {
      aspect-ratio: 1; border-radius: 6px;
      border: 1.5px dashed var(--border); background: white;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      color: var(--muted); font-size: 11px; transition: all .15s;
    }
    .photo-add-btn:hover { border-color: var(--primary-l); color: var(--primary); background: #eff6ff; }
    .photo-add-btn span:first-child { font-size: 22px; }
    /* Photo item wrapper (image + caption) */
    .photo-item { display: flex; flex-direction: column; }
    .photo-note-caption {
      font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.3;
      word-break: break-word; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── EXAMINATION PANELS ── */
    .exam-panel {
      border: 1.5px solid #bfdbfe; border-radius: var(--radius-sm);
      margin: 10px 16px; background: #f8fbff; overflow: hidden;
    }
    .exam-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #dbeafe; border-bottom: 1.5px solid #bfdbfe;
    }
    .exam-title { font-size: 12px; font-weight: 700; color: #1e40af; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; flex-shrink: 0; }
    .exam-title-input {
      flex: 1; min-width: 0; border: none; background: transparent;
      font-size: 13px; font-weight: 600; color: #1e3a8a;
      outline: none; padding: 2px 6px; border-radius: 4px;
    }
    .exam-title-input::placeholder { color: #93c5fd; font-weight: 400; }
    .exam-title-input:focus { background: rgba(255,255,255,.6); }
    /* Examination status pill */
    .exam-status {
      flex-shrink: 0; cursor: pointer; border: none; border-radius: 20px;
      font-size: 11px; font-weight: 700; padding: 3px 10px; line-height: 1.4;
      transition: all .15s; white-space: nowrap;
    }
    .exam-status[data-status=""] { background: rgba(255,255,255,.4); color: #1e40af; border: 1.5px solid rgba(255,255,255,.6); }
    .exam-status[data-status="pass"] { background: #dcfce7; color: #166534; border: 1.5px solid #86efac; }
    .exam-status[data-status="action"] { background: #fef3c7; color: #92400e; border: 1.5px solid #fcd34d; }
    .exam-status[data-status="urgent"] { background: #fee2e2; color: #991b1b; border: 1.5px solid #fca5a5; }
    .exam-body { }
    .exam-section { padding: 10px 12px; border-bottom: 1px solid #e0eeff; }
    .exam-section:last-child { border-bottom: none; }
    .exam-section-label { font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .exam-tag-strip { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    /* Note lines */
    .note-lines { display: flex; flex-direction: column; gap: 5px; }
    .note-line-row { display: flex; align-items: flex-start; gap: 6px; }
    .note-line-num { font-size: 11px; font-weight: 700; color: var(--muted); padding-top: 8px; min-width: 18px; flex-shrink: 0; }
    .note-line-text {
      flex: 1; padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 6px;
      font-size: 13px; font-family: inherit; resize: none; min-height: 34px; line-height: 1.4;
      overflow: hidden; background: white; transition: border-color .15s;
    }
    .note-line-text:focus { outline: none; border-color: var(--primary-l); }
    .note-line-del {
      flex-shrink: 0; background: none; border: none; color: #94a3b8;
      cursor: pointer; font-size: 16px; padding: 4px; line-height: 1; margin-top: 4px;
    }
    .note-line-del:hover { color: var(--red); }
    .note-empty-hint {
      font-size: 13px; color: #94a3b8; padding: 8px 4px; cursor: pointer; font-style: italic;
    }
    .note-empty-hint:hover { color: var(--primary); }
    /* Action cards */
    .action-list { display: flex; flex-direction: column; gap: 6px; }
    .action-card {
      display: flex; align-items: flex-start; gap: 8px;
      background: white; border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 8px 10px;
    }
    .action-card-body { flex: 1; min-width: 0; }
    .action-note-text { font-size: 13px; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .action-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .action-contact {
      font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
      background: #fef3c7; color: #92400e; border: 1px solid #fde68a;
    }
    .action-tag {
      font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
      background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe;
    }
    .action-del {
      background: none; border: none; color: #94a3b8; cursor: pointer;
      font-size: 16px; padding: 2px; line-height: 1; flex-shrink: 0;
    }
    .action-del:hover { color: var(--red); }
    /* Add examination button row */
    .add-exam-row { padding: 10px 16px; background: #f8fafc; border-top: 1px solid var(--border); }
    /* Construction category selector */
    .insp-cat-grid { display: flex; flex-wrap: wrap; gap: 7px; }
    .insp-cat-pill {
      padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1.5px solid #cbd5e1; background: #f8fafc; color: #64748b;
      cursor: pointer; transition: all .15s; line-height: 1.4;
    }
    .insp-cat-pill:hover { border-color: #94a3b8; background: #e2e8f0; color: #334155; }
    .insp-cat-pill.active { background: #1e40af; color: white; border-color: #1e40af; }
    .insp-cat-pill.active:hover { background: #1e3a8a; border-color: #1e3a8a; }

    /* ── MODAL OVERLAY ── */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 100; display: none; backdrop-filter: blur(2px);
    }
    #overlay.active { display: block; }
    #modals { position: fixed; inset: 0; z-index: 101; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; }
    #modals.active { pointer-events: auto; }

    /* ── MODAL ── */
    .modal {
      background: white; width: 100%; max-width: 560px;
      border-radius: 20px 20px 0 0;
      max-height: 92dvh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 -4px 24px rgba(0,0,0,.15);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-full { border-radius: 0; max-height: 100dvh; height: 100dvh; max-width: 100%; }
    .modal-header {
      display: flex; align-items: center; padding: 16px 16px 14px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px;
    }
    .modal-header h3 { flex: 1; font-size: 16px; font-weight: 700; }
    .modal-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; flex: 1; }
    .modal-breadcrumb { display: flex; align-items: center; gap: 6px; flex: 1; flex-wrap: wrap; font-size: 13px; }
    .breadcrumb-item { color: var(--muted); cursor: pointer; }
    .breadcrumb-item:hover { color: var(--primary); }
    .breadcrumb-item.active { color: var(--text); font-weight: 600; }
    .modal-hint { font-size: 13px; color: var(--muted); margin-bottom: 14px; }

    /* ── CATEGORY GRID ── */
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cat-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; text-align: left; transition: all .15s;
    }
    .cat-btn:hover { border-color: var(--primary-l); background: #eff6ff; }
    .cat-icon { font-size: 26px; flex-shrink: 0; }
    .cat-label { font-size: 13px; font-weight: 600; flex: 1; }
    .cat-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }

    /* ── CONTACT SELECT ── */
    .contact-select-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); margin-bottom: 6px; background: white;
      transition: background .1s;
    }
    .contact-select-item:hover { background: #f8fafc; }
    .contact-email-sm { font-size: 11px; color: var(--muted); }

    /* ── CONTACTS SCREEN ── */
    .contacts-list { display: flex; flex-direction: column; gap: 8px; }
    .contact-card {
      display: flex; align-items: center; gap: 12px;
      background: white; border-radius: var(--radius);
      border: 1px solid var(--border); padding: 12px 14px;
      box-shadow: var(--shadow); transition: background .1s;
    }
    .contact-card.selected { background: #eff6ff; border-color: #bfdbfe; }
    .sel-cb { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
    .sel-bar {
      position: sticky; bottom: 0; left: 0; right: 0;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,.15); gap: 8px;
      font-size: 13px; font-weight: 600;
    }
    .sel-bar-btns { display: flex; gap: 6px; }
    .contact-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-size: 14px; font-weight: 600; }
    .contact-email { font-size: 12px; color: var(--muted); }
    .contact-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── PHOTO ANNOTATOR ── */
    .annotator-wrap { display: flex; flex-direction: column; height: 100dvh; }
    .annotator-header {
      flex: 0 0 auto; display: flex; align-items: center;
      gap: 6px; padding: 8px 12px; background: #1e293b;
      flex-wrap: wrap;
    }
    .tool-group { display: flex; align-items: center; gap: 4px; }
    .tool-btn {
      width: 36px; height: 36px; border-radius: 6px; border: none;

      font-size: 16px; transition: background .1s;
    }
    .tool-btn:hover { background: rgba(255,255,255,.2); }
    .tool-btn.active { background: var(--primary-l); }
    .color-swatches { display: flex; gap: 4px; align-items: center; }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,.3);
      cursor: pointer; transition: transform .1s;
    }
    .color-swatch.active { border-color: white; transform: scale(1.2); }
    .brush-sel {
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: white; border-radius: 6px; padding: 4px 6px;
      font-size: 12px; cursor: pointer; height: 34px;
    }
    .annotator-divider { width: 1px; height: 28px; background: rgba(255,255,255,.2); }
    .annotator-canvas-area {
      flex: 1; overflow: hidden; background: #0f172a;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #annotation-canvas { touch-action: none; cursor: crosshair; display: block; }
    .annotator-footer {
      flex: 0 0 auto; padding: 10px 12px; background: #1e293b;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
    }
    .annotator-footer label { font-size: 11px; color: rgba(255,255,255,.5); display: block; margin-bottom: 4px; }
    .annotator-footer textarea {
      width: 100%; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: white; border-radius: 6px; padding: 8px; font-size: 13px;
      resize: none; height: 60px; font-family: inherit;
    }
    .annotator-footer textarea::placeholder { color: rgba(255,255,255,.3); }
    .annotator-footer textarea:focus { outline: none; border-color: var(--primary-l); }
    .annotator-btn-row { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 8px; }

    /* ── PHOTO CHOICE ── */
    .photo-choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .photo-choice-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; padding: 24px 16px; border-radius: 10px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text);
      transition: all .15s;
    }
    .photo-choice-btn:hover { border-color: var(--primary-l); background: #eff6ff; color: var(--primary); }
    .photo-choice-btn span:first-child { font-size: 36px; }

    /* ── DIVIDER ── */
    .divider { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 12px; margin: 14px 0 10px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── EMPTY MINI ── */
    .empty-mini { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }

    /* ── SETUP SCREEN ── */
    .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; padding: 32px 24px; }
    .setup-logo { font-size: 56px; margin-bottom: 12px; }
    .setup-screen h1 { font-size: 28px; font-weight: 800; color: var(--primary); margin-bottom: 6px; }
    .setup-screen > p { color: var(--muted); font-size: 14px; margin-bottom: 28px; text-align: center; }
    .setup-card { background: white; border-radius: var(--radius); padding: 24px; width: 100%; max-width: 380px; box-shadow: var(--shadow-lg); }
    .setup-field { margin-bottom: 16px; }
    .setup-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .5px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .setup-field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; outline: none; }
    .setup-field input:focus { border-color: var(--primary); }
    .setup-hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .setup-divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .setup-user-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
    .setup-user-btn { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; text-align: left; font-size: 14px; cursor: pointer; }
    .setup-user-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── SYNC INDICATOR ── */
    .sync-btn { background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: white; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .sync-btn:hover { background: rgba(255,255,255,.25); }
    .sync-dot { font-size: 10px; }
    .sync-dot.ok { color: #4ade80; }
    .sync-dot.syncing { color: #93c5fd; animation: spin 1s linear infinite; }
    .sync-dot.error { color: #fbbf24; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── REPORT CARD CREATOR ── */
    .report-creator { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: calc(70px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1e293b; color: white; padding: 10px 20px;
      border-radius: 99px; font-size: 13px; font-weight: 500;
      z-index: 999; opacity: 0; transition: all .25s; white-space: nowrap;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── BTN ROW ── */
    .btn-row { display: flex; justify-content: flex-end; gap: 8px; }

    /* ── REPORT PREVIEW ACTIONS ── */
    .preview-print-btn {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--primary); color: white;
      padding: 14px 22px; border-radius: 99px;
      border: none; cursor: pointer; font-size: 14px; font-weight: 600;
      box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px;
    }

    /* ── PROFILE ── */
    .insp-active-card {
      background: #eff6ff; border: 2px solid #3b82f6; border-radius: var(--radius);
      padding: 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
    }
    .insp-active-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
    }
    .insp-active-info { flex: 1; min-width: 0; }
    .insp-active-name { font-size: 16px; font-weight: 700; color: var(--primary); }
    .insp-active-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .insp-active-badge {
      font-size: 11px; font-weight: 600; background: #dbeafe; color: #1d4ed8;
      padding: 3px 9px; border-radius: 20px; white-space: nowrap;
    }
    .insp-row {
      display: flex; align-items: center; gap: 10px;
      background: white; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 11px 12px; margin-bottom: 8px; transition: background .1s;
    }
    .insp-row-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: #cbd5e1; color: #475569;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700;
    }
    .insp-row-info { flex: 1; min-width: 0; }
    .insp-row-name { font-size: 14px; font-weight: 600; }
    .insp-row-sub { font-size: 12px; color: var(--muted); }
    .insp-row-actions { display: flex; gap: 4px; flex-shrink: 0; }
    /* Banner shown in editor when profile is set */
    .inspector-bar {
      background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 10px;
      padding: 10px 14px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; cursor: pointer; transition: background .12s;
    }
    .inspector-bar:hover { background: #dbeafe; }
    .inspector-initials {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: var(--primary); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .inspector-info { flex: 1; min-width: 0; }
    .inspector-name { font-size: 14px; font-weight: 600; color: var(--primary); }
    .inspector-sub { font-size: 12px; color: var(--muted); }
    /* Banner shown when no profile is set */
    .profile-prompt {
      background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 10px;
      padding: 11px 14px; display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; cursor: pointer; transition: background .12s;
    }
    .profile-prompt:hover { background: #fef3c7; }

    /* ── DESKTOP ── */
    @media (min-width: 640px) {
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
      .modal { border-radius: 16px; align-self: center; max-height: 90dvh; }
      .modal-full { border-radius: 0; align-self: stretch; max-height: 100dvh; }
    }
    @media (min-width: 1024px) {
      #hdr { padding: 0 24px; }
      .screen { padding: 20px 24px; }
      .form-row { grid-template-columns: 1fr 1fr 1fr; }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }

    /* ── Publish button ── */
    .btn-publish {
      background: linear-gradient(135deg, #059669, #047857);
      color: white; border: none; font-weight: 700;
    }
    .btn-publish:hover { background: linear-gradient(135deg, #047857, #065f46); }
    /* ── Share modal ── */
    .share-overlay {
      display: none; position: fixed; inset: 0; z-index: 10001;
      background: rgba(15,23,42,.55); backdrop-filter: blur(4px);
      align-items: flex-end; justify-content: center;
    }
    .share-overlay.open { display: flex; }
    .share-sheet {
      background: white; border-radius: 20px 20px 0 0;
      width: 100%; max-width: 600px; padding: 0 0 env(safe-area-inset-bottom);
      box-shadow: 0 -8px 40px rgba(0,0,0,.18);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

      width: 40px; height: 4px; background: #cbd5e1; border-radius: 2px;

    .share-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; border-bottom: 1px solid #e2e8f0;
    }
    .share-header h3 { font-size: 16px; font-weight: 700; margin: 0; }
    .share-body { padding: 16px 20px; }
    .share-downloaded {
      display: flex; align-items: center; gap: 10px;
      background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 16px;
    }
    .share-downloaded-icon { font-size: 24px; flex-shrink: 0; }
    .share-downloaded-text { font-size: 13px; color: #166534; line-height: 1.4; }
    .share-downloaded-file { font-weight: 700; font-size: 12px; word-break: break-all; }
    .share-section-label {
      font-size: 11px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px;
    }
    .share-recipients { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .share-recipient {
      display: flex; align-items: center; gap: 6px;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 5px 12px; font-size: 13px;
    }
    .share-recipient-name { font-weight: 600; color: #1e40af; }
    .share-recipient-email { color: #3b82f6; font-size: 12px; }
    .share-recipient-role { font-size: 10px; color: #94a3b8; margin-left: 2px; }
    .share-no-recipients {
      font-size: 13px; color: #94a3b8; font-style: italic; margin-bottom: 16px;
    }
    .share-actions { display: flex; flex-direction: column; gap: 8px; padding-bottom: 8px; }
    .btn-email { background: #1e40af; color: white; border: none; font-weight: 700; }
    .btn-email:hover { background: #1e3a8a; }
    .share-hint { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 8px; line-height: 1.5; }
    /* ── Report Preview Overlay ── */
    #report-preview {
      display: none;
      position: fixed; inset: 0; z-index: 10000;
      background: #f8fafc; overflow-y: auto;
    }
    #report-preview.open { display: block; }
    .rp-toolbar {
      position: sticky; top: 0; z-index: 1;
      background: #1e40af; color: white;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
    }
    .rp-toolbar h2 { flex: 1; font-size: 15px; font-weight: 700; margin: 0; }
    .rp-toolbar button {
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 600; padding: 7px 16px;
    }
    .rp-btn-print { background: white; color: #1e40af; }
    .rp-btn-close { background: rgba(255,255,255,.15); color: white; }
    .rp-body { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    @media print {
      #app, #report-preview .rp-toolbar { display: none !important; }

      .rp-body { padding: 0; }
      .rp-no-print { display: none !important; }
    }
  </style>
</head>

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>

      <span class="nav-icon">👥</span><span>Contacts</span>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// INSPECTION SUBJECTS & TAG POOL
// ═══════════════════════════════════════════════════════════════
const SUBJECTS = [

const SUPABASE_URL = 'https://ohyxnwbwyrzwgymvrila.supabase.co';
const SUPABASE_KEY = 'sb_publishable_He2lH9tCr-r5_Nt5wGvYBg_R2ODjIZ9';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const Sync = {
  _status: 'idle', // idle | syncing | ok | error
  setStatus(s) {
    this._status = s;
    const dot = document.getElementById('sync-dot');
    const lbl = document.getElementById('sync-lbl');
    if (!dot) return;
    dot.className = 'sync-dot ' + s;
    dot.textContent = s === 'syncing' ? '↻' : '●';
    if (lbl) lbl.textContent = s === 'syncing' ? 'Syncing…' : s === 'ok' ? 'Synced' : s === 'error' ? 'Offline' : '';
  },
  async push(report) {
    const setup = DB.getSetup();
    if (!setup) return;
    try {
      await _sb.from('reports').upsert({
        id: report.id,
        company_code: setup.companyCode,
        created_by: report.createdBy || setup.userName,
        data: report,
        updated_at: report.updatedAt || new Date().toISOString(),
      }, { onConflict: 'id' });
      this.setStatus('ok');
    } catch(e) {
      this.setStatus('error');
    }
  },
  async deleteRemote(id) {
    const setup = DB.getSetup();
    if (!setup) return;
    try { await _sb.from('reports').delete().eq('id', id).eq('company_code', setup.companyCode); } catch(e) {}
  },
  async pull(showToast = false) {
    const setup = DB.getSetup();
    if (!setup) return;
    this.setStatus('syncing');
    try {
      const { data, error } = await _sb.from('reports').select('id,data,updated_at').eq('company_code', setup.companyCode);
      if (error) throw error;
      const local = DB.reports();
      const localMap = Object.fromEntries(local.map(r => [r.id, r]));
      let merged = 0;
      for (const row of (data || [])) {
        const localR = localMap[row.id];
        const remoteTime = new Date(row.updated_at).getTime();
        const localTime = localR ? new Date(localR.updatedAt || 0).getTime() : 0;
        if (!localR || remoteTime > localTime) { DB.saveReportLocal(row.data); merged++; }
      }
      // Push any local-only reports up to cloud
      const cloudIds = new Set((data || []).map(r => r.id));
      for (const r of local) {
        if (!cloudIds.has(r.id)) await this.push(r);
      }
      this.setStatus('ok');
      if (showToast) toast(merged > 0 ? `Synced — ${merged} report${merged>1?'s':''} updated` : 'Already up to date');
      if (merged > 0) render();
    } catch(e) {
      this.setStatus('error');
      if (showToast) toast('Could not reach server — working offline');
    }
  },
};

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'});
}
function today() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Pacific/Auckland' }).format(new Date());
}
function nowTime() {
  return new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Pacific/Auckland', hour: '2-digit', minute: '2-digit', hour12: false
  }).format(new Date());
}
// Migrate old inspection format to new subject/tags/examinations format
function normalizeInsp(insp) {
  // Step 1: migrate old path-based format to subject format
  if (insp.subject === undefined) {
    const parts = (insp.path || insp.label || '').split(' › ');
    const raw = (parts[0] || 'Inspection').toLowerCase();
    const sub = SUBJECTS.find(s => raw.includes(s.label.toLowerCase()));
    insp.subject = sub ? sub.id : 'other';
    insp.subjectLabel = sub ? sub.label : parts[0];
    insp.tags = parts.slice(1).filter(Boolean);
  }
  // Always sync icon from SUBJECTS so changes here apply to existing inspections
  const sub = SUBJECTS.find(s => s.id === insp.subject);
  insp.icon = sub ? sub.icon : (insp.icon || '📋');
  // Step 2: migrate flat photos/notes to examinations array
  if (!insp.examinations) {
    const exam = { id: uid(), tags: [], notesLines: [], actions: [], photos: insp.photos || [] };
    if (insp.notes && String(insp.notes).trim()) {
      exam.notesLines = String(insp.notes).split('\n')
        .filter(l => l.trim()).map(t => ({ id: uid(), text: t }));
    }
    insp.examinations = [exam];
    delete insp.photos;
    delete insp.notes;
  }
  return insp;
}
function getTagSuggestions(query, existing) {
  const q = (query || '').toLowerCase();
  const used = new Set((existing || []).map(t => t.toLowerCase()));
  const all = [...TAGS_PRESET, ...DB.customTags()].filter(t => !used.has(t.toLowerCase()));
  if (!q) return all;
  const sw = all.filter(t => t.toLowerCase().startsWith(q));
  const co = all.filter(t => !t.toLowerCase().startsWith(q) && t.toLowerCase().includes(q));
  return [...sw, ...co];
}

function filterAndSortReports(reports) {
  const f = state.homeFilter;
  let list = [...reports];
  // Search
  if (f.search.trim()) {
    const q = f.search.trim().toLowerCase();
    list = list.filter(r =>
      (r.site || '').toLowerCase().includes(q) ||
      (r.jobNumber || '').toLowerCase().includes(q)
    );
  }
  // Period (YYYY-MM string from month picker)
  if (f.period && f.period !== 'all') {
    list = list.filter(r => (r.date || '').startsWith(f.period));
  }
  // Status
  if (f.status !== 'all') list = list.filter(r => (r.status || 'draft') === f.status);
  // Sort
  if (f.sort === 'newest') list.sort((a, b) => (b.date || '') > (a.date || '') ? 1 : -1);
  else if (f.sort === 'oldest') list.sort((a, b) => (a.date || '') > (b.date || '') ? 1 : -1);
  else if (f.sort === 'az') list.sort((a, b) => (a.site || '').localeCompare(b.site || ''));
  else if (f.sort === 'job-asc') list.sort((a, b) => (a.jobNumber || '').localeCompare(b.jobNumber || '', undefined, { numeric: true }));
  else if (f.sort === 'job-desc') list.sort((a, b) => (b.jobNumber || '').localeCompare(a.jobNumber || '', undefined, { numeric: true }));
  return list;
}

  const pc = r.inspections.reduce((s,i) => s + (i.examinations||[]).reduce((es,e) => es + (e.photos||[]).length, 0), 0);

  const more = r.inspections.length > 4 ? `<span class="insp-tag insp-tag-more">+${r.inspections.length-4} more</span>` : '';
  return `<div class="report-card" onclick="editReport('${r.id}')">
    <div class="report-card-top">
      <div>
        <div class="report-site">${esc(r.site||'Unnamed Site')}</div>
        <div class="report-date">${r.jobNumber?`<span style="font-size:11px;background:#eff6ff;color:#1d4ed8;padding:1px 7px;border-radius:10px;margin-right:5px">${esc(r.jobNumber)}</span>`:''}${fmtDate(r.date)}</div>
        ${r.createdBy ? `<div class="report-creator">👤 ${esc(r.createdBy)}</div>` : ''}

      <span class="report-badge ${r.status==='complete'?'badge-complete':'badge-draft'}">${r.status==='complete'?'Complete':'Draft'}</span>
    </div>
    <div class="report-stats">
      <span>📋 ${ic} inspection${ic!==1?'s':''}</span>
      <span>📷 ${pc} photo${pc!==1?'s':''}</span>
      <span>👥 ${r.attendees.length} attendee${r.attendees.length!==1?'s':''}</span>
    </div>
    ${ic > 0 ? `<div class="report-tags">${tags}${more}</div>` : ''}
    <div class="report-card-footer">
      <button class="btn btn-xs btn-danger-ghost" onclick="event.stopPropagation();delReport('${r.id}')">Delete</button>
    </div>
  </div>`;
}

function startNew() {
  const r = newReport();

  navigate('editor');

function editReport(id) {
  state.report = DB.getReport(id);

  navigate('editor');
}
function delReport(id) {
  if (!confirm('Delete this report?')) return;

}

// PROFILE / INSPECTORS
// ═══════════════════════════════════════════════════════════════
// Storage format: { activeId: string, inspectors: [{id,name,company,email}] }

function getInspData() {
  const raw = DB.profile();
  // Migrate old single-object format → new multi-inspector format
  if (raw && !Array.isArray(raw.inspectors)) {
    if (raw.name) {
      const migrated = { id: uid(), name: raw.name, company: raw.company||'', email: raw.email||'' };
      const d = { activeId: migrated.id, inspectors: [migrated] };
      DB.saveProfile(d);
      return d;
    }
    return { activeId: null, inspectors: [] };
  }
  return raw || { activeId: null, inspectors: [] };
}
function activeInspector() {
  const d = getInspData();
  if (!d.inspectors.length) return null;
  return d.inspectors.find(i => i.id === d.activeId) || d.inspectors[0];
}
function initials(name) {
  if (!name) return '';
  return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
}

function renderProfile(el) {
  const d = getInspData();
  const active = activeInspector();
  const others = d.inspectors.filter(i => i.id !== (active && active.id));

  el.innerHTML = `<div class="screen">
    <!-- ACTIVE INSPECTOR -->
    <div style="margin-bottom:6px">
      <div class="section-title" style="margin-bottom:10px">Current Inspector</div>
      ${active ? `

          <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">

            <button class="btn btn-xs btn-ghost" onclick="showEditInspector('${active.id}')">Edit</button>
            <button class="btn btn-xs btn-danger-ghost" onclick="deleteInspector('${active.id}')">✕ Remove</button>
          </div>
        </div>
      ` : `
        <div class="empty-mini" style="background:white;border-radius:var(--radius);border:1px solid var(--border)">

            <button class="btn btn-xs btn-ghost" onclick="event.stopPropagation();showEditInspector('${i.id}')">Edit</button>

function validateCfmaEmail(email) {
  if (!email) return true; // email optional
  if (!email.toLowerCase().endsWith('@cfma.co.nz')) {
    alert('Only @cfma.co.nz email addresses are permitted.');
    return false;
  }
  return true;
}

function showAddInspector() {
  showModal(`<div class="modal-header"><h3>Add Inspector</h3><button class="icon-btn-dark" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label>Full Name *</label>
      <input id="ni-name" type="text" class="form-input" placeholder="e.g. Alex Johnson"></div>
    <div class="form-group"><label>Company</label>
      <input id="ni-company" type="text" class="form-input" value="CFMA"></div>
    <div class="form-group"><label>Email <span style="font-size:11px;color:var(--muted);font-weight:400">(@cfma.co.nz only)</span></label>
      <input id="ni-email" type="email" class="form-input" placeholder="name@cfma.co.nz"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNewInspector()">Save &amp; Set Active</button>
    </div>
  </div>`);
}

function saveNewInspector() {
  const name = document.getElementById('ni-name')?.value.trim();
  if (!name) { alert('Please enter a name'); return; }
  const company = document.getElementById('ni-company')?.value.trim();
  const email = document.getElementById('ni-email')?.value.trim();
  if (!validateCfmaEmail(email)) return;
  const d = getInspData();
  const insp = { id: uid(), name, company: company||'CFMA', email: email||'' };
  d.inspectors.push(insp);
  d.activeId = insp.id;
  DB.saveProfile(d);
  closeModal();
  renderProfile(document.getElementById('main'));
}

function showEditInspector(id) {
  const d = getInspData();
  const insp = d.inspectors.find(i => i.id === id);
  if (!insp) return;
  showModal(`<div class="modal-header"><h3>Edit Inspector</h3><button class="icon-btn-dark" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="form-group"><label>Full Name *</label>
      <input id="ei-name" type="text" class="form-input" value="${esc(insp.name)}"></div>
    <div class="form-group"><label>Company</label>
      <input id="ei-company" type="text" class="form-input" value="${esc(insp.company||'CFMA')}"></div>
    <div class="form-group"><label>Email <span style="font-size:11px;color:var(--muted);font-weight:400">(@cfma.co.nz only)</span></label>
      <input id="ei-email" type="email" class="form-input" value="${esc(insp.email||'')}"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="updateInspector('${id}')">Save</button>
    </div>
  </div>`);
}

function updateInspector(id) {
  const name = document.getElementById('ei-name')?.value.trim();
  if (!name) { alert('Please enter a name'); return; }
  const company = document.getElementById('ei-company')?.value.trim();
  const email = document.getElementById('ei-email')?.value.trim();
  if (!validateCfmaEmail(email)) return;
  const d = getInspData();
  const i = d.inspectors.findIndex(x => x.id === id);
  if (i >= 0) d.inspectors[i] = { ...d.inspectors[i], name, company: company||'CFMA', email: email||'' };
  DB.saveProfile(d);
  closeModal();
  renderProfile(document.getElementById('main'));
}

function switchInspector(id) {
  const d = getInspData();
  d.activeId = id;
  DB.saveProfile(d);
  renderProfile(document.getElementById('main'));
  toast('Inspector switched');
}

function deleteInspector(id) {
  if (!confirm('Remove this inspector?')) return;
  const d = getInspData();
  d.inspectors = d.inspectors.filter(i => i.id !== id);
  if (d.activeId === id) d.activeId = d.inspectors[0]?.id || null;
  DB.saveProfile(d);
  renderProfile(document.getElementById('main'));
}

// Render the quick-links bar for a given inspection (subject-aware)
function renderQuickLinks(inspId, subject, currentTags) {
  const used = new Set((currentTags || []).map(t => t.toLowerCase()));
  const pinned = DB.pinnedTagsFor(subject);
  const pills = pinned.map(t => {
    const applied = used.has(t.toLowerCase());
    const cls = applied ? 'tag-ql tag-ql-pinned' : 'tag-ql';
    const onclick = applied ? '' : `onclick="addInspTag('${inspId}','${esc(t)}')"`;
    return `<span class="${cls}" ${onclick} title="${applied?'Already added':'Add &quot;'+esc(t)+'&quot;'}" style="${applied?'opacity:.45;cursor:default;':''}">${esc(t)}</span>`;
  }).join('');
  const managePills = pinned.map(t =>
    `<span class="tag-ql tag-ql-pinned" style="padding-right:4px">${esc(t)}<span class="tag-ql-unpin" title="Remove from quick links" data-tag="${esc(t)}" onclick="unpinTagQL(this,'${inspId}')">×</span></span>`
  ).join('');
  return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Quick add</span>

    <div class="tag-quicklinks" id="qlm-${inspId}" style="display:none;border-top:1px dashed var(--border);padding-top:8px;margin-top:4px">${managePills}</div>`;
}

        </div>

        </div>
        <div class="note-lines" id="nl-${exam.id}">
          ${noteLines.length
            ? noteLines.map((nl, i) => renderNoteLine(nl, inspId, exam.id, i)).join('')
            : `<div class="note-empty-hint" onclick="addNoteLine('${inspId}','${exam.id}')">Tap to add a note line…</div>`}
        </div>
      </div>
      <div class="exam-section">
        <div class="exam-section-label">
          <span>Actions</span>

function renderInspCard(insp) {
  insp = normalizeInsp(insp);
  const tags = insp.tags || [];
  const exams = insp.examinations || [];
  const tagBadges = tags.length
    ? `<div class="insp-tag-strip" id="ts-${insp.id}">${tags.map(t => `<span class="insp-tag-badge" data-inspid="${insp.id}" data-tag="${esc(t)}" onclick="event.stopPropagation();removeInspTagBadge(this)">${esc(t)} ×</span>`).join('')}</div>`
    : `<div class="insp-tag-strip" id="ts-${insp.id}"></div>`;
  const totalPhotos = exams.reduce((sum, e) => sum + (e.photos || []).length, 0);
  const statParts = [];
  if (totalPhotos > 0) statParts.push(`📷 ${totalPhotos} photo${totalPhotos !== 1 ? 's' : ''}`);
  if (exams.length > 0) statParts.push(`📋 ${exams.length} exam${exams.length !== 1 ? 's' : ''}`);
  const suggestions = getTagSuggestions('', tags);
  const isConstruction = insp.subject === 'construction';
  return `<div class="insp-card" id="ic-${insp.id}">
    <div class="insp-card-header" onclick="toggleInsp('${insp.id}')">
      <div class="insp-card-title">
        <span class="insp-icon">${insp.icon || '📋'}</span>
        <div style="min-width:0">
          <div class="insp-label">${esc(insp.subjectLabel)}</div>
          ${tagBadges}
          <div class="insp-stats-sm" id="sm-${insp.id}">${statParts.join(' · ')}</div>
        </div>
      </div>
      <div class="insp-card-actions">
        <button class="btn btn-xs btn-danger-ghost" onclick="event.stopPropagation();removeInsp('${insp.id}')">✕</button>
        <span class="chevron" id="chev-${insp.id}">▾</span>
      </div>
    </div>
    <div class="insp-body" id="ib-${insp.id}" style="display:none">
      ${isConstruction ? `
      <div class="insp-section">
        <div class="insp-section-title">Inspection Type</div>
        <div class="insp-cat-grid" id="catgrid-${insp.id}">
          ${CONSTRUCTION_CATEGORIES.map(cat => {
            const active = tags.some(t => t.toLowerCase() === cat.toLowerCase());
            return `<button class="insp-cat-pill${active ? ' active' : ''}" onclick="toggleConstructionCat('${insp.id}','${esc(cat)}')">${esc(cat)}</button>`;
          }).join('')}
        </div>
      </div>` : `
      <div class="insp-section">
        <div class="insp-section-title">Inspection Tags</div>
        ${renderQuickLinks(insp.id, insp.subject, tags)}
        <div class="tag-input-wrap">
          <input class="tag-input" id="ti-${insp.id}" placeholder="Add tag…" autocomplete="off"
            list="tdl-${insp.id}"
            onkeydown="handleTagKey(event,'${insp.id}')"
            oninput="updateTagDl('${insp.id}',this.value)">
          <datalist id="tdl-${insp.id}">${suggestions.map(t => `<option value="${esc(t)}">`).join('')}</datalist>
          <button class="btn btn-xs btn-primary" onclick="commitTag('${insp.id}')">＋</button>
        </div>
      </div>`}
      <div id="exams-${insp.id}">
        ${exams.map((e, i) => renderExamination(e, insp.id, i)).join('')}
      </div>
      <div class="add-exam-row">
        <button class="btn btn-sm btn-ghost" style="width:100%" onclick="addExamination('${insp.id}')">＋ Add Examination</button>
      </div>
    </div>
  </div>`;
}

// Tag interaction functions
function handleTagKey(e, inspId) { if (e.key === 'Enter') { e.preventDefault(); commitTag(inspId); } }
function commitTag(inspId) {
  const inp = document.getElementById(`ti-${inspId}`);
  if (!inp || !inp.value.trim()) return;
  const label = inp.value.trim();
  addInspTag(inspId, label);
  inp.value = '';
  updateTagDl(inspId, '');
}

function addInspTag(inspId, label) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.tags) insp.tags = [];
  if (insp.tags.some(t => t.toLowerCase() === label.toLowerCase())) return;
  insp.tags.push(label);
  if (!TAGS_PRESET.some(t => t.toLowerCase() === label.toLowerCase())) DB.saveCustomTag(label);
  DB.saveReport(state.report);
  const strip = document.getElementById(`ts-${inspId}`);
  if (strip) {
    strip.insertAdjacentHTML('beforeend',
      `<span class="insp-tag-badge" data-inspid="${inspId}" data-tag="${esc(label)}" onclick="event.stopPropagation();removeInspTagBadge(this)">${esc(label)} ×</span>`);
  }
  refreshQuickLinks(inspId, insp.tags);
  updateTagDl(inspId, '');
  const isPinned = DB.pinnedTagsFor(insp.subject).some(t => t.toLowerCase() === label.toLowerCase());
  if (!isPinned) showPinPrompt(inspId, label);
}

function removeInspTagBadge(badge) {
  const inspId = badge.dataset.inspid, tag = badge.dataset.tag;
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  insp.tags = (insp.tags || []).filter(t => t !== tag);
  DB.saveReport(state.report);
  badge.remove();
  if (insp.subject === 'construction') {
    refreshConstructionCatGrid(insp);
  } else {
    refreshQuickLinks(inspId, insp.tags);
    updateTagDl(inspId, '');
  }
}

function toggleConstructionCat(inspId, cat) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.tags) insp.tags = [];
  const idx = insp.tags.findIndex(t => t.toLowerCase() === cat.toLowerCase());
  if (idx >= 0) {
    insp.tags.splice(idx, 1);
  } else {
    insp.tags.push(cat);
  }
  DB.saveReport(state.report);
  // Refresh header badge strip
  const strip = document.getElementById(`ts-${inspId}`);
  if (strip) {
    strip.innerHTML = insp.tags.map(t =>
      `<span class="insp-tag-badge" data-inspid="${inspId}" data-tag="${esc(t)}" onclick="event.stopPropagation();removeInspTagBadge(this)">${esc(t)} ×</span>`
    ).join('');
  }
  // Refresh the category pill grid
  refreshConstructionCatGrid(insp);
}

function refreshConstructionCatGrid(insp) {
  const grid = document.getElementById(`catgrid-${insp.id}`);
  if (!grid) return;
  grid.innerHTML = CONSTRUCTION_CATEGORIES.map(cat => {
    const active = (insp.tags || []).some(t => t.toLowerCase() === cat.toLowerCase());
    return `<button class="insp-cat-pill${active ? ' active' : ''}" onclick="toggleConstructionCat('${insp.id}','${esc(cat)}')">${esc(cat)}</button>`;
  }).join('');
}

function refreshQuickLinks(inspId, currentTags) {
  const ql = document.getElementById(`ql-${inspId}`);
  const qlm = document.getElementById(`qlm-${inspId}`);
  if (!ql) return;
  const insp = state.report.inspections.find(i => i.id === inspId);
  const subject = insp ? insp.subject : 'other';
  const used = new Set((currentTags || []).map(t => t.toLowerCase()));
  const pinned = DB.pinnedTagsFor(subject);
  ql.innerHTML = pinned.map(t => {
    const applied = used.has(t.toLowerCase());
    const cls = applied ? 'tag-ql tag-ql-pinned' : 'tag-ql';
    const onclick = applied ? '' : `onclick="addInspTag('${inspId}','${esc(t)}')"`;
    return `<span class="${cls}" ${onclick} title="${applied?'Already added':'Add &quot;'+esc(t)+'&quot;'}" style="${applied?'opacity:.45;cursor:default;':''}">${esc(t)}</span>`;
  }).join('');
  if (qlm && qlm.style.display !== 'none') {
    qlm.innerHTML = pinned.map(t =>
      `<span class="tag-ql tag-ql-pinned" style="padding-right:4px">${esc(t)}<span class="tag-ql-unpin" title="Remove from quick links" data-tag="${esc(t)}" onclick="unpinTagQL(this,'${inspId}')">×</span></span>`
    ).join('');
  }
}

// Show a subtle "📌 Save to quick links?" prompt after adding a custom tag
function showPinPrompt(inspId, label) {
  const existing = document.getElementById(`pinprompt-${inspId}`);
  if (existing) existing.remove();
  const wrap = document.getElementById(`ti-${inspId}`)?.closest('.insp-section');
  if (!wrap) return;
  const div = document.createElement('div');
  div.id = `pinprompt-${inspId}`;
  div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12px;color:var(--muted)';
  div.innerHTML = `<span>📌 Save <strong>${esc(label)}</strong> to quick links?</span>
    <button class="btn btn-xs btn-primary" onclick="pinTagAndRefresh('${inspId}','${esc(label)}')">Save</button>
    <button class="btn btn-xs" onclick="document.getElementById('pinprompt-${inspId}').remove()">✕</button>`;
  wrap.appendChild(div);
  // Auto-dismiss after 8s
  setTimeout(() => { if (div.parentNode) div.remove(); }, 8000);
}

function pinTagAndRefresh(inspId, label) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  DB.pinTagFor(insp ? insp.subject : 'other', label);
  document.getElementById(`pinprompt-${inspId}`)?.remove();
  refreshQuickLinks(inspId, insp ? insp.tags : []);
  // Also refresh all exam quick links (they share the same per-subject pins)
  if (insp) (insp.examinations || []).forEach(exam => refreshExamQuickLinks(inspId, exam.id, exam.tags));
  toast(`"${label}" added to quick links`);
}

function toggleQLManage(inspId) {
  const qlm = document.getElementById(`qlm-${inspId}`);
  const btn = document.getElementById(`qlbtn-${inspId}`);
  if (!qlm) return;
  const open = qlm.style.display !== 'none';
  qlm.style.display = open ? 'none' : 'flex';
  if (btn) btn.textContent = open ? '✎ Manage' : '✓ Done';
  if (!open) {
    const insp = state.report.inspections.find(i => i.id === inspId);
    refreshQuickLinks(inspId, insp ? insp.tags : []);
  }
}

function unpinTagQL(span, inspId) {
  const tag = span.dataset.tag;
  const insp = state.report.inspections.find(i => i.id === inspId);
  DB.unpinTagFor(insp ? insp.subject : 'other', tag);
  refreshQuickLinks(inspId, insp ? insp.tags : []);
  if (insp) (insp.examinations || []).forEach(exam => refreshExamQuickLinks(inspId, exam.id, exam.tags));
  toast(`"${tag}" removed from quick links`);
}

function updateTagDl(inspId, query) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const dl = document.getElementById(`tdl-${inspId}`);
  if (!dl || !insp) return;
  dl.innerHTML = getTagSuggestions(query, insp.tags || []).map(t => `<option value="${esc(t)}">`).join('');
}

// EXAMINATION TAG FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function handleExamTagKey(e, inspId, examId) { if (e.key === 'Enter') { e.preventDefault(); commitExamTag(inspId, examId); } }
function commitExamTag(inspId, examId) {
  const inp = document.getElementById(`eti-${examId}`);
  if (!inp || !inp.value.trim()) return;
  addExamTag(inspId, examId, inp.value.trim());
  inp.value = '';
  updateExamTagDl(inspId, examId, '');
}
function addExamTag(inspId, examId, label) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  if (!exam.tags) exam.tags = [];
  if (exam.tags.some(t => t.toLowerCase() === label.toLowerCase())) return;
  exam.tags.push(label);
  if (!TAGS_PRESET.some(t => t.toLowerCase() === label.toLowerCase())) DB.saveCustomTag(label);
  DB.saveReport(state.report);
  // Add badge to strip
  const strip = document.querySelector(`#exam-${examId} .exam-tag-strip`);
  if (strip) {
    strip.insertAdjacentHTML('beforeend',
      `<span class="insp-tag-badge" data-examid="${examId}" data-tag="${esc(label)}" onclick="removeExamTagBadge(this)">${esc(label)} ×</span>`);
  }
  refreshExamQuickLinks(inspId, examId, exam.tags);
  updateExamTagDl(inspId, examId, '');
  const isPinned = DB.pinnedTagsFor(insp.subject).some(t => t.toLowerCase() === label.toLowerCase());
  if (!isPinned) showExamPinPrompt(inspId, examId, label);
}
function removeExamTagBadge(badge) {
  const examId = badge.dataset.examid, tag = badge.dataset.tag;
  const insp = state.report.inspections.find(i => (i.examinations || []).some(e => e.id === examId));
  if (!insp) return;
  const exam = insp.examinations.find(e => e.id === examId);
  if (!exam) return;
  exam.tags = (exam.tags || []).filter(t => t !== tag);
  DB.saveReport(state.report);
  badge.remove();
  refreshExamQuickLinks(insp.id, examId, exam.tags);
  updateExamTagDl(insp.id, examId, '');
}
function refreshExamQuickLinks(inspId, examId, currentTags) {
  const ql = document.getElementById(`eql-${examId}`);
  const qlm = document.getElementById(`eqlm-${examId}`);
  if (!ql) return;
  const insp = state.report.inspections.find(i => i.id === inspId);
  const subject = insp ? insp.subject : 'other';
  const used = new Set((currentTags || []).map(t => t.toLowerCase()));
  const pinned = DB.pinnedTagsFor(subject);
  ql.innerHTML = pinned.map(t => {
    const applied = used.has(t.toLowerCase());
    const cls = applied ? 'tag-ql tag-ql-pinned' : 'tag-ql';
    const onclick = applied ? '' : `onclick="addExamTag('${inspId}','${examId}','${esc(t)}')"`;
    return `<span class="${cls}" ${onclick} title="${applied?'Already added':'Add &quot;'+esc(t)+'&quot;'}" style="${applied?'opacity:.45;cursor:default;':''}">${esc(t)}</span>`;
  }).join('');
  if (qlm && qlm.style.display !== 'none') {
    qlm.innerHTML = pinned.map(t =>
      `<span class="tag-ql tag-ql-pinned" style="padding-right:4px">${esc(t)}<span class="tag-ql-unpin" title="Remove" data-tag="${esc(t)}" onclick="unpinExamTagQL(this,'${inspId}','${subject}')">×</span></span>`
    ).join('');
  }
}
function toggleExamQLManage(inspId, examId, subject) {
  const qlm = document.getElementById(`eqlm-${examId}`);
  const btn = document.getElementById(`eqlbtn-${examId}`);
  if (!qlm) return;
  const open = qlm.style.display !== 'none';
  qlm.style.display = open ? 'none' : 'flex';
  if (btn) btn.textContent = open ? '✎ Manage' : '✓ Done';
  if (!open) {
    const insp = state.report.inspections.find(i => i.id === inspId);
    const exam = insp && (insp.examinations || []).find(e => e.id === examId);
    refreshExamQuickLinks(inspId, examId, exam ? exam.tags : []);
  }
}
function unpinExamTagQL(span, inspId, subject) {
  const tag = span.dataset.tag;
  DB.unpinTagFor(subject, tag);
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (insp) {
    (insp.examinations || []).forEach(exam => refreshExamQuickLinks(inspId, exam.id, exam.tags));
    refreshQuickLinks(inspId, insp.tags);
  }
  toast(`"${tag}" removed from quick links`);
}
function updateExamTagDl(inspId, examId, query) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const exam = insp && (insp.examinations || []).find(e => e.id === examId);
  const dl = document.getElementById(`etdl-${examId}`);
  if (!dl || !exam) return;
  dl.innerHTML = getTagSuggestions(query, exam.tags || []).map(t => `<option value="${esc(t)}">`).join('');
}
function showExamPinPrompt(inspId, examId, label) {
  const existing = document.getElementById(`expinprompt-${examId}`);
  if (existing) existing.remove();
  const wrap = document.getElementById(`eti-${examId}`)?.closest('.exam-section');
  if (!wrap) return;
  const insp = state.report.inspections.find(i => i.id === inspId);
  const subject = insp ? insp.subject : 'other';
  const div = document.createElement('div');
  div.id = `expinprompt-${examId}`;
  div.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:6px;font-size:12px;color:var(--muted)';
  div.innerHTML = `<span>📌 Save <strong>${esc(label)}</strong> to quick links?</span>
    <button class="btn btn-xs btn-primary" onclick="pinExamTagAndRefresh('${inspId}','${examId}','${esc(label)}','${subject}')">Save</button>
    <button class="btn btn-xs" onclick="document.getElementById('expinprompt-${examId}').remove()">✕</button>`;
  wrap.appendChild(div);
  setTimeout(() => { if (div.parentNode) div.remove(); }, 8000);
}
function pinExamTagAndRefresh(inspId, examId, label, subject) {
  DB.pinTagFor(subject, label);
  document.getElementById(`expinprompt-${examId}`)?.remove();
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (insp) {
    (insp.examinations || []).forEach(exam => refreshExamQuickLinks(inspId, exam.id, exam.tags));
    refreshQuickLinks(inspId, insp.tags);
  }
  toast(`"${label}" added to quick links`);
}

// ═══════════════════════════════════════════════════════════════
// EXAMINATION MANAGEMENT
// ═══════════════════════════════════════════════════════════════
function updateInspStats(insp) {
  const sm = document.getElementById(`sm-${insp.id}`);
  if (!sm) return;
  const exams = insp.examinations || [];
  const totalPhotos = exams.reduce((sum, e) => sum + (e.photos || []).length, 0);
  const parts = [];
  if (totalPhotos > 0) parts.push(`📷 ${totalPhotos} photo${totalPhotos !== 1 ? 's' : ''}`);
  if (exams.length > 0) parts.push(`📋 ${exams.length} exam${exams.length !== 1 ? 's' : ''}`);
  sm.textContent = parts.join(' · ');
}
function addExamination(inspId) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  if (!insp.examinations) insp.examinations = [];
  const exam = { id: uid(), tags: [], notesLines: [], actions: [], photos: [] };
  insp.examinations.push(exam);
  DB.saveReport(state.report);
  const container = document.getElementById(`exams-${inspId}`);
  if (container) {
    const idx = insp.examinations.length - 1;
    container.insertAdjacentHTML('beforeend', renderExamination(exam, inspId, idx));
    document.getElementById(`exam-${exam.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  updateInspStats(insp);
}
function setExamTitle(inspId, examId, title) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const exam = (insp?.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  exam.title = title;
  DB.saveReport(state.report);
}

const EXAM_STATUSES = ['', 'pass', 'action', 'urgent'];
function examStatusLabel(status) {
  return { '': 'Set Status', pass: '✓ Pass', action: '⚠ Action Required', urgent: '🔴 Urgent' }[status || ''];
}
function cycleExamStatus(inspId, examId, btn) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  const exam = (insp?.examinations || []).find(e => e.id === examId);
  if (!exam) return;
  const next = EXAM_STATUSES[(EXAM_STATUSES.indexOf(exam.status || '') + 1) % EXAM_STATUSES.length];
  exam.status = next;
  DB.saveReport(state.report);
  btn.dataset.status = next;
  btn.textContent = examStatusLabel(next);
}

function deleteExamination(inspId, examId) {
  if (!confirm('Remove this examination?')) return;
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  insp.examinations = (insp.examinations || []).filter(e => e.id !== examId);
  DB.saveReport(state.report);
  const container = document.getElementById(`exams-${inspId}`);
  if (container) container.innerHTML = insp.examinations.map((e, i) => renderExamination(e, inspId, i)).join('');
  updateInspStats(insp);
}

// ── WEATHER AUTO-DETECT ─────────────────────────────────────
function mapWeatherCode(code, windKmh) {
  if (windKmh > 45) return 'Windy';
  if (code === 0 || code === 1) return 'Fine';
  if (code === 2 || code === 3 || (code >= 45 && code <= 48)) return 'Overcast';
  if ((code >= 51 && code <= 55) || code === 61 || code === 62 || code === 80 || code === 81) return 'Light Rain';
  if (code === 63 || code === 65 || code === 66 || code === 67 || code === 82 || code >= 95) return 'Heavy Rain';
  return 'Overcast';
}

async function autoDetectWeather() {
  const btn = document.getElementById('wx-btn');
  const src = document.getElementById('wx-source');
  if (btn) btn.textContent = '⏳';
  try {
    // 1. Get location from IP
    const geoRes = await fetch('https://ipapi.co/json/');
    const geo = await geoRes.json();
    const { latitude, longitude, city, country_name } = geo;
    if (!latitude) throw new Error('Location unavailable');
    // 2. Fetch weather from Open-Meteo (free, no key, NZ accurate)
    const wxRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}` +
      `&current=weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=Pacific%2FAuckland`
    );
    const wx = await wxRes.json();
    const code = wx.current.weather_code;
    const wind = wx.current.wind_speed_10m;
    const weather = mapWeatherCode(code, wind);
    // 3. Apply
    setField('weather', weather);
    const sel = document.getElementById('inp-weather');
    if (sel) sel.value = weather;
    if (src) src.textContent = `📍 ${city || country_name || 'Auto-detected'} · Open-Meteo`;
    if (btn) btn.textContent = '✓';
  } catch(e) {
    if (btn) btn.textContent = '🔄 Auto';
    if (src) src.textContent = 'Could not detect — please select manually';
  }
}
