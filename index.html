// Rank search results: starts-with first, then contains
function searchRank(str, q) {
  const s = (str||'').toLowerCase();
  if (s.startsWith(q)) return 0;
  return 1;
}
function filterAndRank(items, q, getFields) {
  if (!q) return items;
  const ql = q.toLowerCase();
  return items
    .filter(item => getFields(item).some(f => (f||'').toLowerCase().includes(ql)))
    .sort((a,b) => {
      const aStart = getFields(a).some(f => (f||'').toLowerCase().startsWith(ql)) ? 0 : 1;
      const bStart = getFields(b).some(f => (f||'').toLowerCase().startsWith(ql)) ? 0 : 1;
      return aStart - bStart;
    });
}

function sortedCons(contacts, sortBy) {
  const s = sortBy || state.attModalSort || 'name';
  return [...contacts].sort((a,b) =>
    s === 'company'
      ? (a.company||'').localeCompare(b.company||'') || a.name.localeCompare(b.name)
      : a.name.localeCompare(b.name)
  );
}
function conListHtml(contacts) {
  return sortedCons(contacts).map(c=>`<div class="contact-select-item" onclick="addConAsAtt('${c.id}')">
    <div>
      <div style="font-size:14px;font-weight:600">${esc(c.name)}</div>
      ${c.company?`<div class="contact-email-sm">${esc(c.company)}</div>`:''}

    </div>

  </div>`).join('');
}

// Returns ISO date string of last time a contact appeared in a report, or null
function contactLastUsed(c) {
  const reports = DB.reports();
  let latest = null;
  for (const r of reports) {
    const used = r.attendees.some(a =>
      (c.email && a.email && a.email.toLowerCase() === c.email.toLowerCase()) ||
      a.name.toLowerCase() === c.name.toLowerCase()
    );
    if (used) {
      const d = r.updatedAt || r.createdAt;
      if (!latest || d > latest) latest = d;
    }
  }
  return latest;
}

function showCleanupContacts() {
  showModal(`<div class="modal-header"><h3>Clean Up Contacts</h3><button class="icon-btn-dark" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Remove contacts not used in any report within the selected period. This cannot be undone.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-ghost btn-full" onclick="cleanupContacts(3)">Delete unused in last <strong>3 months</strong></button>
      <button class="btn btn-ghost btn-full" onclick="cleanupContacts(6)">Delete unused in last <strong>6 months</strong></button>
      <button class="btn btn-ghost btn-full" onclick="cleanupContacts(12)">Delete unused in last <strong>1 year</strong></button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-ghost btn-full" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);
}

function cleanupContacts(months) {
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - months);
  const cutoffISO = cutoff.toISOString();
  const cons = DB.contacts();
  const toDelete = cons.filter(c => {
    const last = contactLastUsed(c);
    return !last || last < cutoffISO;
  });
  if (toDelete.length === 0) {
    closeModal();
    toast(`No contacts to remove for that period`);
    return;
  }
  if (!confirm(`Remove ${toDelete.length} contact${toDelete.length!==1?'s':''} not used in the last ${months < 12 ? months + ' months' : '1 year'}?`)) return;
  const keep = cons.filter(c => {
    const last = contactLastUsed(c);
    return last && last >= cutoffISO;
  });
  DB.saveContacts(keep);
  closeModal();
  toast(`Removed ${toDelete.length} contact${toDelete.length!==1?'s':''}`);
  if (state.screen==='contacts') updateContactsList(state.contactFilter||'');
}

// Minimal EXIF GPS extractor (no external library needed)
function extractPhotoGPS(file, cb) {
  const fr = new FileReader();
  fr.onload = e => {
    try {
      const buf = e.target.result;
      const view = new DataView(buf);
      if (view.getUint16(0, false) !== 0xFFD8) { cb(null); return; } // not JPEG
      let off = 2;
      while (off < buf.byteLength - 4) {
        const marker = view.getUint16(off, false);
        const segLen = view.getUint16(off + 2, false);
        if (marker === 0xFFE1) { // APP1
          // Check for "Exif\0\0"
          if (view.getUint32(off + 4, false) === 0x45786966 && view.getUint16(off + 8, false) === 0) {
            const tiffBase = off + 10;
            const le = view.getUint16(tiffBase, false) === 0x4949;
            const ifd0 = view.getUint32(tiffBase + 4, le);
            const gpsIFDOff = findGPSIFDOffset(view, tiffBase, ifd0, le);
            if (gpsIFDOff !== null) {
              cb(readGPSFromIFD(view, tiffBase, gpsIFDOff, le));
              return;
            }
          }
        }
        if ((marker & 0xFF00) !== 0xFF00 || marker === 0xFFDA) break;
        off += 2 + segLen;
      }
    } catch(_) {}
    cb(null);
  };
  fr.readAsArrayBuffer(file);
}
function findGPSIFDOffset(view, base, ifdOff, le) {
  const n = view.getUint16(base + ifdOff, le);
  for (let i = 0; i < n; i++) {
    const e = base + ifdOff + 2 + i * 12;
    if (view.getUint16(e, le) === 0x8825) return view.getUint32(e + 8, le);
  }
  return null;
}
function readGPSFromIFD(view, base, gpsOff, le) {
  const n = view.getUint16(base + gpsOff, le);
  const tags = {};
  for (let i = 0; i < n; i++) {
    const e = base + gpsOff + 2 + i * 12;
    tags[view.getUint16(e, le)] = e;
  }
  if (!tags[1] || !tags[2] || !tags[3] || !tags[4]) return null;
  const latRef = String.fromCharCode(view.getUint8(tags[1] + 8));
  const lonRef = String.fromCharCode(view.getUint8(tags[3] + 8));
  const lat = readRationals(view, base + view.getUint32(tags[2] + 8, le), 3, le);
  const lon = readRationals(view, base + view.getUint32(tags[4] + 8, le), 3, le);
  const latDD = (lat[0] + lat[1] / 60 + lat[2] / 3600) * (latRef === 'S' ? -1 : 1);
  const lonDD = (lon[0] + lon[1] / 60 + lon[2] / 3600) * (lonRef === 'W' ? -1 : 1);
  if (!isFinite(latDD) || !isFinite(lonDD) || (latDD === 0 && lonDD === 0)) return null;
  return { lat: +latDD.toFixed(6), lng: +lonDD.toFixed(6) };
}
function readRationals(view, off, count, le) {
  return Array.from({length: count}, (_, i) => {
    const num = view.getUint32(off + i * 8, le);
    const den = view.getUint32(off + i * 8 + 4, le);
    return den ? num / den : 0;
  });
}

function doCamera(inspId, examId) {
  closeModal(); state.photoTarget = { inspId, examId };
  const inp = document.getElementById('photo-input');
  inp.setAttribute('capture', 'environment'); inp.click();
}
function doGallery(inspId, examId) {

  const inp = document.getElementById('photo-input');
  inp.removeAttribute('capture'); inp.click();

// Find a photo across all examinations of an inspection
function findPhoto(inspId, photoId) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return null;
  for (const exam of insp.examinations || []) {
    const photo = (exam.photos || []).find(p => p.id === photoId);
    if (photo) return { insp, exam, photo };
  }
  return null;
}
function handlePhotoCapture(inp) {
  const file = inp.files[0];
  if (!file || !state.photoTarget) return;
  const { inspId, examId } = state.photoTarget;
  inp.value = '';
  extractPhotoGPS(file, gps => {
    const reader = new FileReader();
    reader.onload = e => {
      const photo = { id: uid(), data: e.target.result, annotatedData: null, drawCmds: [], note: '', location: gps || null };
      const insp = state.report.inspections.find(i => i.id === inspId);
      if (!insp) return;
      const exam = (insp.examinations || []).find(ex => ex.id === examId);
      if (!exam) return;
      if (!exam.photos) exam.photos = [];
      exam.photos.push(photo);
      DB.saveReport(state.report);
      const grid = document.getElementById(`epg-${examId}`);
      if (grid) {
        const addBtn = grid.querySelector('.photo-add-btn');
        addBtn.insertAdjacentHTML('beforebegin', renderThumb(photo, inspId, examId));
      }
      updateInspStats(insp);
      openAnnotator(inspId, photo.id);
    };
    reader.readAsDataURL(file);
  });
}
function deletePhoto(inspId, photoId, examId) {
  if (!confirm('Delete this photo?')) return;
  const found = findPhoto(inspId, photoId);
  if (!found) return;
  const { insp, exam } = found;
  exam.photos = (exam.photos || []).filter(p => p.id !== photoId);
  DB.saveReport(state.report);
  const grid = document.getElementById(`epg-${exam.id}`);
  if (grid) {
    grid.querySelectorAll('.photo-item').forEach(t => t.remove());
    const addBtn = grid.querySelector('.photo-add-btn');
    (exam.photos || []).forEach(p => addBtn.insertAdjacentHTML('beforebegin', renderThumb(p, inspId, exam.id)));
  }
  updateInspStats(insp);
}

      </div>` : ''}
    </div>
  </div>`);
  setTimeout(() => initCanvas(photo), 30);
}

function initCanvas(photo) {
  const canvas = document.getElementById('ac');
  const wrap = document.getElementById('ca-wrap');
  if (!canvas || !wrap) return;
  CS.ctx = canvas.getContext('2d');
  CS.canvas = canvas;
  CS.cmds = JSON.parse(JSON.stringify(photo.drawCmds || []));
  const img = new Image();
  img.onload = () => {
    CS.img = img;
    const mw = wrap.clientWidth, mh = wrap.clientHeight - 8;
    const scale = Math.min(mw / img.width, mh / img.height, 1);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    redraw();
  };
  img.src = photo.data;
  canvas.addEventListener('touchstart', drawStart, {passive:false});
  canvas.addEventListener('touchmove', drawMove, {passive:false});
  canvas.addEventListener('touchend', drawEnd, {passive:false});
  canvas.addEventListener('mousedown', drawStart);
  canvas.addEventListener('mousemove', drawMove);
  canvas.addEventListener('mouseup', drawEnd);
  canvas.addEventListener('mouseleave', drawEnd);
}
function canvasXY(e) {
  const r = CS.canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}
function drawStart(e) {
  e.preventDefault();
  CS.drawing = true;
  CS.cur = { tool:CS.tool, color:CS.color, size:CS.size, pts:[canvasXY(e)] };
}
function drawMove(e) {
  e.preventDefault();
  if (!CS.drawing || !CS.cur) return;
  const pt = canvasXY(e);
  CS.cur.pts.push(pt);
  const ctx = CS.ctx, pts = CS.cur.pts;
  if (pts.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = CS.cur.tool==='eraser' ? 'destination-out' : 'source-over';
  ctx.strokeStyle = CS.cur.tool==='eraser' ? 'rgba(0,0,0,1)' : CS.cur.color;
  ctx.lineWidth = CS.cur.size;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[pts.length-2].x, pts[pts.length-2].y);
  ctx.lineTo(pt.x, pt.y);
  ctx.stroke();
  ctx.restore();
}
function drawEnd(e) {
  if (!CS.drawing || !CS.cur) return;
  CS.drawing = false;
  if (CS.cur.pts.length > 1) CS.cmds.push(CS.cur);
  CS.cur = null;
}
function redraw() {
  const { ctx, canvas, img, cmds } = CS;
  if (!ctx || !canvas || !img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  for (const cmd of cmds) {
    if (!cmd.pts || cmd.pts.length < 2) continue;
    ctx.save();
    ctx.globalCompositeOperation = cmd.tool==='eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = cmd.tool==='eraser' ? 'rgba(0,0,0,1)' : cmd.color;
    ctx.lineWidth = cmd.size;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(cmd.pts[0].x, cmd.pts[0].y);
    for (let i = 1; i < cmd.pts.length; i++) ctx.lineTo(cmd.pts[i].x, cmd.pts[i].y);
    ctx.stroke();
    ctx.restore();
  }
}
function setTool(t) {
  CS.tool = t;
  document.querySelectorAll('[id^="tb-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`tb-${t}`)?.classList.add('active');
}
function setDrawColor(c) {
  CS.color = c; CS.tool = 'pen'; setTool('pen');
  document.querySelectorAll('.color-swatch').forEach(b => b.classList.toggle('active', b.dataset.c===c));
}
function undoDraw() { if (CS.cmds.length) { CS.cmds.pop(); redraw(); } }
function clearDraw() { if (!confirm('Clear all drawings?')) return; CS.cmds = []; redraw(); }
function cancelAnnot() { closeModal(); }
function clearPhotoLocation() {
  const { inspId, photoId } = state.annotTarget;
  const found = findPhoto(inspId, photoId);
  if (!found) return;
  found.photo.location = null;
  DB.saveReport(state.report);
  const bar = document.querySelector('.photo-loc-bar');
  if (bar) bar.remove();
}
function saveAnnot() {
  const { inspId, photoId } = state.annotTarget;
  const found = findPhoto(inspId, photoId);
  if (!found) return;
  const { insp, exam, photo } = found;
  photo.drawCmds = CS.cmds;
  photo.annotatedData = CS.canvas.toDataURL('image/jpeg', 0.85);
  photo.note = document.getElementById('pnote')?.value || '';
  DB.saveReport(state.report);
  closeModal();
  const grid = document.getElementById(`epg-${exam.id}`);
  if (grid) {
    grid.querySelectorAll('.photo-item').forEach(t => t.remove());
    const addBtn = grid.querySelector('.photo-add-btn');
    (exam.photos || []).forEach(p => addBtn.insertAdjacentHTML('beforebegin', renderThumb(p, inspId, exam.id)));
  }
}

  document.getElementById('share-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function buildReportHtml(r, prof) {
  return `
  <h1 class="rp-h1">📋 Site Inspection Report</h1>
  <div class="rp-meta">
    <div class="rp-meta-grid">
      ${r.jobNumber ? `<div><div class="rp-meta-label">Job Number</div><div class="rp-meta-val">${esc(r.jobNumber)}</div></div>` : ''}
      <div><div class="rp-meta-label">Site Name</div><div class="rp-meta-val">${esc(r.site || 'Not specified')}</div></div>

      <div><div class="rp-meta-label">Status</div><div class="rp-meta-val">${r.status === 'complete' ? '✅ Complete' : '📝 Draft'}</div></div>

          <div style="font-size:12px;color:#64748b">${[prof.company].filter(Boolean).join(' · ')}${prof.email ? ` &lt;${esc(prof.email)}&gt;` : ''}</div>
        </div>
      </div>
    </div>` : ''}
    ${r.attendees.length > 0 ? `<div style="margin-top:14px">
      <div class="rp-meta-label">Persons Present</div>
      <div class="rp-atts">${r.attendees.map(a => `<div class="rp-att-chip">${esc(a.name)}${a.email ? ` &lt;${esc(a.email)}&gt;` : ''}</div>`).join('')}</div>
    </div>` : ''}
    ${r.context ? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid #e2e8f0">
      <div class="rp-meta-label">Purpose &amp; Context</div>
      <div style="font-size:13px;margin-top:4px;line-height:1.6;color:#334155">${esc(r.context)}</div>

  </div>

        const examTags = (exam.tags || []).join(', ');

        const noteLines = exam.notesLines || [];
        const actions = exam.actions || [];
        return `<div class="rp-exam">
          <div class="rp-exam-title" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span>Examination ${ei + 1}${exam.title ? ' — ' + esc(exam.title) : ''}${examTags ? ' · ' + esc(examTags) : ''}</span>
            ${exam.status ? `<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;${
              exam.status==='pass'    ? 'background:#dcfce7;color:#166534' :
              exam.status==='action' ? 'background:#fef3c7;color:#92400e' :
                                       'background:#fee2e2;color:#991b1b'
            }">${examStatusLabel(exam.status)}</span>` : ''}
          </div>
          ${photos.length > 0 ? `
            <h3 class="rp-section">Photos (${photos.length})</h3>
            <div class="rp-photo-grid">${photos.map((p, pi) => `
              <div class="rp-photo-block">
                <img src="${p.annotatedData || p.data}" alt="Photo ${pi + 1}">
                ${p.note ? `<div class="rp-photo-note">${esc(p.note)}</div>` : ''}
                ${p.location ? `<div class="rp-photo-note">📍 ${p.location.lat.toFixed(5)}, ${p.location.lng.toFixed(5)}</div>` : ''}

          ${noteLines.length > 0 ? `
            <div class="rp-notes">
              <strong>Notes:</strong>
              <ol style="margin:6px 0 0 18px;padding:0">

          ${actions.length > 0 ? `

        </div>`;
      }).join('')}
    </div>`;
  }).join('')}
  <div class="rp-footer">Generated by SiteInspect · ${new Date().toLocaleString('en-NZ')}</div>`;
}

function toast(msg) {
  const t = Object.assign(document.createElement('div'), {className:'toast', textContent:msg});
  document.body.appendChild(t);

function migrateData() {
  // Absorb legacy si_sites (plain string array) into si_jobs
  const oldSites = JSON.parse(localStorage.getItem('si_sites') || '[]');
  if (oldSites.length) {
    const existingSites = new Set(DB.jobs().map(j => j.site && j.site.toLowerCase()).filter(Boolean));
    oldSites.forEach(site => {
      if (!existingSites.has(site.toLowerCase())) DB.saveJob(null, site);
    });
    localStorage.removeItem('si_sites');
  }
}
function setupPWA() {
  // Generate app icons using canvas
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    // Blue background with rounded feel
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(0, 0, size, size);
    // White "SI" text
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.round(size * 0.38)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SI', size / 2, size / 2);
    return c.toDataURL('image/png');
  }
  const manifest = {
    name: 'SiteInspect', short_name: 'SiteInspect',
    description: 'Civil engineering site inspection tool',
    start_url: './', display: 'standalone',
    background_color: '#1e40af', theme_color: '#1e40af',
    orientation: 'portrait-primary',
    icons: [
      { src: makeIcon(192), sizes: '192x192', type: 'image/png' },
      { src: makeIcon(512), sizes: '512x512', type: 'image/png', purpose: 'maskable' },
    ]
  };
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(link);
  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

document.addEventListener('DOMContentLoaded', () => {
  setupPWA();
  migrateData();
  render();
  // Pull latest from cloud on startup (if setup is done)
  if (DB.getSetup()) Sync.pull().catch(() => {});
  // Re-sync when returning to the tab
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && DB.getSetup()) Sync.pull().catch(() => {});
  });
});
