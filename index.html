  .lr-card:hover,.lr-card.active{border-color:#3b82f6;box-shadow:0 0 0 2px #bfdbfe}
  .lr-card-img{width:100%;height:150px;object-fit:cover;display:block;background:#f1f5f9}
  .lr-card-body{padding:10px 12px}
  .lr-card-ref{font-size:10px;font-weight:700;color:#64748b;font-family:monospace}
  .lr-card-exam{font-size:13px;font-weight:700;margin:2px 0 4px}
  .lr-card-note{font-size:11px;color:#64748b;font-style:italic}
  .lr-pin{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4);cursor:pointer}
  @media print{
    .lr-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .lr-map{height:400px}
    .lr-card{page-break-inside:avoid}
  }
  @media(max-width:600px){
    .lr-detail{flex-direction:column}
    .lr-detail-img{width:100%;height:180px;min-width:unset}
  }
</style>
</head>
<body>
<div class="lr-header">
  <h1>📍 Location Report — ${esc(insp.subjectLabel || insp.label || 'Inspection')}</h1>
  <div class="lr-header-meta">
    ${r.site ? `<span>📍 ${esc(r.site)}</span>` : ''}
    ${r.date ? `<span>📅 ${esc(r.date)}</span>` : ''}
    ${prof.name ? `<span>👤 ${esc(prof.name)}</span>` : ''}
    <span>📷 ${pins.length} geotagged photo${pins.length !== 1 ? 's' : ''}</span>
  </div>
</div>
<div id="lr-map" class="lr-map"></div>
<div class="lr-detail" id="lr-detail">
  <div class="lr-detail-hint">👆 Click a pin on the map or a photo below to see details</div>
</div>
<div class="lr-list">
  <div class="lr-list-title">All Geotagged Photos (${pins.length})</div>
  <div class="lr-grid" id="lr-grid">
    ${pins.map((p, i) => `
    <div class="lr-card" id="card-${i}" onclick="selectPin(${i})">
      <img class="lr-card-img" src="${p.photoData}" alt="Photo ${p.ref}" loading="lazy">
      <div class="lr-card-body">
        <div class="lr-card-ref">Fig. ${esc(p.ref)}</div>
        <div class="lr-card-exam">${esc(p.examTitle)}</div>
        ${p.photoNote ? `<div class="lr-card-note">${esc(p.photoNote)}</div>` : ''}
        ${p.examStatus ? `<div style="margin-top:4px;font-size:11px;font-weight:700;color:${statusColor[p.examStatus]||'#64748b'}">${statusLabel[p.examStatus]||p.examStatus}</div>` : ''}
      </div>
    </div>`).join('')}
  </div>
</div>
<script>
var pins = ${pinsJson};
var statusColor = ${JSON.stringify(statusColor)};
var statusLabel = ${JSON.stringify(statusLabel)};
var markers = [];
var activeIdx = -1;

function makePinIcon(idx, status) {
  var color = statusColor[status] || '#3b82f6';
  return L.divIcon({
    html: '<div class="lr-pin" style="background:' + color + '">' + (idx + 1) + '<\/div>',
    className: '', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
  });
}

function selectPin(idx) {
  var p = pins[idx];
  // Update map — open popup
  markers[idx].openPopup();
  map.setView([p.lat, p.lng], Math.max(map.getZoom(), 16), { animate: true });
  // Update detail panel
  var sc = statusColor[p.examStatus] || null;
  var sl = statusLabel[p.examStatus] || '';
  var notesHtml = p.examNotes.length
    ? '<div class="lr-section-label">Notes<\/div>' + p.examNotes.map(function(n){ return '<div class="lr-note">' + esc(n) + '<\/div>'; }).join('')
    : '';
  var actionsHtml = p.examActions.length
    ? '<div class="lr-section-label">Actions<\/div>' + p.examActions.map(function(a){ return '<div class="lr-action">' + esc(a.text) + (a.assign ? '<span class="lr-action-assign">' + esc(a.assign) + '<\/span>' : '') + '<\/div>'; }).join('')
    : '';
  var tagsHtml = p.examTags.length
    ? '<div class="lr-tags">' + p.examTags.map(function(t){ return '<span class="lr-tag">' + esc(t) + '<\/span>'; }).join('') + '<\/div>'
    : '';
  document.getElementById('lr-detail').innerHTML =
    '<div class="lr-detail-img"><img src="' + p.photoData + '" alt="Photo"><\/div>' +
    '<div class="lr-detail-body">' +
      '<div class="lr-ref">Fig. ' + esc(p.ref) + '<\/div>' +
      '<div class="lr-exam-title">' + esc(p.examTitle) + '<\/div>' +
      (sc ? '<span class="lr-status" style="background:' + sc + '22;color:' + sc + ';border:1px solid ' + sc + '55">' + sl + '<\/span>' : '') +
      tagsHtml + notesHtml + actionsHtml +
      (p.photoNote ? '<div class="lr-photo-note">📝 ' + esc(p.photoNote) + '<\/div>' : '') +
      '<div class="lr-coords">📌 ' + p.lat.toFixed(6) + '°, ' + p.lng.toFixed(6) + '°<\/div>' +
    '<\/div>';
  // Highlight active card
  document.querySelectorAll('.lr-card').forEach(function(el){ el.classList.remove('active'); });
  var card = document.getElementById('card-' + idx);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  activeIdx = idx;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var map = L.map('lr-map');
var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap<\/a>',maxZoom:19});
var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles © Esri',maxZoom:19});
streetLayer.addTo(map);
L.control.layers({'🗺 Street':streetLayer,'🛰 Satellite':satelliteLayer},{},{position:'topright'}).addTo(map);

var bounds = L.latLngBounds();
pins.forEach(function(p, i) {
  var ll = [p.lat, p.lng];
  bounds.extend(ll);
  var m = L.marker(ll, { icon: makePinIcon(i, p.examStatus) }).addTo(map);
  var thumb = p.photoData;
  m.bindPopup(
    '<div style="text-align:center;min-width:160px">' +
    '<img src="' + thumb + '" style="width:160px;height:110px;object-fit:cover;border-radius:6px;margin-bottom:8px;display:block">' +
    '<div style="font-weight:700;font-size:13px">' + esc(p.examTitle) + '<\/div>' +
    '<div style="font-size:11px;color:#64748b;margin-top:2px">Fig. ' + esc(p.ref) + (p.photoNote ? ' — ' + esc(p.photoNote) : '') + '<\/div>' +
    (p.examStatus ? '<div style="font-size:12px;font-weight:700;margin-top:4px;color:' + (statusColor[p.examStatus]||'#64748b') + '">' + esc(statusLabel[p.examStatus]||'') + '<\/div>' : '') +
    '<\/div>',
    { maxWidth: 200 }
  );
  m.on('click', function() { selectPin(i); });
  markers.push(m);
});
map.fitBounds(bounds, { padding: [40, 40], maxZoom: 18 });
<\/script>
</body>
</html>`;

  const win = window.open('', '_blank');
  if (!win) { toast('Allow pop-ups to open the Location Report'); return; }
  win.document.write(html);
  win.document.close();
}

function pickPhoto(inspId, examId) {
  state.photoTarget = { inspId, examId };
  showModal(`<div class="modal-header"><h3>Add Photo</h3><button class="icon-btn-dark" onclick="closeModal()">✕</button></div>
  <div class="modal-body">
    <div class="photo-choice-grid">
      <button class="photo-choice-btn" onclick="doCamera('${inspId}','${examId}')"><span>📷</span><span>Camera</span></button>
      <button class="photo-choice-btn" onclick="doGallery('${inspId}','${examId}')"><span>🖼️</span><span>Gallery</span></button>
    </div>
  </div>`);
}
function doCamera(inspId, examId) {
  closeModal();
  // Start device GPS fetch immediately in parallel with camera opening —
  // used as fallback if the photo has no EXIF GPS data.
  const deviceGpsPromise = new Promise(resolve => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
      ()  => resolve(null),
      { timeout: 10000, maximumAge: 30000, enableHighAccuracy: true }
    );
  });
  state.photoTarget = { inspId, examId, deviceGpsPromise };
  document.getElementById('photo-input-camera').click();
}
function doGallery(inspId, examId) {
  closeModal(); state.photoTarget = { inspId, examId };
  document.getElementById('photo-input-gallery').click();
}
// Find a photo across all examinations of an inspection
function findPhoto(inspId, photoId) {
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return null;
  for (const exam of insp.examinations || []) {
    const photo = (exam.photos || []).find(p => p.id === photoId);
    if (photo) return { insp, exam, photo };
  }
  return null;
}
// Resize image to max dimension, returns a compressed JPEG data URL
function resizePhoto(file, maxDim, quality, cb) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(canvas.toDataURL('image/jpeg', quality));
  };
  img.onerror = () => { const fr = new FileReader(); fr.onload = e => cb(e.target.result); fr.readAsDataURL(file); };
  img.src = url;
}
function handlePhotoCapture(inp) {
  const files = Array.from(inp.files);
  if (!files.length || !state.photoTarget) return;
  const { inspId, examId, deviceGpsPromise } = state.photoTarget;
  inp.value = '';
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(ex => ex.id === examId);
  if (!exam) return;
  if (!exam.photos) exam.photos = [];
  if (files.length > 1) toast(`Adding ${files.length} photos…`);
  let completed = 0;
  files.forEach(file => {
    let gpsResult = null, resizedData = null, done = 0;
    const tryCommit = async () => {
      if (++done < 2) return;
      // If photo has no EXIF GPS and this was a camera capture, fall back to device location
      let location = gpsResult;
      if (!location && deviceGpsPromise) location = await deviceGpsPromise;
      const photo = { id: uid(), data: resizedData, annotatedData: null, drawCmds: [], note: '', location: location || null, capturedAt: new Date().toISOString() };
      exam.photos.push(photo);
      const grid = document.getElementById(`epg-${examId}`);
      if (grid) {
        const addBtn = grid.querySelector('.photo-add-btn');
        if (addBtn) addBtn.insertAdjacentHTML('beforebegin', renderThumb(photo, inspId, examId));
      }
      completed++;
      if (completed === files.length) {
        try { DB.saveReport(state.report); }
        catch(e) { if (e.name === 'QuotaExceededError') toast('Storage full — photos saved in session only'); }
        updateInspStats(insp);
        // Warn when report exceeds 25 photos — recommend splitting across inspections
        const totalPhotos = (state.report.inspections || []).reduce((n, i) =>
          n + (i.examinations || []).reduce((m, e) => m + (e.photos || []).length, 0), 0);
        if (totalPhotos === 25) {
          toast('📷 25 photos reached — consider creating an additional inspection to maintain image quality', 6000);
        }
      }
      // Upload photo to Supabase Storage so other devices can load it without base64 in the report
      const setup = DB.getSetup();
      if (navigator.onLine && _sb && setup) {
        uploadPhotoToStorage(photo.id, setup.companyCode, photo.data).then(url => {
          if (url) { photo.url = url; DB.saveReport(state.report); }
          else PhotoUploadQueue.add(state.report.id, inspId, examId, photo.id, false);
        });
      } else {
        PhotoUploadQueue.add(state.report.id, inspId, examId, photo.id, false);
      }
    };
    extractPhotoGPS(file, gps => { gpsResult = gps || null; tryCommit(); });
    resizePhoto(file, 900, 0.72, data => { resizedData = data; tryCommit(); });
  });
}
let _undoDeletePhoto = null;
function deletePhoto(inspId, photoId, examId) {
  const found = findPhoto(inspId, photoId);
  if (!found) return;
  const { insp, exam } = found;
  const photoIndex = (exam.photos || []).findIndex(p => p.id === photoId);
  const photoBackup = exam.photos[photoIndex];
  // Remove immediately
  exam.photos = (exam.photos || []).filter(p => p.id !== photoId);
  DB.saveReport(state.report);
  const grid = document.getElementById(`epg-${exam.id}`);
  if (grid) {
    grid.querySelectorAll('.photo-item').forEach(t => t.remove());
    const addBtn = grid.querySelector('.photo-add-btn');
    (exam.photos || []).forEach(p => addBtn.insertAdjacentHTML('beforebegin', renderThumb(p, inspId, exam.id)));
  }
  updateInspStats(insp);
  // Show undo toast
  if (_undoDeletePhoto) clearTimeout(_undoDeletePhoto.timer);
  _undoDeletePhoto = {
    inspId, examId, photo: photoBackup, index: photoIndex,
    timer: setTimeout(() => { _undoDeletePhoto = null; }, 5000),
  };
  toastUndo('Photo deleted', () => {
    if (!_undoDeletePhoto) return;
    clearTimeout(_undoDeletePhoto.timer);
    const { inspId: iid, examId: eid, photo, index: idx } = _undoDeletePhoto;
    _undoDeletePhoto = null;
    const insp2 = state.report.inspections.find(i => i.id === iid);
    if (!insp2) return;
    const exam2 = (insp2.examinations || []).find(e => e.id === eid);
    if (!exam2) return;
    exam2.photos = exam2.photos || [];
    exam2.photos.splice(idx, 0, photo);
    DB.saveReport(state.report);
    const g = document.getElementById(`epg-${eid}`);
    if (g) {
      g.querySelectorAll('.photo-item').forEach(t => t.remove());
      const addBtn = g.querySelector('.photo-add-btn');
      exam2.photos.forEach(p => addBtn.insertAdjacentHTML('beforebegin', renderThumb(p, iid, eid)));
    }
    updateInspStats(insp2);
  });
}

// ═══════════════════════════════════════════════════════════════
// PHOTO REPLACE
// ═══════════════════════════════════════════════════════════════
let _replacePhotoTarget = null;
function replacePhoto(inspId, examId, photoId) {
  _replacePhotoTarget = { inspId, examId, photoId };
  document.getElementById('photo-input-replace').click();
}
function handlePhotoReplace(inp) {
  const file = inp.files[0];
  inp.value = '';
  if (!file || !_replacePhotoTarget) return;
  const { inspId, examId, photoId } = _replacePhotoTarget;
  _replacePhotoTarget = null;
  const insp = state.report.inspections.find(i => i.id === inspId);
  if (!insp) return;
  const exam = (insp.examinations || []).find(ex => ex.id === examId);
  if (!exam) return;
  const photo = (exam.photos || []).find(p => p.id === photoId);
  if (!photo) return;
  resizePhoto(file, 900, 0.72, data => {
    photo.data = data;
    photo.annotatedData = null;  // clear annotations — new base image
    photo.drawCmds = [];         // clear draw commands — no longer valid for new image
    // keep: photo.note, photo.location, photo.id
    photo.capturedAt = new Date().toISOString();
    photo.url = null; // force re-upload
    DB.saveReport(state.report);
    // Re-render the thumb
    const grid = document.getElementById(`epg-${examId}`);
    if (grid) {
      grid.querySelectorAll('.photo-item').forEach(t => t.remove());
      const addBtn = grid.querySelector('.photo-add-btn');
      (exam.photos || []).forEach(p => addBtn.insertAdjacentHTML('beforebegin', renderThumb(p, inspId, examId)));
    }
    toast('Photo replaced');
    // Upload replacement to storage
    const setup = DB.getSetup();
    if (navigator.onLine && _sb && setup) {
      uploadPhotoToStorage(photo.id, setup.companyCode, photo.data).then(url => {
        if (url) { photo.url = url; DB.saveReport(state.report); }
        else PhotoUploadQueue.add(state.report.id, inspId, examId, photo.id, false);
      });
    } else {
      PhotoUploadQueue.add(state.report.id, inspId, examId, photo.id, false);
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// PHOTO ANNOTATOR
// ═══════════════════════════════════════════════════════════════
const CS = { tool:'pen', color:'#ff0000', size:5, drawing:false, cmds:[], cur:null, ctx:null, canvas:null, img:null };

function openAnnotator(inspId, photoId) {
  const found = findPhoto(inspId, photoId);
  if (!found) return;
  const { photo } = found;
  state.annotTarget = { inspId, photoId };

  showModalFull(`<div class="annotator-wrap">
    <div class="annotator-header">
      <div class="tool-group">
        <button class="tool-btn active" id="tb-pen" onclick="setTool('pen')" title="Draw">✏️</button>
        <button class="tool-btn" id="tb-eraser" onclick="setTool('eraser')" title="Eraser">⬜</button>
      </div>
      <div class="annotator-divider"></div>
      <div class="color-swatches">
        <button class="color-swatch active" style="background:#ff0000" data-c="#ff0000" onclick="setDrawColor('#ff0000')"></button>
        <button class="color-swatch" style="background:#ffff00" data-c="#ffff00" onclick="setDrawColor('#ffff00')"></button>
        <button class="color-swatch" style="background:#00e0ff" data-c="#00e0ff" onclick="setDrawColor('#00e0ff')"></button>
        <button class="color-swatch" style="background:#00e050" data-c="#00e050" onclick="setDrawColor('#00e050')"></button>
        <button class="color-swatch" style="background:#ffffff" data-c="#ffffff" onclick="setDrawColor('#ffffff')"></button>
        <button class="color-swatch" style="background:#000000" data-c="#000000" onclick="setDrawColor('#000000')"></button>
      </div>
      <div class="annotator-divider"></div>
      <select class="brush-sel" onchange="CS.size=+this.value">
        <option value="3">Thin</option>
        <option value="5" selected>Med</option>
        <option value="10">Thick</option>
        <option value="20">XL</option>
      </select>
      <div class="annotator-divider"></div>
      <button class="tool-btn" onclick="undoDraw()" title="Undo">↩️</button>
      <button class="tool-btn" onclick="clearDraw()" title="Clear all">🗑️</button>
    </div>
    <div class="annotator-canvas-area" id="ca-wrap"><canvas id="ac"></canvas></div>
    <div class="annotator-footer">
      <div class="annotator-btn-row">
        <button class="btn btn-sm btn-ghost" style="color:white;border-color:rgba(255,255,255,.3)" onclick="cancelAnnot()">Cancel</button>
        <button class="btn btn-sm btn-primary" onclick="saveAnnot()">✓ Done</button>
      </div>
      <label>Photo notes</label>
      <textarea id="pnote" placeholder="Describe what is shown in this photo…">${esc(photo.note)}</textarea>
      ${photo.location ? `<div class="photo-loc-bar">
        <span>📍 ${photo.location.lat}, ${photo.location.lng}</span>
        <a href="https://maps.google.com/?q=${photo.location.lat},${photo.location.lng}" target="_blank" class="btn btn-xs btn-ghost" style="color:white;border-color:rgba(255,255,255,.3)">View Map</a>
        <button class="btn btn-xs btn-ghost" style="color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2)" onclick="clearPhotoLocation()">✕ Remove</button>
      </div>` : ''}
    </div>
  </div>`);
  setTimeout(() => initCanvas(photo), 30);
}

function initCanvas(photo) {
  const canvas = document.getElementById('ac');
  const wrap = document.getElementById('ca-wrap');
  if (!canvas || !wrap) return;
  CS.ctx = canvas.getContext('2d');
  CS.canvas = canvas;
  CS.cmds = JSON.parse(JSON.stringify(photo.drawCmds || []));
  const img = new Image();
  img.onload = () => {
    CS.img = img;
    const mw = wrap.clientWidth, mh = wrap.clientHeight - 8;
    const scale = Math.min(mw / img.width, mh / img.height, 1);
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    redraw();
  };
  img.src = photoSrc(photo, false); // load original (not annotated) for canvas editing
  canvas.addEventListener('touchstart', drawStart, {passive:false});
  canvas.addEventListener('touchmove', drawMove, {passive:false});
  canvas.addEventListener('touchend', drawEnd, {passive:false});
  canvas.addEventListener('mousedown', drawStart);
  canvas.addEventListener('mousemove', drawMove);
  canvas.addEventListener('mouseup', drawEnd);
  canvas.addEventListener('mouseleave', drawEnd);
}
function canvasXY(e) {
  const r = CS.canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}
function drawStart(e) {
  e.preventDefault();
  CS.drawing = true;
  CS.cur = { tool:CS.tool, color:CS.color, size:CS.size, pts:[canvasXY(e)] };
}
function drawMove(e) {
  e.preventDefault();
  if (!CS.drawing || !CS.cur) return;
  const pt = canvasXY(e);
  CS.cur.pts.push(pt);
  const ctx = CS.ctx, pts = CS.cur.pts;
  if (pts.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = CS.cur.tool==='eraser' ? 'destination-out' : 'source-over';
  ctx.strokeStyle = CS.cur.tool==='eraser' ? 'rgba(0,0,0,1)' : CS.cur.color;
  ctx.lineWidth = CS.cur.size;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[pts.length-2].x, pts[pts.length-2].y);
  ctx.lineTo(pt.x, pt.y);
  ctx.stroke();
  ctx.restore();
}
function drawEnd(e) {
  if (!CS.drawing || !CS.cur) return;
  CS.drawing = false;
  if (CS.cur.pts.length > 1) CS.cmds.push(CS.cur);
  CS.cur = null;
}
function redraw() {
  const { ctx, canvas, img, cmds } = CS;
  if (!ctx || !canvas || !img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  for (const cmd of cmds) {
    if (!cmd.pts || cmd.pts.length < 2) continue;
    ctx.save();
    ctx.globalCompositeOperation = cmd.tool==='eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = cmd.tool==='eraser' ? 'rgba(0,0,0,1)' : cmd.color;
    ctx.lineWidth = cmd.size;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(cmd.pts[0].x, cmd.pts[0].y);
    for (let i = 1; i < cmd.pts.length; i++) ctx.lineTo(cmd.pts[i].x, cmd.pts[i].y);
    ctx.stroke();
    ctx.restore();
  }
}
function setTool(t) {
  CS.tool = t;
  document.querySelectorAll('[id^="tb-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`tb-${t}`)?.classList.add('active');
}
function setDrawColor(c) {
  CS.color = c; CS.tool = 'pen'; setTool('pen');
  document.querySelectorAll('.color-swatch').forEach(b => b.classList.toggle('active', b.dataset.c===c));
}
function undoDraw() { if (CS.cmds.length) { CS.cmds.pop(); redraw(); } }
function clearDraw() { if (!confirm('Clear all drawings?')) return; CS.cmds = []; redraw(); }
function cancelAnnot() { closeModal(); }
function clearPhotoLocation() {
  const { inspId, photoId } = state.annotTarget;
  const found = findPhoto(inspId, photoId);

  found.photo.location = null;

  const bar = document.querySelector('.photo-loc-bar');

}
function saveAnnot() {
  const { inspId, photoId } = state.annotTarget;
  const found = findPhoto(inspId, photoId);
  if (!found) return;
  const { insp, exam, photo } = found;
  photo.drawCmds = CS.cmds;
  photo.annotatedData = CS.canvas.toDataURL('image/jpeg', 0.78);
  photo.note = document.getElementById('pnote')?.value || '';
  DB.saveReport(state.report);
  closeModal();
  const grid = document.getElementById(`epg-${exam.id}`);
  if (grid) {
    grid.querySelectorAll('.photo-item').forEach(t => t.remove());
    const addBtn = grid.querySelector('.photo-add-btn');
    (exam.photos || []).forEach(p => addBtn.insertAdjacentHTML('beforebegin', renderThumb(p, inspId, exam.id)));
  }
  // Upload annotated version to Storage
  const setup = DB.getSetup();
  if (navigator.onLine && _sb && setup) {
    uploadPhotoToStorage(photo.id + '_ann', setup.companyCode, photo.annotatedData).then(url => {
      if (url) { photo.annotatedUrl = url; DB.saveReport(state.report); }
      else PhotoUploadQueue.add(state.report.id, inspId, exam.id, photo.id, true);
    });
  } else {
    PhotoUploadQueue.add(state.report.id, inspId, exam.id, photo.id, true);
  }
}

function closePreview() {
  document.getElementById('report-preview').classList.remove('open');
  document.body.style.overflow = '';
}

function closeShare() {
  document.getElementById('share-overlay').classList.remove('open');

}

function publishReport() {
  saveReport();
  const r = state.report;
  ActivityLog.add('published report', 'report', r.site || 'Report');
  const prof = activeInspector() || {};
  const _fdate = (r.date ? new Date(r.date) : new Date());
  const _yymmdd = `${String(_fdate.getFullYear()).slice(2)}${String(_fdate.getMonth()+1).padStart(2,'0')}${String(_fdate.getDate()).padStart(2,'0')}`;
  const _site = (r.site||'Site').replace(/[^a-z0-9]/gi,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
  const _job = r.jobNumber ? String(r.jobNumber).replace(/[^a-z0-9]/gi,'_') + '_' : '';
  const filename = `${_job}${_yymmdd}_${_site}_Siteinspect.pdf`;

  // Record this publication in the report's history
  if (!r.publications) r.publications = [];
  r.publications.unshift({ at: new Date().toISOString(), by: prof.name || '', filename, type: 'publish' });
  DB.saveReport(r);

  // Build the full self-contained HTML document
  const fullHtml = buildPublishHtml(r, prof);
  openPrintWindow(fullHtml);

  // Collect email recipients: attendees + CC contacts with emails
  const recipients = [
    ...(r.attendees || []).filter(a => a.email).map(a => ({...a, role:'Attendee'})),
    ...(r.ccContacts || []).filter(c => c.email).map(c => ({...c, role:'CC'})),
  ];

  // Build mailto href
  const toAddrs = recipients.map(p => p.name ? `${p.name} <${p.email}>` : p.email).join(', ');
  const subject = encodeURIComponent(`Site Inspection Report – ${r.site||'Site'} – ${r.date||''}`);
  const body = encodeURIComponent(
    `Hi,\n\nPlease find attached the site inspection report for ${r.site||'the site'}${r.date ? ' dated ' + r.date : ''}.\n\n` +
    (r.jobNumber ? `Job Number: ${r.jobNumber}\n` : '') +
    `Status: ${r.status === 'complete' ? 'Complete' : 'Draft'}\n\n` +
    `The report is attached as a PDF.\n\nRegards,\n${prof.name||''}`.trim()
  );
  const mailtoHref = `mailto:${encodeURIComponent(toAddrs)}?subject=${subject}&body=${body}`;

  // Show share sheet
  const recipientsHtml = recipients.length
    ? `<div class="share-recipients">${recipients.map(p => `
        <div class="share-recipient">
          <div>
            <span class="share-recipient-name">${esc(p.name||p.email)}</span>
            ${p.name ? `<span class="share-recipient-email"> &lt;${esc(p.email)}&gt;</span>` : ''}
            <span class="share-recipient-role">${p.role}</span>
          </div>
        </div>`).join('')}
      </div>`
    : `<p class="share-no-recipients">No email recipients set — add attendees or CC contacts to the report.</p>`;

  document.getElementById('share-body').innerHTML = `
    <div class="share-downloaded">
      <div class="share-downloaded-icon">✅</div>
      <div class="share-downloaded-text">
        Print dialog opened — choose <strong>Save as PDF</strong><br>
        <span class="share-downloaded-file">${esc(filename)}</span>
      </div>
    </div>
    <div class="share-section-label">Recipients</div>
    ${recipientsHtml}
    <div class="share-actions">
      ${recipients.length ? `
        <a href="${mailtoHref}" class="btn btn-email btn-full" style="text-decoration:none;display:block;text-align:center;padding:12px" onclick="closeShare()">
          ✉️ Open Email App with Recipients
        </a>` : `
        <a href="mailto:?subject=${subject}&body=${body}" class="btn btn-email btn-full" style="text-decoration:none;display:block;text-align:center;padding:12px" onclick="closeShare()">
          ✉️ Open Email App
        </a>`}
    </div>
    <p class="share-hint">Save as PDF in the print dialog, then attach it to your email.</p>`;

  document.getElementById('share-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

    ${completed > 0 ? `<span style="background:#dcfce7;color:#14532d;border:1px solid #86efac;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700">✓ ${completed} Complete</span>` : ''}

    ${na > 0 ? `<span style="background:#f1f5f9;color:#64748b;border:1px solid #cbd5e1;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700">— ${na} N/A</span>` : ''}
  </div>
  <table class="rp-table" style="margin-bottom:24px">
    <thead>
      <tr>
        <th class="rp-th" style="width:50px">Ref.</th>
        <th class="rp-th">Action Description</th>
        <th class="rp-th" style="width:130px">Assigned To</th>
        <th class="rp-th" style="width:95px">Status</th>

        const lbl = a.status === 'complete' ? 'Complete'

        return `<tr>
          <td class="rp-td rp-mono">${esc(a.inspRef)}</td>
          <td class="rp-td">
            <div style="font-weight:600">${esc(a.originalNote)}</div>

          </td>
          <td class="rp-td">${esc(a.assignedTo || '—')}</td>
          <td class="rp-td"><span class="rp-status-badge" style="${sty};padding:3px 8px;border-radius:3px;font-size:11px;font-weight:700">${lbl}</span></td>
          <td class="rp-td" style="color:${a.reviewNote ? '#1e293b' : '#94a3b8'}">${esc(a.reviewNote || '—')}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

  try { points = JSON.parse(raw); } catch(e) { return; }
  if (!points || !points.length) return;
  var map = L.map(container);
  var streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

  });
  var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles \u00a9 Esri', maxZoom: 19
  });
  streetLayer.addTo(map);
  L.control.layers({'\uD83D\uDDFA Street': streetLayer, '\uD83D\uDEF0 Satellite': satelliteLayer}, {}, {position:'topright'}).addTo(map);
  var markers = points.map(function(p, i) {
    var icon = L.divIcon({
      html: '<div style="background:#1e3a5f;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)">'+(i+1)+'</div>',

  });

function openPrintWindow(fullHtml) {
  const win = window.open('', '_blank');
  if (!win) { toast('Allow pop-ups to open the print dialog'); return; }
  win.document.write(fullHtml);
  win.document.close();
  win.addEventListener('load', () => {
    const imgs = Array.from(win.document.images);
    if (!imgs.length) { setTimeout(() => win.print(), 400); return; }

    // First, convert any external URL images (Supabase Storage) to embedded base64.
    // This makes the PDF self-contained so it doesn't depend on network access or
    // Storage bucket permissions when viewed later.
    const embedUrlImages = () => Promise.all(
      imgs.map(img => {
        if (!img.src || img.src.startsWith('data:') || img.src.startsWith('blob:')) return Promise.resolve();
        return fetch(img.src, { mode: 'cors' })
          .then(r => r.ok ? r.blob() : Promise.reject())
          .then(blob => new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = () => { img.src = reader.result; resolve(); };
            reader.readAsDataURL(blob);
          }))
          .catch(() => {}); // leave as URL if fetch fails — better than nothing
      })
    );

    embedUrlImages().then(() =>
      Promise.all(imgs.map(img => img.decode ? img.decode().catch(() => {}) : Promise.resolve()))
    ).then(() => {
      win.requestAnimationFrame(() => {
        win.requestAnimationFrame(() => win.print());
      });
    }).catch(() => {
      setTimeout(() => win.print(), 1500);
    });
  });
}

function reopenReport(reportId) {

function initReportGeoMap() {
  const container = document.getElementById('rp-geomap');
  if (!container) return;
  if (container._leaflet_id) return;
  if (typeof L === 'undefined') {
    container.innerHTML = '<p style="display:flex;align-items:center;justify-content:center;height:100%;color:#64748b;font-size:13px">📡 Map requires an internet connection</p>';
    return;
  }
  const points = JSON.parse(container.getAttribute('data-points') || '[]');
  if (!points.length) return;
  const map = L.map(container);
  const _s = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors', maxZoom: 19 });
  const _sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 });
  _s.addTo(map);
  L.control.layers({ '🗺 Street': _s, '🛰 Satellite': _sat }, {}, { position: 'topright' }).addTo(map);
  const markers = points.map((p, i) => {
    const icon = L.divIcon({
      html: `<div style="background:#1e3a5f;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.5)">${i+1}</div>`,
      className: '', iconSize: [26, 26], iconAnchor: [13, 13]
    });
    const popup = `<strong>Fig. ${p.ref}</strong><br>${p.examTitle}${p.note ? '<br><em>' + p.note + '</em>' : ''}`;
    return L.marker([p.lat, p.lng], { icon }).addTo(map).bindPopup(popup);
  });
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds().pad(0.25));
}

function printPreviewReport() {
  // Record this print in the report's publication history
  if (state.report) {
    const r = state.report;
    const prof = activeInspector() || {};
    if (!r.publications) r.publications = [];
    const _fd = r.date ? new Date(r.date) : new Date();
    const _yymmdd = `${String(_fd.getFullYear()).slice(2)}${String(_fd.getMonth()+1).padStart(2,'0')}${String(_fd.getDate()).padStart(2,'0')}`;
    const _site = (r.site||'Site').replace(/[^a-z0-9]/gi,'_').replace(/_+/g,'_').replace(/^_|_$/g,'');
    const _job = r.jobNumber ? String(r.jobNumber).replace(/[^a-z0-9]/gi,'_') + '_' : '';
    r.publications.unshift({ at: new Date().toISOString(), by: prof.name || '', filename: `${_job}${_yymmdd}_${_site}_Siteinspect.pdf`, type: 'print' });
    DB.saveReport(r);
  }
  const imgs = Array.from(document.querySelectorAll('#rp-body img'));
  if (!imgs.length) { window.print(); return; }
  const btn = document.querySelector('.rp-btn-print');
  if (btn) { btn.textContent = 'Preparing…'; btn.disabled = true; }
  Promise.all(
    imgs.map(img => img.decode ? img.decode().catch(() => {}) : Promise.resolve())
  ).then(() => {
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (btn) { btn.textContent = '🖨️ Print / Save PDF'; btn.disabled = false; }
        window.print();
      });
    });
  }).catch(() => {
    if (btn) { btn.textContent = '🖨️ Print / Save PDF'; btn.disabled = false; }
    window.print();
  });
}

function previewReport() {
  saveReport();
  const r = state.report;
  const prof = activeInspector() || {};
  document.getElementById('rp-body').innerHTML = buildReportHtml(r, prof);
  document.getElementById('report-preview').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('report-preview').scrollTop = 0;
  // Init photo map after DOM insertion (small delay for Leaflet to measure container)
  setTimeout(initReportGeoMap, 80);
}

function toast(msg, duration) {
  const t = Object.assign(document.createElement('div'), {className:'toast', textContent:msg});
  document.body.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, duration || 2200);
}
function toastUndo(msg, onUndo) {
  // Remove any existing undo toast
  document.querySelectorAll('.toast-undo').forEach(el => el.remove());
  const t = document.createElement('div');
  t.className = 'toast-undo';
  t.innerHTML = `<span>${msg}</span><button class="toast-undo-btn">Undo</button>`;
  t.querySelector('.toast-undo-btn').onclick = () => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
    onUndo();
  };
  document.body.appendChild(t);
  requestAnimationFrame(() => { requestAnimationFrame(() => t.classList.add('show')); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 5000);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function migrateData() {
  // Absorb legacy si_sites (plain string array) into si_jobs
  const oldSites = JSON.parse(localStorage.getItem('si_sites') || '[]');
  if (oldSites.length) {
    const existingSites = new Set(DB.jobs().map(j => j.site && j.site.toLowerCase()).filter(Boolean));
    oldSites.forEach(site => {
      if (!existingSites.has(site.toLowerCase())) DB.saveJob(null, site);
    });
    localStorage.removeItem('si_sites');
  }
}
function setupPWA() {
  // Generate app icons using canvas
  function makeIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    // Blue background with rounded feel
    ctx.fillStyle = '#1e40af';
    ctx.fillRect(0, 0, size, size);
    // White "SI" text
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.round(size * 0.38)}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SI', size / 2, size / 2);
    return c.toDataURL('image/png');
  }
  const manifest = {
    name: 'SiteInspect', short_name: 'SiteInspect',
    description: 'Civil engineering site inspection tool',
    start_url: './', display: 'standalone',
    background_color: '#1e40af', theme_color: '#1e40af',
    orientation: 'portrait-primary',
    icons: [
      { src: makeIcon(192), sizes: '192x192', type: 'image/png' },
      { src: makeIcon(512), sizes: '512x512', type: 'image/png', purpose: 'maskable' },
    ]
  };
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = 'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(link);
  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

document.addEventListener('DOMContentLoaded', () => {
  setupPWA();
  migrateData();
  // Sync any existing inspector profiles into contacts on startup
  getInspData().inspectors.forEach(syncInspectorToContacts);
  render();
  // Migrate old team_settings blob → team_items rows (one-time, then pull fresh data)
  if (DB.getSetup()) Sync.migrateFromTeamSettings().then(() => Sync.pull()).catch(() => {});
  // Re-sync when returning to the tab
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && DB.getSetup()) Sync.pull().catch(() => {});
  });
  // Auto-sync when internet connection is restored
  window.addEventListener('online', () => {
    toast('Back online — syncing…');
    Sync.flushPhotoQueue().then(() => Sync.flushQueue()).then(() => Sync.flushTeamQueue()).then(() => Sync.pull()).catch(() => {});
  });
  window.addEventListener('offline', () => {
    Sync.setStatus('error');
  });
});
